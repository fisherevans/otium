<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>otium — manage · grouped by feed</title>
<style>
  :root{
    --paper:#f4f2ec;
    --paper-2:#efece3;
    --ink:#1a1815;
    --ink-soft:#4b4740;
    --ink-mute:#8b857a;
    --rule:#c9c3b5;
    --rule-hard:#1a1815;
    --hair:#d9d4c8;
    --serif:"Charter","Iowan Old Style","Georgia",serif;
    --grot:"Helvetica Neue","Arial",sans-serif;
    --mono:"SF Mono","Menlo",ui-monospace,monospace;
    --didot:"Didot","Hoefler Text","Baskerville",serif;
    --bar-h:62px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:#3b3a36;
    background-image:radial-gradient(circle at 30% 20%, #4a4844 0%, #2c2b28 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    padding:18px;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;
    width:390px;height:844px;max-height:calc(100vh - 24px);
    background:var(--paper);
    border-radius:44px;
    box-shadow:0 0 0 2px #111, 0 0 0 12px #16150f, 0 30px 70px rgba(0,0,0,.55);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:6;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    mix-blend-mode:multiply;opacity:.6;
  }

  /* status bar */
  .status{
    position:relative;z-index:4;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 6px;
    font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--ink);
    flex:0 0 auto;
  }
  .status .dots{display:flex;gap:3px;align-items:center;}
  .status .bar{width:2px;background:var(--ink);}
  .status .bar:nth-child(1){height:5px}
  .status .bar:nth-child(2){height:7px}
  .status .bar:nth-child(3){height:9px}
  .status .bar:nth-child(4){height:11px}

  /* ---------- app header ---------- */
  header.app{
    position:relative;z-index:4;flex:0 0 auto;
    padding:6px 26px 12px;
    border-bottom:1.5px solid var(--rule-hard);
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .wordmark{
    font-family:var(--didot);
    font-size:30px;line-height:.9;letter-spacing:.01em;color:var(--ink);font-weight:400;
  }
  .libmeta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding-bottom:3px;}
  .libmeta .k{font-family:var(--grot);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mute);}
  .libmeta .n{font-family:var(--mono);font-size:11px;letter-spacing:.02em;color:var(--ink-soft);}

  /* ---------- scroll stage ---------- */
  .stage{position:relative;flex:1 1 auto;overflow:hidden;z-index:3;min-height:0;}

  .flash{position:absolute;inset:0;z-index:20;pointer-events:none;background:var(--ink);opacity:0;}
  .flash.go{animation:refresh .28s steps(2,end) forwards;}
  @keyframes refresh{0%{opacity:0}40%{opacity:.94}41%{opacity:.05}72%{opacity:.5}100%{opacity:0}}
  .snapflash{position:absolute;inset:0;z-index:19;pointer-events:none;background:var(--ink);opacity:0;}
  .snapflash.tick{animation:snaptick .18s steps(2,end) forwards;}
  @keyframes snaptick{0%{opacity:0}45%{opacity:.12}100%{opacity:0}}

  .column{
    position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
    padding:0 0 20px;
  }
  .column::-webkit-scrollbar{width:0;height:0;}

  /* ---------- feed section ---------- */
  .feed{border-bottom:1.5px solid var(--rule-hard);}
  .feed-head{
    display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;
    padding:16px 20px 14px;cursor:pointer;position:relative;background:var(--paper);
  }
  .feed-head:active{background:var(--paper-2);}
  .fh-main{min-width:0;}
  .feed-name{
    font-family:var(--didot);font-size:21px;letter-spacing:.02em;color:var(--ink);
    display:flex;align-items:baseline;gap:9px;
  }
  .feed-name .cnt{font-family:var(--mono);font-size:11px;letter-spacing:.02em;color:var(--ink-mute);}
  .feed-sum{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.02em;color:var(--ink-soft);
  }
  .feed-sum .skiprate{display:inline-flex;align-items:center;gap:6px;}
  .fh-manage{
    width:34px;height:34px;border:1.5px solid var(--rule-hard);background:var(--paper);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;
    font-family:var(--grot);font-size:15px;color:var(--ink);letter-spacing:-.05em;
  }
  .fh-manage.on{background:var(--ink);color:var(--paper);}
  .fh-manage:active{transform:translateY(1px);}
  .feed-caret{
    width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    transition:transform .2s steps(3,end);
  }
  .feed.collapsed .feed-caret{transform:rotate(-90deg);}
  .feed-caret svg path{stroke:var(--ink);}

  /* feed flag tags */
  .ftag{
    font-family:var(--grot);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;
    padding:2px 6px;border:1px solid var(--rule-hard);color:var(--ink);background:var(--paper);
  }
  .ftag.noisy{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .ftag.dormant{border-style:dashed;color:var(--ink-mute);}

  /* feed manage panel */
  .managepanel{
    padding:0 20px;max-height:0;overflow:hidden;background:var(--paper-2);
    border-top:0 solid var(--hair);
    transition:max-height .26s steps(5,end);
  }
  .managepanel.open{max-height:170px;border-top:1px solid var(--hair);padding:14px 20px 16px;}
  .mp-row{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
  .mp-row:last-child{margin-bottom:0;}
  .mp-lbl{font-family:var(--grot);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);width:52px;flex:0 0 auto;}
  .tin{
    flex:1;min-width:0;font-family:var(--serif);font-size:15px;color:var(--ink);
    background:var(--paper);border:1.5px solid var(--rule-hard);padding:8px 10px;min-height:38px;
  }
  .tin:focus{outline:none;box-shadow:inset 0 0 0 1px var(--ink);}
  .mp-btn{
    font-family:var(--grot);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    background:var(--ink);color:var(--paper);border:1.5px solid var(--ink);
    padding:0 14px;min-height:38px;cursor:pointer;flex:0 0 auto;
  }
  .mp-btn.ghost{background:var(--paper);color:var(--ink);}
  .mp-btn:active{transform:translateY(1px);}

  /* ---------- outlier insight ---------- */
  .insight{
    margin:0 20px 14px;border:1.5px solid var(--rule-hard);background:var(--paper);
    box-shadow:4px 4px 0 rgba(26,24,21,.1);
  }
  .insight .itop{
    display:flex;gap:8px;align-items:flex-start;padding:11px 13px 9px;
  }
  .insight .imark{
    font-family:var(--didot);font-size:24px;line-height:.7;color:var(--ink);flex:0 0 auto;margin-top:2px;
  }
  .insight .itext{font-family:var(--serif);font-size:14px;line-height:1.32;color:var(--ink);}
  .insight .itext b{font-weight:700;}
  .insight .inum{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.02em;}
  .insight .iacts{display:flex;border-top:1px solid var(--hair);}
  .insight .iact{
    flex:1;min-height:42px;font-family:var(--grot);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    background:transparent;border:0;color:var(--ink);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .insight .iact + .iact{border-left:1px solid var(--hair);}
  .insight .iact:active{background:var(--paper-2);}

  /* ---------- source list ---------- */
  .srcwrap{overflow:hidden;transition:max-height .28s steps(6,end);}
  .feed.collapsed .srcwrap{max-height:0 !important;}

  .src{border-top:1px solid var(--hair);position:relative;}
  .src.muted{opacity:.5;}
  .src-row{
    display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:11px;
    padding:13px 20px 12px;cursor:pointer;min-height:64px;
  }
  .src-row:active{background:var(--paper-2);}
  .kind{width:22px;height:22px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .kind svg *{stroke:var(--ink-soft);fill:none;}
  .kind.fill svg .f{fill:var(--ink-soft);stroke:none;}

  .src-mid{min-width:0;}
  .src-title{
    font-family:var(--serif);font-size:16.5px;line-height:1.15;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .src-sig{
    display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:7px;
    font-family:var(--mono);font-size:10px;letter-spacing:.01em;color:var(--ink-soft);
  }
  .src-sig .sdot{width:2.5px;height:2.5px;background:var(--ink-mute);border-radius:50%;flex:0 0 auto;}

  /* weight pips */
  .pips{display:flex;gap:2.5px;align-items:center;}
  .pips i{width:9px;height:6px;border:1px solid var(--rule-hard);background:var(--paper);}
  .pips i.on{background:var(--ink);}
  .pips .star{border:0;background:none;width:auto;height:auto;font-family:var(--didot);font-size:12px;line-height:1;color:var(--ink);margin-left:1px;}
  .wlabel{font-family:var(--grot);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);}

  /* density glyph */
  .dens{display:inline-flex;align-items:flex-end;gap:1.5px;height:9px;}
  .dens i{width:2.5px;background:var(--rule);}
  .dens i.on{background:var(--ink-soft);}
  .dens i:nth-child(1){height:3px}
  .dens i:nth-child(2){height:5px}
  .dens i:nth-child(3){height:7px}
  .dens i:nth-child(4){height:9px}

  /* skip meter */
  .skip{display:inline-flex;align-items:center;gap:6px;}
  .track{width:40px;height:5px;background:var(--hair);border:1px solid var(--rule);position:relative;overflow:hidden;display:inline-block;vertical-align:middle;}
  .track .fill{position:absolute;left:0;top:0;bottom:0;background:var(--ink);}
  .track .fill.hi{background-image:repeating-linear-gradient(45deg,var(--ink) 0 2px,var(--ink-soft) 2px 4px);}
  .feed-sum .track{width:34px;}

  /* source right column: unseen + tag stack */
  .src-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:0 0 auto;}
  .unseen{
    font-family:var(--mono);font-size:12px;color:var(--paper);background:var(--ink);
    min-width:28px;text-align:center;padding:3px 7px;letter-spacing:.02em;
  }
  .unseen.zero{background:var(--paper);color:var(--ink-mute);border:1px solid var(--rule);}
  .stag{
    font-family:var(--grot);font-size:8px;letter-spacing:.14em;text-transform:uppercase;
    padding:2px 6px;border:1px solid var(--rule-hard);color:var(--ink);background:var(--paper);white-space:nowrap;
  }
  .stag.noisy{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .stag.vnoisy{background:var(--ink);color:var(--paper);border-color:var(--ink);box-shadow:2px 2px 0 var(--ink-mute);}
  .stag.rare{border-style:dotted;color:var(--ink-soft);}
  .stag.dormant{border-style:dashed;color:var(--ink-mute);}
  .stag.mutedtag{background:var(--paper-2);color:var(--ink-mute);border-style:dashed;}
  .cap-inline{font-family:var(--mono);font-size:9.5px;color:var(--ink-soft);letter-spacing:.02em;}

  /* ---------- source drawer (expanded controls) ---------- */
  .drawer{
    max-height:0;overflow:hidden;background:var(--paper-2);
    transition:max-height .3s steps(7,end);
  }
  .src.open .drawer{max-height:760px;}
  .dinner{padding:6px 20px 20px;border-top:1px solid var(--hair);}

  .block{margin-top:16px;}
  .block:first-child{margin-top:10px;}
  .block-h{
    font-family:var(--grot);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute);
    display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;
  }
  .block-h .val{font-family:var(--grot);font-size:11px;letter-spacing:.12em;color:var(--ink);font-weight:700;}
  .block-h .val .st{font-family:var(--didot);font-size:13px;}

  /* WEIGHT LADDER - the hero control */
  .ladder{display:flex;gap:5px;align-items:flex-end;}
  .step{
    flex:1;background:transparent;border:0;padding:0;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  .step .bar{
    width:100%;border:1.5px solid var(--rule-hard);background:var(--paper);
    display:block;transition:background .12s steps(2,end);position:relative;
  }
  .step:nth-child(1) .bar{height:26px}
  .step:nth-child(2) .bar{height:37px}
  .step:nth-child(3) .bar{height:48px}
  .step:nth-child(4) .bar{height:59px}
  .step:nth-child(5) .bar{height:70px}
  .step.filld .bar{background:var(--ink);}
  .step.sel .bar{box-shadow:0 0 0 2px var(--paper),0 0 0 3.5px var(--rule-hard);}
  .step .slabel{
    font-family:var(--grot);font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute);
    text-align:center;line-height:1.1;
  }
  .step.sel .slabel{color:var(--ink);font-weight:700;}
  .step .starm{position:absolute;top:3px;left:50%;transform:translateX(-50%);font-family:var(--didot);font-size:15px;color:var(--paper);line-height:1;}
  .step:active .bar{transform:translateY(1px);}

  /* CAP stepper */
  .capbar{display:flex;align-items:center;gap:0;border:1.5px solid var(--rule-hard);background:var(--paper);width:100%;}
  .cap-btn{
    width:52px;min-height:46px;background:var(--paper);border:0;cursor:pointer;
    font-family:var(--didot);font-size:24px;color:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }
  .cap-btn:active{background:var(--ink);color:var(--paper);}
  .cap-btn.dis{color:var(--rule);pointer-events:none;}
  .cap-val{
    flex:1;text-align:center;font-family:var(--mono);font-size:13px;color:var(--ink);letter-spacing:.02em;
    border-left:1.5px solid var(--rule-hard);border-right:1.5px solid var(--rule-hard);min-height:46px;
    display:flex;align-items:center;justify-content:center;
  }
  .cap-val .off{color:var(--ink-mute);}

  /* MOVE feed chips */
  .feedchips{display:flex;gap:7px;flex-wrap:wrap;}
  .fchip{
    font-family:var(--grot);font-size:11px;letter-spacing:.06em;
    padding:8px 12px;min-height:38px;border:1.5px solid var(--rule-hard);background:var(--paper);
    color:var(--ink);cursor:pointer;display:flex;align-items:center;
  }
  .fchip.here{background:var(--ink);color:var(--paper);cursor:default;}
  .fchip:not(.here):active{background:var(--paper-2);}

  /* secondary actions */
  .sacts{display:flex;gap:8px;margin-top:18px;}
  .sact{
    flex:1;min-height:46px;border:1.5px solid var(--rule-hard);background:var(--paper);color:var(--ink);
    font-family:var(--grot);font-size:10px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .sact:active{background:var(--paper-2);}
  .sact.arm{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .sact svg *{stroke:currentColor;fill:none;}

  /* dormant/muted notes inside drawer */
  .dnote{
    font-family:var(--mono);font-size:10.5px;color:var(--ink-mute);letter-spacing:.02em;
    margin-top:16px;padding-top:12px;border-top:1px solid var(--hair);line-height:1.4;
  }

  /* muted subgroup divider */
  .muted-div{
    display:flex;align-items:center;gap:9px;padding:11px 20px 9px;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);
    border-top:1px solid var(--hair);background:var(--paper-2);
  }
  .muted-div .ln{flex:1;height:1px;background:var(--hair);}

  /* ---------- add-source sheet (reused reader pattern) ---------- */
  .sheet{
    position:absolute;inset:0;z-index:16;background:var(--paper);
    transform:translateY(101%);transition:transform .34s steps(4,end);
    display:flex;flex-direction:column;padding:22px 24px;
  }
  .sheet.up{transform:translateY(0);}
  .sheet .shead{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1.5px solid var(--rule-hard);padding-bottom:12px;margin-bottom:20px;
  }
  .sheet .shead .k{font-family:var(--grot);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mute);}
  .sheet .xclose{
    width:34px;height:34px;border:1.5px solid var(--rule-hard);background:var(--paper);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:var(--grot);font-size:16px;color:var(--ink);
  }
  .sheet h3{font-family:var(--didot);font-weight:400;font-size:27px;line-height:1.1;color:var(--ink);margin:0 0 20px;}
  .fld{display:block;margin-bottom:16px;}
  .fld .flbl{font-family:var(--grot);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);display:block;margin-bottom:7px;}
  .fld .tin{width:100%;}
  .sheet .feedchips{margin-top:2px;}
  .addbtn{
    margin-top:auto;min-height:54px;border:1.5px solid var(--rule-hard);background:var(--ink);color:var(--paper);
    font-family:var(--serif);font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;
  }
  .addbtn:active{transform:translateY(1px);}
  .sheet .grain{
    margin-top:14px;font-family:var(--mono);font-size:10px;color:var(--ink-mute);letter-spacing:.03em;text-align:center;
  }

  /* ---------- sort tray ---------- */
  .tray{
    position:absolute;left:0;right:0;bottom:0;z-index:14;background:var(--paper);
    border-top:1.5px solid var(--rule-hard);
    transform:translateY(101%);transition:transform .26s steps(4,end);
    padding:16px 20px 18px;
  }
  .tray.up{transform:translateY(0);}
  .tray .th{font-family:var(--grot);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:11px;}
  .tray .th + .th{margin-top:16px;}
  .sortchips{display:flex;gap:7px;flex-wrap:wrap;}
  .schip{
    font-family:var(--grot);font-size:11px;letter-spacing:.05em;
    padding:9px 13px;min-height:40px;border:1.5px solid var(--rule-hard);background:var(--paper);
    color:var(--ink);cursor:pointer;display:flex;align-items:center;
  }
  .schip.on{background:var(--ink);color:var(--paper);}
  .schip:not(.on):active{background:var(--paper-2);}

  /* ---------- bottom action bar ---------- */
  nav.actionbar{
    position:relative;z-index:8;flex:0 0 auto;height:var(--bar-h);
    background:var(--paper);border-top:1.5px solid var(--rule-hard);display:flex;
  }
  .abtn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-soft);cursor:pointer;position:relative;background:transparent;border:0;padding:0;overflow:hidden;
  }
  .abtn + .abtn{border-left:1px solid var(--hair);}
  .abtn:active{background:var(--paper-2);}
  .abtn .ic{width:19px;height:19px;display:block;}
  .abtn .ic *{stroke:var(--ink);fill:none;}
  .abtn.on{color:var(--ink);font-weight:700;}
  .abtn.on .ic *{fill:var(--ink);stroke:var(--ink);}
  .abtn.dis{opacity:.3;pointer-events:none;}
  .abtn .badge{
    position:absolute;top:8px;right:calc(50% - 22px);
    font-family:var(--mono);font-size:8px;color:var(--paper);background:var(--ink);
    padding:0 4px;line-height:13px;border-radius:1px;
  }
  .abtn.pulse::before{
    content:"";position:absolute;inset:0;background:var(--ink);
    animation:stamp .26s steps(2,end) forwards;pointer-events:none;
  }
  @keyframes stamp{0%{opacity:0}45%{opacity:.9}46%{opacity:.06}100%{opacity:0}}
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="status">
    <span>9:41</span>
    <span class="dots" aria-hidden="true">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
      &nbsp;<svg width="22" height="11" viewBox="0 0 22 11"><rect x="0.5" y="0.5" width="18" height="10" rx="2" fill="none" stroke="#1a1815"/><rect x="19" y="3.5" width="2" height="4" fill="#1a1815"/><rect x="2" y="2" width="13" height="7" fill="#1a1815"/></svg>
    </span>
  </div>

  <header class="app">
    <div class="wordmark">otium</div>
    <div class="libmeta">
      <span class="k">Library</span>
      <span class="n" id="libcount">13 sources · 6 feeds</span>
    </div>
  </header>

  <div class="stage">
    <div class="flash" id="flash"></div>
    <div class="snapflash" id="snapflash"></div>

    <div class="column" id="column"><!-- feeds injected --></div>

    <!-- add-source sheet -->
    <div class="sheet" id="sheet">
      <div class="shead">
        <span class="k">New source</span>
        <button class="xclose" id="sheetClose" aria-label="Close">&times;</button>
      </div>
      <h3>Follow a source</h3>
      <label class="fld">
        <span class="flbl">Feed URL</span>
        <input class="tin" id="addUrl" placeholder="https://…/feed.xml" autocomplete="off" spellcheck="false">
      </label>
      <label class="fld">
        <span class="flbl">Title <span style="color:var(--ink-mute);text-transform:none;letter-spacing:0">(optional)</span></span>
        <input class="tin" id="addTitle" placeholder="Derived from the feed" autocomplete="off">
      </label>
      <div class="fld">
        <span class="flbl">Feed</span>
        <div class="feedchips" id="addFeedChips"></div>
      </div>
      <button class="addbtn" id="addBtn">Add at normal weight</button>
      <div class="grain">new sources start at normal · tune the weight after</div>
    </div>

    <!-- sort tray -->
    <div class="tray" id="tray">
      <div class="th">Sort sources within each feed</div>
      <div class="sortchips" id="sortChips">
        <button class="schip" data-sort="weight">Weight</button>
        <button class="schip" data-sort="az">A–Z</button>
        <button class="schip" data-sort="noise">Noisiest</button>
        <button class="schip" data-sort="skip">Most skipped</button>
      </div>
      <div class="th">Order the feeds</div>
      <div class="sortchips" id="feedOrderChips">
        <button class="schip" data-forder="default">Default</button>
        <button class="schip" data-forder="health">Worst health first</button>
      </div>
    </div>
  </div>

  <nav class="actionbar" id="actionbar">
    <button class="abtn" id="barAdd">
      <span class="ic"><svg width="19" height="19" viewBox="0 0 15 15"><path d="M7.5 2.5v10M2.5 7.5h10" stroke-width="1.5" stroke-linecap="round"/></svg></span>
      Add
    </button>
    <button class="abtn" id="barSort">
      <span class="ic"><svg width="19" height="19" viewBox="0 0 15 15"><path d="M3 4h9M4.5 7.5h6M6.5 11h2" stroke-width="1.5" stroke-linecap="round"/></svg></span>
      Sort
    </button>
    <button class="abtn" id="barCollapse">
      <span class="ic"><svg width="19" height="19" viewBox="0 0 15 15"><path d="M4 6l3.5-3L11 6M4 9l3.5 3L11 9" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span id="collapseLbl">Collapse</span>
    </button>
    <button class="abtn dis" id="barUndo">
      <span class="ic"><svg width="19" height="19" viewBox="0 0 15 15"><path d="M4 5.5h5.5a3 3 0 0 1 0 6H6M4 5.5l2.2-2.2M4 5.5l2.2 2.2" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      Undo
    </button>
  </nav>
</div>

<script>
(function(){
  "use strict";

  var WEIGHTS=['very low','low','normal','high','favorite'];
  var WSHORT =['v. low','low','normal','high','favorite'];

  var feeds=['News','Comedy','Science','Tech','Music','Curiosity'];

  var sources=[
    {id:'npr-news', title:'NPR News',      feed:'News',      w:2, kind:'rss',     unseen:12, perDay:8,   skip:22, cap:0, flag:null},
    {id:'bbc',      title:'BBC News',      feed:'News',      w:2, kind:'rss',     unseen:20, perDay:30,  skip:40, cap:5, flag:'noisy'},
    {id:'tom',      title:'Tom Scott',     feed:'Curiosity', w:4, kind:'youtube', unseen:3,  perDay:0.2, skip:5,  cap:0, flag:'rare'},
    {id:'kurz',     title:'Kurzgesagt',    feed:'Science',   w:4, kind:'youtube', unseen:2,  perDay:0.1, skip:8,  cap:0, flag:'rare'},
    {id:'veri',     title:'Veritasium',    feed:'Science',   w:3, kind:'youtube', unseen:4,  perDay:0.2, skip:12, cap:0, flag:null},
    {id:'verge',    title:'The Verge',     feed:'Tech',      w:3, kind:'rss',     unseen:18, perDay:15,  skip:35, cap:6, flag:'noisy'},
    {id:'hn',       title:'Hacker News',   feed:'Tech',      w:1, kind:'rss',     unseen:40, perDay:30,  skip:60, cap:3, flag:'vnoisy'},
    {id:'99pi',     title:'99% Invisible', feed:'Curiosity', w:4, kind:'podcast', unseen:1,  perDay:0.1, skip:3,  cap:0, flag:'rare'},
    {id:'scumbag',  title:'Scumbag Dad',   feed:'Comedy',    w:2, kind:'youtube', unseen:8,  perDay:1,   skip:15, cap:0, flag:null},
    {id:'ryan',     title:'Ryan George',   feed:'Comedy',    w:3, kind:'youtube', unseen:2,  perDay:0.3, skip:10, cap:0, flag:null},
    {id:'nprmusic', title:'NPR Music',     feed:'Music',     w:1, kind:'rss',     unseen:6,  perDay:2,   skip:45, cap:0, flag:null},
    {id:'pitch',    title:'Pitchfork',     feed:'Music',     w:2, kind:'rss',     unseen:10, perDay:5,   skip:30, cap:0, flag:null},
    {id:'cgp',      title:'CGP Grey',      feed:'Curiosity', w:3, kind:'youtube', unseen:0,  perDay:0,   skip:0,  cap:0, flag:'dormant', dormantMsg:'last posted ~4 months ago'}
  ];

  /* ---------- ui state ---------- */
  var collapsed={};          // feed -> bool
  var managing={};           // feed -> bool (manage panel)
  var expanded={};           // src id -> bool
  var deleteArm=null;        // src id armed for delete
  var sortMode='weight';
  var feedOrder='default';
  var undo=null;             // {sources, feeds}

  var col=document.getElementById('column');
  var flash=document.getElementById('flash');
  var snapflash=document.getElementById('snapflash');

  /* ---------- glyphs ---------- */
  function kindGlyph(k){
    if(k==='youtube') return '<span class="kind fill"><svg width="20" height="20" viewBox="0 0 20 20"><rect class="s" x="2" y="5" width="16" height="10" rx="2.5" fill="none" stroke-width="1.3"/><path class="f" d="M8.4 7.8v4.4l3.8-2.2z"/></svg></span>';
    if(k==='podcast') return '<span class="kind"><svg width="20" height="20" viewBox="0 0 20 20"><rect x="7.5" y="3" width="5" height="8.5" rx="2.5" fill="none" stroke-width="1.3"/><path d="M5 9.5a5 5 0 0 0 10 0M10 14.5V17M7.5 17h5" fill="none" stroke-width="1.3" stroke-linecap="round"/></svg></span>';
    // rss
    return '<span class="kind fill"><svg width="20" height="20" viewBox="0 0 20 20"><path d="M4.5 7a8.5 8.5 0 0 1 8.5 8.5M4.5 11a4.5 4.5 0 0 1 4.5 4.5" fill="none" stroke-width="1.3" stroke-linecap="round"/><circle class="f" cx="5.2" cy="14.8" r="1.4"/></svg></span>';
  }

  function pips(w){
    var s='<span class="pips">';
    for(var i=0;i<5;i++){ s+='<i class="'+(i<=w?'on':'')+'"></i>'; }
    if(w===4){ s+='<span class="star">&#9733;</span>'; }
    s+='</span>';
    return s;
  }

  function densTier(perDay){
    if(perDay<0.5) return 1;
    if(perDay<5)   return 2;
    if(perDay<15)  return 3;
    return 4;
  }
  function densGlyph(perDay){
    var t=densTier(perDay), s='<span class="dens">';
    for(var i=1;i<=4;i++){ s+='<i class="'+(i<=t?'on':'')+'"></i>'; }
    s+='</span>';
    return s;
  }
  function perDayLabel(p){
    if(p===0) return '0/day';
    if(p<1) return p+'/day';
    return Math.round(p)+'/day';
  }

  function skipMeter(skip){
    var hi = skip>=40 ? ' hi':'';
    return '<span class="skip">'+densSkipTrack(skip,hi)+'<span>'+skip+'% skip</span></span>';
  }
  function densSkipTrack(skip,hi){
    return '<span class="track"><span class="fill'+hi+'" style="width:'+skip+'%"></span></span>';
  }

  function srcTag(f){
    if(f==='noisy')  return '<span class="stag noisy">noisy</span>';
    if(f==='vnoisy') return '<span class="stag vnoisy">very noisy</span>';
    if(f==='rare')   return '<span class="stag rare">rare</span>';
    if(f==='dormant')return '<span class="stag dormant">dormant</span>';
    return '';
  }

  /* ---------- feed health ---------- */
  function feedSources(feed){ return sources.filter(function(s){return s.feed===feed;}); }
  function activeFeedSources(feed){ return sources.filter(function(s){return s.feed===feed && !s.archived;}); }

  function feedHealth(feed){
    var act=activeFeedSources(feed);
    var live=act.filter(function(s){return s.flag!=='dormant';});
    var avgSkip = live.length ? Math.round(live.reduce(function(a,s){return a+s.skip;},0)/live.length) : 0;
    var noisy = act.some(function(s){return s.flag==='noisy'||s.flag==='vnoisy';});
    var dormant = act.some(function(s){return s.flag==='dormant';});
    // volume outlier
    var totalVol = live.reduce(function(a,s){return a+s.perDay;},0);
    var top=null, share=0;
    live.forEach(function(s){
      var sh = totalVol>0 ? s.perDay/totalVol : 0;
      if(sh>share){ share=sh; top=s; }
    });
    var insight = (top && share>0.5 && top.skip>34) ? {src:top, share:Math.round(share*100), vol:totalVol} : null;
    return {count:act.length, avgSkip:avgSkip, noisy:noisy, dormant:dormant, insight:insight, live:live.length};
  }

  /* ---------- sorting ---------- */
  function sortedSources(feed){
    var arr=activeFeedSources(feed).slice();
    arr.sort(function(a,b){
      if(sortMode==='weight') return (b.w-a.w) || a.title.localeCompare(b.title);
      if(sortMode==='az')     return a.title.localeCompare(b.title);
      if(sortMode==='noise')  return (b.perDay-a.perDay) || a.title.localeCompare(b.title);
      if(sortMode==='skip')   return (b.skip-a.skip) || a.title.localeCompare(b.title);
      return 0;
    });
    return arr;
  }
  function archivedSources(feed){ return sources.filter(function(s){return s.feed===feed && s.archived;}); }

  function orderedFeeds(){
    if(feedOrder==='health'){
      return feeds.slice().sort(function(a,b){ return feedHealth(b).avgSkip - feedHealth(a).avgSkip; });
    }
    return feeds.slice();
  }

  /* ---------- render ---------- */
  function render(){
    var scrollY=col.scrollTop;
    var html='';

    orderedFeeds().forEach(function(feed){
      var h=feedHealth(feed);
      var isColl=!!collapsed[feed];
      var isMng=!!managing[feed];

      var sumFlags='';
      if(h.noisy)   sumFlags+='<span class="ftag noisy">noisy</span>';
      if(h.dormant) sumFlags+='<span class="ftag dormant">dormant</span>';

      html+='<div class="feed'+(isColl?' collapsed':'')+'" data-feed="'+feed+'">';

      // header
      html+='<div class="feed-head" data-fhead="'+feed+'">'
        +   '<div class="fh-main">'
        +     '<div class="feed-name">'+feed+' <span class="cnt">'+h.count+' source'+(h.count===1?'':'s')+'</span></div>'
        +     '<div class="feed-sum">'
        +       '<span class="skiprate">avg '+h.avgSkip+'% skipped '+densSkipTrack(h.avgSkip, h.avgSkip>=40?' hi':'')+'</span>'
        +       sumFlags
        +     '</div>'
        +   '</div>'
        +   '<button class="fh-manage'+(isMng?' on':'')+'" data-fmanage="'+feed+'" aria-label="Manage feed">&#8943;</button>'
        +   '<span class="feed-caret"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 5l4 4 4-4" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'
        + '</div>';

      // manage panel
      html+='<div class="managepanel'+(isMng?' open':'')+'">'
        +   '<div class="mp-row">'
        +     '<span class="mp-lbl">Rename</span>'
        +     '<input class="tin" data-frename="'+feed+'" value="'+esc(feed)+'">'
        +     '<button class="mp-btn ghost" data-frenamebtn="'+feed+'">Save</button>'
        +   '</div>'
        +   '<div class="mp-row">'
        +     '<span class="mp-lbl">Sources</span>'
        +     '<button class="mp-btn" data-faddsrc="'+feed+'">+ Add source to '+esc(feed)+'</button>'
        +   '</div>'
        + '</div>';

      // sources
      html+='<div class="srcwrap">';

      // outlier insight
      if(h.insight){
        var it=h.insight;
        html+='<div class="insight">'
          +   '<div class="itop">'
          +     '<span class="imark">&#8258;</span>'
          +     '<div class="itext"><b>'+esc(it.src.title)+'</b> is <span class="inum">'+it.share+'%</span> of '+feed+'’s volume '
          +       '<span class="inum">('+perDayLabel(it.src.perDay)+' of '+perDayLabel(it.vol)+')</span>, and you skip <span class="inum">'+it.src.skip+'%</span> of it.</div>'
          +   '</div>'
          +   '<div class="iacts">'
          +     '<button class="iact" data-turndown="'+it.src.id+'">&#9660; Turn down</button>'
          +     '<button class="iact" data-capit="'+it.src.id+'">&#9707; Cap it</button>'
          +   '</div>'
          + '</div>';
      }

      // active sources
      sortedSources(feed).forEach(function(s){ html+=srcRow(s); });

      // archived (muted) subgroup
      var arch=archivedSources(feed);
      if(arch.length){
        html+='<div class="muted-div"><span>Muted &middot; '+arch.length+'</span><span class="ln"></span></div>';
        arch.forEach(function(s){ html+=srcRow(s); });
      }

      html+='</div>'; // srcwrap
      html+='</div>'; // feed
    });

    col.innerHTML=html;

    // keep drawers with correct max-height (open ones already have .open class via srcRow)
    col.scrollTop=scrollY;
    updateLib();
  }

  function srcRow(s){
    var isOpen=!!expanded[s.id];
    var armed=(deleteArm===s.id);

    var right='';
    if(s.archived){
      right='<span class="stag mutedtag">muted</span>';
    } else if(s.flag==='dormant'){
      right='<span class="unseen zero">0</span>';
    } else {
      right='<span class="unseen'+(s.unseen===0?' zero':'')+'">'+s.unseen+'</span>';
      if(s.flag) right+=srcTag(s.flag);
    }

    var sig;
    if(s.flag==='dormant'){
      sig='<span class="pips">'+pipsInner(s.w)+'</span><span class="wlabel">'+WEIGHTS[s.w]+'</span>'
        +'<span class="sdot"></span><span>'+(s.dormantMsg||'dormant')+'</span>';
    } else {
      sig=pips(s.w)+'<span class="wlabel">'+WEIGHTS[s.w]+'</span>'
        +'<span class="sdot"></span>'+densGlyph(s.perDay)+'<span>'+perDayLabel(s.perDay)+'</span>'
        +'<span class="sdot"></span>'+skipMeter(s.skip);
      if(s.cap>0) sig+='<span class="sdot"></span><span class="cap-inline">cap '+s.cap+'/session</span>';
    }

    var out='<div class="src'+(isOpen?' open':'')+(s.archived?' muted':'')+'" data-src="'+s.id+'">';
    out+= '<div class="src-row" data-srcrow="'+s.id+'">'
       +    kindGlyph(s.kind)
       +    '<div class="src-mid"><div class="src-title">'+esc(s.title)+'</div><div class="src-sig">'+sig+'</div></div>'
       +    '<div class="src-right">'+right+'</div>'
       +  '</div>';
    out+= drawer(s,armed);
    out+= '</div>';
    return out;
  }
  function pipsInner(w){ var s=''; for(var i=0;i<5;i++){ s+='<i class="'+(i<=w?'on':'')+'"></i>'; } return s; }

  function drawer(s,armed){
    if(s.archived){
      return '<div class="drawer"><div class="dinner">'
        + '<div class="dnote">Muted &mdash; kept in your library but excluded from sessions. Nothing is lost.</div>'
        + '<div class="sacts">'
        +   '<button class="sact" data-unarch="'+s.id+'">&#8634; Un-mute</button>'
        +   '<button class="sact'+(armed?' arm':'')+'" data-del="'+s.id+'">'+(armed?'Tap to confirm':'Delete')+'</button>'
        + '</div>'
        + '</div></div>';
    }

    // weight ladder
    var ladder='<div class="ladder">';
    for(var i=0;i<5;i++){
      ladder+='<button class="step'+(i<=s.w?' filld':'')+(i===s.w?' sel':'')+'" data-setw="'+s.id+'" data-w="'+i+'">'
        + '<span class="bar">'+(i===4?'<span class="starm">&#9733;</span>':'')+'</span>'
        + '<span class="slabel">'+WSHORT[i]+'</span>'
        + '</button>';
    }
    ladder+='</div>';

    // cap stepper
    var capTxt = s.cap>0 ? (s.cap+' item'+(s.cap===1?'':'s')+' / session') : '<span class="off">no cap &mdash; all that qualify</span>';
    var cap='<div class="capbar">'
      + '<button class="cap-btn'+(s.cap<=0?' dis':'')+'" data-cap="'+s.id+'" data-d="-1">&minus;</button>'
      + '<div class="cap-val">'+capTxt+'</div>'
      + '<button class="cap-btn'+(s.cap>=12?' dis':'')+'" data-cap="'+s.id+'" data-d="1">+</button>'
      + '</div>';

    // move-to-feed chips
    var chips='<div class="feedchips">';
    feeds.forEach(function(f){
      chips+='<button class="fchip'+(f===s.feed?' here':'')+'" data-move="'+s.id+'" data-feed="'+f+'">'+esc(f)+'</button>';
    });
    chips+='</div>';

    var dormantNote = s.flag==='dormant'
      ? '<div class="dnote">This source has gone quiet &mdash; '+(s.dormantMsg||'no recent posts')+'. It still counts toward the feed but won’t crowd your sessions.</div>'
      : '';

    return '<div class="drawer"><div class="dinner">'
      + '<div class="block"><div class="block-h"><span>Weight</span><span class="val">'
          + (s.w===4?'<span class="st">&#9733;</span> ':'') + WEIGHTS[s.w] + '</span></div>'+ladder+'</div>'
      + '<div class="block"><div class="block-h"><span>Per-session cap</span><span class="val">'+(s.cap>0?s.cap:'off')+'</span></div>'+cap+'</div>'
      + '<div class="block"><div class="block-h"><span>Feed</span><span class="val">'+esc(s.feed)+'</span></div>'+chips+'</div>'
      + '<div class="block"><div class="block-h"><span>Title</span></div>'
      +   '<div class="mp-row" style="margin:0"><input class="tin" data-title="'+s.id+'" value="'+esc(s.title)+'"><button class="mp-btn ghost" data-titlebtn="'+s.id+'">Save</button></div></div>'
      + dormantNote
      + '<div class="sacts">'
      +   '<button class="sact" data-arch="'+s.id+'">&#9863; Mute</button>'
      +   '<button class="sact'+(armed?' arm':'')+'" data-del="'+s.id+'">'+(armed?'Tap to confirm':'Delete')+'</button>'
      + '</div>'
      + '</div></div>';
  }

  function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function updateLib(){
    var act=sources.filter(function(s){return !s.archived;}).length;
    var mut=sources.length-act;
    var txt=act+' source'+(act===1?'':'s')+' · '+feeds.length+' feeds';
    if(mut) txt+=' · '+mut+' muted';
    document.getElementById('libcount').textContent=txt;
  }

  /* ---------- mutation helpers ---------- */
  function snapshot(){
    undo={sources:JSON.parse(JSON.stringify(sources)), feeds:feeds.slice()};
    document.getElementById('barUndo').classList.remove('dis');
  }
  function doFlash(){ flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go'); }
  function doTick(){ snapflash.classList.remove('tick'); void snapflash.offsetWidth; snapflash.classList.add('tick'); }
  function byId(id){ return sources.filter(function(s){return s.id===id;})[0]; }

  /* ---------- events ---------- */
  col.addEventListener('click', function(e){
    var t=e.target;
    var el;

    // manage toggle
    if((el=t.closest('[data-fmanage]'))){ e.stopPropagation(); var f=el.getAttribute('data-fmanage'); managing[f]=!managing[f]; render(); return; }
    // rename save
    if((el=t.closest('[data-frenamebtn]'))){
      var of=el.getAttribute('data-frenamebtn');
      var inp=col.querySelector('[data-frename="'+of+'"]');
      var nv=inp.value.trim();
      if(nv && nv!==of && feeds.indexOf(nv)===-1){
        snapshot();
        var fi=feeds.indexOf(of); if(fi>=0) feeds[fi]=nv;
        sources.forEach(function(s){ if(s.feed===of) s.feed=nv; });
        if(collapsed[of]){collapsed[nv]=true;delete collapsed[of];}
        managing[nv]=true; delete managing[of];
        doFlash(); render();
      }
      return;
    }
    // add source to feed
    if((el=t.closest('[data-faddsrc]'))){ openAdd(el.getAttribute('data-faddsrc')); return; }

    // insight quick actions
    if((el=t.closest('[data-turndown]'))){ var s1=byId(el.getAttribute('data-turndown')); if(s1 && s1.w>0){ snapshot(); s1.w--; doTick(); render(); } return; }
    if((el=t.closest('[data-capit]'))){ var s2=byId(el.getAttribute('data-capit')); if(s2){ snapshot(); if(s2.cap<=0)s2.cap=5; expanded[s2.id]=true; doTick(); render(); } return; }

    // weight ladder
    if((el=t.closest('[data-setw]'))){
      var sw=byId(el.getAttribute('data-setw')); var nw=parseInt(el.getAttribute('data-w'),10);
      if(sw && sw.w!==nw){ snapshot(); sw.w=nw; doTick(); render(); }
      return;
    }
    // cap stepper
    if((el=t.closest('[data-cap]'))){
      var sc=byId(el.getAttribute('data-cap')); var d=parseInt(el.getAttribute('data-d'),10);
      if(sc){ var nc=Math.max(0,Math.min(12,sc.cap+d)); if(nc!==sc.cap){ snapshot(); sc.cap=nc; doTick(); render(); } }
      return;
    }
    // move feed
    if((el=t.closest('[data-move]'))){
      var sm=byId(el.getAttribute('data-move')); var nf=el.getAttribute('data-feed');
      if(sm && sm.feed!==nf){ snapshot(); sm.feed=nf; doFlash(); render(); }
      return;
    }
    // title save
    if((el=t.closest('[data-titlebtn]'))){
      var st=byId(el.getAttribute('data-titlebtn'));
      var ti=col.querySelector('[data-title="'+st.id+'"]');
      var tv=ti.value.trim();
      if(st && tv && tv!==st.title){ snapshot(); st.title=tv; doTick(); render(); }
      return;
    }
    // archive / unarchive
    if((el=t.closest('[data-arch]'))){ var sa=byId(el.getAttribute('data-arch')); if(sa){ snapshot(); sa.archived=true; expanded[sa.id]=false; deleteArm=null; doFlash(); render(); } return; }
    if((el=t.closest('[data-unarch]'))){ var su=byId(el.getAttribute('data-unarch')); if(su){ snapshot(); su.archived=false; expanded[su.id]=false; doFlash(); render(); } return; }
    // delete (two-tap arm)
    if((el=t.closest('[data-del]'))){
      var sd=el.getAttribute('data-del');
      if(deleteArm!==sd){ deleteArm=sd; render();
        setTimeout(function(){ if(deleteArm===sd){ deleteArm=null; render(); } },3200);
      } else {
        snapshot();
        var di=sources.map(function(x){return x.id;}).indexOf(sd);
        if(di>=0) sources.splice(di,1);
        delete expanded[sd]; deleteArm=null; doFlash(); render();
      }
      return;
    }

    // source row expand/collapse
    if((el=t.closest('[data-srcrow]'))){
      var rid=el.getAttribute('data-srcrow');
      expanded[rid]=!expanded[rid];
      if(!expanded[rid] && deleteArm===rid) deleteArm=null;
      render();
      return;
    }

    // feed header collapse/expand
    if((el=t.closest('[data-fhead]'))){
      var fh=el.getAttribute('data-fhead');
      collapsed[fh]=!collapsed[fh];
      render();
      return;
    }
  });

  // keep manage/title/rename inputs from bubbling a click into collapse toggles
  col.addEventListener('click', function(e){
    if(e.target.classList.contains('tin')) e.stopPropagation();
  }, true);

  /* ---------- add-source sheet ---------- */
  var sheet=document.getElementById('sheet');
  var addFeedChips=document.getElementById('addFeedChips');
  var addUrl=document.getElementById('addUrl');
  var addTitle=document.getElementById('addTitle');
  var pendingFeed=feeds[0];
  var newCounter=1;

  function renderAddChips(){
    addFeedChips.innerHTML=feeds.map(function(f){
      return '<button class="fchip'+(f===pendingFeed?' here':'')+'" data-addfeed="'+esc(f)+'">'+esc(f)+'</button>';
    }).join('');
  }
  addFeedChips.addEventListener('click', function(e){
    var b=e.target.closest('[data-addfeed]'); if(!b) return;
    pendingFeed=b.getAttribute('data-addfeed'); renderAddChips();
  });
  function openAdd(feed){
    pendingFeed=feed||feeds[0];
    addUrl.value=''; addTitle.value='';
    renderAddChips();
    doFlash();
    setTimeout(function(){ sheet.classList.add('up'); },120);
  }
  function closeAdd(){ sheet.classList.remove('up'); }
  document.getElementById('sheetClose').addEventListener('click', closeAdd);
  document.getElementById('barAdd').addEventListener('click', function(){ openAdd(orderedFeeds()[0]); });

  document.getElementById('addBtn').addEventListener('click', function(){
    var url=addUrl.value.trim();
    var title=addTitle.value.trim();
    if(!title){
      if(url){ title=url.replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0]; }
      else title='New source';
    }
    snapshot();
    var id='new-'+(newCounter++);
    sources.push({id:id,title:title,feed:pendingFeed,w:2,kind:guessKind(url),unseen:0,perDay:0,skip:0,cap:0,flag:null,fresh:true});
    collapsed[pendingFeed]=false;
    expanded[id]=true;
    closeAdd();
    setTimeout(function(){ doFlash(); render();
      // scroll the new source into view
      setTimeout(function(){ var n=col.querySelector('[data-src="'+id+'"]'); if(n) n.scrollIntoView({behavior:'smooth',block:'center'}); },60);
    },160);
  });
  function guessKind(url){
    if(/youtube|youtu\.be/i.test(url)) return 'youtube';
    if(/podcast|\.rss|anchor|libsyn|simplecast/i.test(url)) return 'podcast';
    return 'rss';
  }

  /* ---------- sort tray ---------- */
  var tray=document.getElementById('tray');
  var barSort=document.getElementById('barSort');
  barSort.addEventListener('click', function(){
    var up=tray.classList.toggle('up');
    barSort.classList.toggle('on',up);
    syncSortChips();
  });
  document.getElementById('sortChips').addEventListener('click', function(e){
    var b=e.target.closest('[data-sort]'); if(!b) return;
    sortMode=b.getAttribute('data-sort'); syncSortChips(); doFlash(); render();
  });
  document.getElementById('feedOrderChips').addEventListener('click', function(e){
    var b=e.target.closest('[data-forder]'); if(!b) return;
    feedOrder=b.getAttribute('data-forder'); syncSortChips(); doFlash(); render();
  });
  function syncSortChips(){
    document.querySelectorAll('#sortChips .schip').forEach(function(c){ c.classList.toggle('on', c.getAttribute('data-sort')===sortMode); });
    document.querySelectorAll('#feedOrderChips .schip').forEach(function(c){ c.classList.toggle('on', c.getAttribute('data-forder')===feedOrder); });
  }

  /* ---------- collapse all ---------- */
  var barCollapse=document.getElementById('barCollapse');
  barCollapse.addEventListener('click', function(){
    var anyOpen=feeds.some(function(f){return !collapsed[f];});
    feeds.forEach(function(f){ collapsed[f]=anyOpen; });
    document.getElementById('collapseLbl').textContent = anyOpen ? 'Expand' : 'Collapse';
    render();
  });

  /* ---------- undo ---------- */
  document.getElementById('barUndo').addEventListener('click', function(){
    if(!undo) return;
    sources=JSON.parse(JSON.stringify(undo.sources));
    feeds=undo.feeds.slice();
    undo=null;
    this.classList.add('dis');
    deleteArm=null;
    doFlash(); render();
  });

  /* ---------- init ---------- */
  render();
})();
</script>
</body>
</html>
