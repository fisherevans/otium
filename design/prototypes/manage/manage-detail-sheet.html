<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>otium — library · master-detail</title>
<style>
  :root{
    --paper:#f4f2ec;
    --paper-2:#efece3;
    --ink:#1a1815;
    --ink-soft:#4b4740;
    --ink-mute:#8b857a;
    --rule:#c9c3b5;
    --rule-hard:#1a1815;
    --hair:#d9d4c8;
    --serif:"Charter","Iowan Old Style","Georgia",serif;
    --grot:"Helvetica Neue","Arial",sans-serif;
    --mono:"SF Mono","Menlo",ui-monospace,monospace;
    --didot:"Didot","Hoefler Text","Baskerville",serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:#3b3a36;
    background-image:radial-gradient(circle at 30% 20%, #4a4844 0%, #2c2b28 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    padding:18px;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;
    width:390px;height:844px;max-height:calc(100vh - 24px);
    background:var(--paper);
    border-radius:44px;
    box-shadow:0 0 0 2px #111, 0 0 0 12px #16150f, 0 30px 70px rgba(0,0,0,.55);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:30;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    mix-blend-mode:multiply;opacity:.6;
  }

  /* status bar */
  .status{
    position:relative;z-index:4;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 6px;
    font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--ink);
    flex:0 0 auto;
  }
  .status .dots{display:flex;gap:3px;align-items:center;}
  .status .bar{width:2px;background:var(--ink);}
  .status .bar:nth-child(1){height:5px}
  .status .bar:nth-child(2){height:7px}
  .status .bar:nth-child(3){height:9px}
  .status .bar:nth-child(4){height:11px}

  /* ---------- app header ---------- */
  header.app{
    position:relative;z-index:4;flex:0 0 auto;
    padding:6px 26px 10px;
    border-bottom:1.5px solid var(--rule-hard);
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .wordmark{
    font-family:var(--didot);
    font-size:30px;line-height:.9;letter-spacing:.01em;color:var(--ink);font-weight:400;
  }
  .hmeta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding-bottom:4px;}
  .hmeta .k{font-family:var(--grot);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mute);}
  .hmeta .n{font-family:var(--mono);font-size:11px;letter-spacing:.03em;color:var(--ink-soft);}

  /* ---------- stage ---------- */
  .stage{position:relative;flex:1 1 auto;overflow:hidden;z-index:3;min-height:0;display:flex;}

  /* full-invert e-ink refresh */
  .flash{position:absolute;inset:0;z-index:40;pointer-events:none;background:var(--ink);opacity:0;}
  .flash.go{animation:refresh .30s steps(2,end) forwards;}
  @keyframes refresh{0%{opacity:0}40%{opacity:.94}41%{opacity:.05}72%{opacity:.5}100%{opacity:0}}

  /* ---------- LIST screen ---------- */
  .listwrap{position:absolute;inset:0;display:flex;flex-direction:column;z-index:5;}

  .sortrow{
    flex:0 0 auto;display:flex;gap:0;align-items:stretch;overflow-x:auto;
    border-bottom:1.5px solid var(--rule-hard);background:var(--paper);
    scrollbar-width:none;
  }
  .sortrow::-webkit-scrollbar{width:0;height:0;}
  .sortrow .slbl{
    flex:0 0 auto;display:flex;align-items:center;padding:0 12px;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink-mute);border-right:1px solid var(--hair);
  }
  .schip{
    flex:0 0 auto;padding:10px 13px;background:transparent;border:0;cursor:pointer;
    font-family:var(--grot);font-size:11px;letter-spacing:.04em;color:var(--ink-soft);
    border-right:1px solid var(--hair);white-space:nowrap;position:relative;
  }
  .schip.on{color:var(--ink);font-weight:700;background:var(--paper-2);}
  .schip.on::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--ink);}
  .schip:active{background:var(--paper-2);}

  .listscroll{
    flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .listscroll::-webkit-scrollbar{width:0;height:0;}

  .fsect{
    font-family:var(--grot);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--ink);background:var(--paper-2);
    padding:7px 24px 6px;border-bottom:1px solid var(--hair);
    display:flex;justify-content:space-between;align-items:center;
    position:sticky;top:0;z-index:2;
  }
  .fsect .cnt{font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--ink-mute);}

  /* source row */
  .row{
    display:flex;align-items:center;gap:13px;
    padding:13px 22px 12px;border-bottom:1px solid var(--hair);
    cursor:pointer;position:relative;background:var(--paper);
    min-height:62px;
  }
  .row:active{background:var(--paper-2);}
  .row.arch{opacity:.5;}
  .row.arch .rname{text-decoration:line-through;text-decoration-thickness:1px;}

  /* weight mini-mark: 5 bars, cumulative ink fill */
  .wmark{flex:0 0 auto;display:flex;align-items:flex-end;gap:2px;height:16px;width:22px;position:relative;}
  .wmark i{width:2.6px;background:var(--paper);border:1px solid var(--rule-hard);border-radius:0;}
  .wmark i:nth-child(1){height:5px}
  .wmark i:nth-child(2){height:8px}
  .wmark i:nth-child(3){height:11px}
  .wmark i:nth-child(4){height:14px}
  .wmark i:nth-child(5){height:16px}
  .wmark i.f{background:var(--ink);}
  .wmark .fav{
    position:absolute;top:-4px;right:-4px;width:6px;height:6px;background:var(--ink);
    transform:rotate(45deg);
  }
  .wmark.dorm i{border-style:dashed;border-color:var(--ink-mute);}

  .rmain{flex:1 1 auto;min-width:0;}
  .rname{font-family:var(--serif);font-size:16.5px;line-height:1.1;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rsub{
    display:flex;align-items:center;gap:7px;margin-top:3px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.02em;color:var(--ink-mute);
  }
  .rsub .dot{width:2.5px;height:2.5px;background:var(--ink-mute);border-radius:50%;flex:0 0 auto;}
  .rsub .kind{font-family:var(--grot);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;}

  .rright{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;}
  .rsignal{font-family:var(--mono);font-size:14px;color:var(--ink);line-height:1;}
  .rsignal small{font-family:var(--grot);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute);display:block;margin-top:2px;}
  .stamp{
    font-family:var(--grot);font-size:8px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ink);border:1px solid var(--rule-hard);padding:2px 5px;background:var(--paper);
    line-height:1;white-space:nowrap;
  }
  .stamp.solid{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .stamp.ghost{color:var(--ink-mute);border-color:var(--rule);}
  .chev{flex:0 0 auto;margin-left:2px;}

  .archfoot{
    padding:14px 24px 30px;font-family:var(--grot);font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-mute);text-align:center;
  }

  /* ---------- list bottom bar ---------- */
  nav.actionbar{
    position:relative;z-index:8;flex:0 0 auto;height:58px;
    background:var(--paper);border-top:1.5px solid var(--rule-hard);display:flex;
  }
  .abtn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    font-family:var(--grot);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink);cursor:pointer;background:transparent;border:0;position:relative;
  }
  .abtn + .abtn{border-left:1px solid var(--hair);}
  .abtn:active{background:var(--paper-2);}
  .abtn.on{font-weight:700;background:var(--paper-2);}
  .abtn .ic{width:16px;height:16px;display:block;}
  .abtn .ic *{stroke:var(--ink);fill:none;stroke-width:1.4;}
  .abtn .cbadge{font-family:var(--mono);font-size:10px;letter-spacing:0;color:var(--ink-mute);}

  /* ---------- DETAIL screen ---------- */
  .detail{
    position:absolute;inset:0;z-index:15;background:var(--paper);
    transform:translateY(101%);transition:transform .34s steps(4,end);
    display:flex;flex-direction:column;
  }
  .detail.up{transform:translateY(0);}

  .dback{
    flex:0 0 auto;display:flex;align-items:center;gap:12px;
    padding:12px 20px 12px;border-bottom:1.5px solid var(--rule-hard);background:var(--paper);
  }
  .backbtn{
    display:flex;align-items:center;gap:7px;background:transparent;border:0;cursor:pointer;
    font-family:var(--grot);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);
    padding:6px 4px 6px 0;
  }
  .backbtn svg *{stroke:var(--ink);fill:none;stroke-width:1.6;}
  .dback .dkind{
    margin-left:auto;font-family:var(--grot);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink);border:1px solid var(--rule-hard);padding:3px 7px;background:var(--paper-2);
  }

  .dscroll{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .dscroll::-webkit-scrollbar{width:0;height:0;}

  .dhero{padding:20px 24px 16px;border-bottom:1.5px solid var(--rule-hard);}
  .dtitle-row{display:flex;align-items:flex-start;gap:10px;}
  .dtitle{
    flex:1 1 auto;font-family:var(--serif);font-weight:400;font-size:27px;line-height:1.12;
    color:var(--ink);border:0;background:transparent;padding:0;margin:0;
    outline:none;width:100%;letter-spacing:-.01em;
  }
  .dtitle-edit{
    flex:0 0 auto;width:30px;height:30px;border:1px solid var(--rule-hard);background:var(--paper);
    display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px;
  }
  .dtitle-edit svg *{stroke:var(--ink);fill:none;stroke-width:1.3;}
  .dtitle.editing{border-bottom:1.5px solid var(--rule-hard);}
  .dsub{
    display:flex;align-items:center;gap:8px;margin-top:9px;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;color:var(--ink-mute);
  }
  .dsub .dot{width:3px;height:3px;background:var(--ink-mute);border-radius:50%;}
  .dsub .flag{
    font-family:var(--grot);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);
    border:1px solid var(--rule-hard);padding:2px 6px;background:var(--paper);
  }
  .dsub .flag.solid{background:var(--ink);color:var(--paper);}

  /* section shell */
  .dsec{padding:20px 24px;border-bottom:1px solid var(--hair);}
  .dsec.hard{border-bottom:1.5px solid var(--rule-hard);}
  .seclbl{
    font-family:var(--grot);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--ink-mute);margin-bottom:14px;display:flex;justify-content:space-between;align-items:baseline;
  }
  .seclbl .now{font-family:var(--serif);font-size:14px;letter-spacing:0;text-transform:none;color:var(--ink);font-style:italic;}

  /* ---- weight ladder (primary control) ---- */
  .ladder{display:flex;align-items:flex-end;gap:6px;height:88px;}
  .lstep{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    gap:0;cursor:pointer;background:transparent;border:0;padding:0;position:relative;height:100%;
  }
  .lstep .col{
    width:100%;border:1.5px solid var(--rule-hard);background:var(--paper);position:relative;
    transition:background .12s steps(2,end);
  }
  .lstep:nth-child(1) .col{height:24%}
  .lstep:nth-child(2) .col{height:40%}
  .lstep:nth-child(3) .col{height:56%}
  .lstep:nth-child(4) .col{height:74%}
  .lstep:nth-child(5) .col{height:92%}
  .lstep.f .col{background:var(--ink);}
  .lstep.sel .col{border-color:var(--rule-hard);box-shadow:inset 0 0 0 2px var(--paper),0 0 0 2px var(--rule-hard);}
  .lstep .favmark{
    position:absolute;top:-3px;left:50%;transform:translateX(-50%) rotate(45deg);
    width:8px;height:8px;background:var(--ink);opacity:0;
  }
  .lstep.f.favstep .favmark{opacity:1;}
  .lcap{display:flex;margin-top:8px;}
  .llabels{display:flex;gap:6px;margin-top:9px;}
  .llabels button{
    flex:1;background:transparent;border:0;cursor:pointer;padding:0;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink-mute);text-align:center;line-height:1.2;
  }
  .llabels button.sel{color:var(--ink);font-weight:700;}
  .whint{
    margin-top:14px;font-family:var(--serif);font-size:13.5px;font-style:italic;line-height:1.4;
    color:var(--ink-soft);
  }
  .lstep.stamp-pulse .col{animation:colstamp .28s steps(3,end);}
  @keyframes colstamp{0%{transform:scaleY(.5)}60%{transform:scaleY(1.06)}100%{transform:scaleY(1)}}

  /* ---- cap stepper ---- */
  .cap{display:flex;align-items:stretch;border:1.5px solid var(--rule-hard);width:100%;height:52px;}
  .capbtn{
    flex:0 0 56px;background:var(--paper);border:0;cursor:pointer;
    font-family:var(--serif);font-size:26px;color:var(--ink);display:flex;align-items:center;justify-content:center;
  }
  .capbtn:active{background:var(--paper-2);}
  .capbtn.mid{border-left:1px solid var(--rule-hard);border-right:1px solid var(--rule-hard);}
  .capval{
    flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    border-left:1.5px solid var(--rule-hard);border-right:1.5px solid var(--rule-hard);
  }
  .capval .v{font-family:var(--mono);font-size:19px;color:var(--ink);line-height:1;}
  .capval .u{font-family:var(--grot);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);}
  .caphint{margin-top:12px;font-family:var(--serif);font-size:13px;font-style:italic;color:var(--ink-soft);line-height:1.4;}

  /* ---- feed chips ---- */
  .feeds{display:flex;flex-wrap:wrap;gap:9px;}
  .fchip{
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;
    font-family:var(--grot);font-size:12px;letter-spacing:.03em;color:var(--ink-soft);
    border:1.5px solid var(--rule-hard);background:var(--paper);padding:8px 12px;position:relative;
  }
  .fchip .box{width:11px;height:11px;border:1.5px solid var(--rule-hard);background:var(--paper);flex:0 0 auto;position:relative;}
  .fchip.on{color:var(--ink);font-weight:700;background:var(--paper-2);}
  .fchip.on .box{background:var(--ink);}
  .fchip.on .box::after{content:"";position:absolute;left:2px;top:2px;width:5px;height:5px;background:var(--paper);}
  .fchip:active{background:var(--paper-2);}
  .fchip.stamp-pulse{animation:chipstamp .26s steps(2,end);}
  @keyframes chipstamp{0%{background:var(--ink)}100%{}}
  .newfeed{font-family:var(--serif);font-style:italic;color:var(--ink-mute);border-style:dashed;}

  /* ---- state segmented ---- */
  .seg{display:flex;border:1.5px solid var(--rule-hard);width:100%;}
  .segbtn{
    flex:1;padding:12px 4px;background:var(--paper);border:0;cursor:pointer;
    font-family:var(--grot);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);
    position:relative;
  }
  .segbtn + .segbtn{border-left:1.5px solid var(--rule-hard);}
  .segbtn.on{background:var(--ink);color:var(--paper);font-weight:700;}
  .segbtn:active{background:var(--paper-2);}
  .segbtn.on:active{background:var(--ink);}
  .seghint{margin-top:12px;font-family:var(--serif);font-size:13px;font-style:italic;color:var(--ink-soft);line-height:1.4;}

  /* ---- stats grid ---- */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--hair);}
  .stat{padding:14px 16px;border-right:1px solid var(--hair);border-bottom:1px solid var(--hair);}
  .stat:nth-child(2n){border-right:0;}
  .stat:nth-last-child(-n+2){border-bottom:0;}
  .stat .sv{font-family:var(--mono);font-size:22px;color:var(--ink);line-height:1;}
  .stat .sv em{font-family:var(--serif);font-size:13px;font-style:normal;color:var(--ink-mute);}
  .stat .sk{font-family:var(--grot);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);margin-top:7px;}

  /* ---- feed-health / outlier ---- */
  .health{border:1.5px solid var(--rule-hard);background:var(--paper-2);padding:16px 16px 18px;}
  .health .hh{font-family:var(--grot);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .health .hh .badge{border:1px solid var(--rule-hard);padding:2px 5px;background:var(--ink);color:var(--paper);}
  .hbar{margin-bottom:13px;}
  .hbar .top{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:5px;}
  .hbar .top b{color:var(--ink);font-weight:400;}
  .htrack{height:12px;border:1.5px solid var(--rule-hard);background:var(--paper);position:relative;overflow:hidden;}
  .htrack .fill{position:absolute;left:0;top:0;bottom:0;background:var(--ink);}
  /* diagonal hatch for the "skip" bar to distinguish grayscale meaning */
  .htrack.hatch .fill{
    background-image:repeating-linear-gradient(45deg,var(--ink) 0 2px,transparent 2px 4px);
    background-color:transparent;
  }
  .hnote{font-family:var(--serif);font-size:13.5px;line-height:1.45;color:var(--ink);margin-top:4px;}
  .hnote b{font-weight:400;font-style:italic;}
  .hacts{display:flex;gap:9px;margin-top:14px;}
  .hact{
    flex:1;padding:10px 6px;border:1.5px solid var(--rule-hard);background:var(--paper);cursor:pointer;
    font-family:var(--grot);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);text-align:center;
  }
  .hact:active{background:var(--paper-2);}
  .hact.solid{background:var(--ink);color:var(--paper);}

  /* ---- footer destructive actions ---- */
  .dfoot{
    flex:0 0 auto;display:flex;border-top:1.5px solid var(--rule-hard);background:var(--paper);
  }
  .dfbtn{
    flex:1;padding:16px 6px;background:transparent;border:0;cursor:pointer;
    font-family:var(--grot);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .dfbtn + .dfbtn{border-left:1.5px solid var(--rule-hard);}
  .dfbtn:active{background:var(--paper-2);}
  .dfbtn .ic{width:15px;height:15px;}
  .dfbtn .ic *{stroke:var(--ink);fill:none;stroke-width:1.4;}
  .dfbtn.armed{background:var(--ink);color:var(--paper);}
  .dfbtn.armed .ic *{stroke:var(--paper);}

  /* ---------- add-source sheet ---------- */
  .addsheet{
    position:absolute;inset:0;z-index:20;background:var(--paper);
    transform:translateY(101%);transition:transform .32s steps(4,end);
    display:flex;flex-direction:column;padding:22px 24px;
  }
  .addsheet.up{transform:translateY(0);}
  .ahead{display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--rule-hard);padding-bottom:12px;margin-bottom:20px;}
  .ahead h3{font-family:var(--serif);font-weight:400;font-size:23px;color:var(--ink);margin:0;}
  .xclose{
    width:34px;height:34px;border:1.5px solid var(--rule-hard);background:var(--paper);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:var(--grot);font-size:18px;color:var(--ink);
  }
  .afield{margin-bottom:20px;}
  .afield .fl{font-family:var(--grot);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:9px;}
  .ainput{
    width:100%;border:1.5px solid var(--rule-hard);background:var(--paper);padding:13px 13px;
    font-family:var(--mono);font-size:14px;color:var(--ink);outline:none;
  }
  .ainput::placeholder{color:var(--ink-mute);}
  .add-go{
    margin-top:auto;width:100%;min-height:54px;border:1.5px solid var(--rule-hard);background:var(--ink);color:var(--paper);
    font-family:var(--serif);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .add-go:active{transform:translateY(1px);}
  .aptrial{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-soft);margin-top:14px;text-align:center;line-height:1.4;}

  /* toast */
  .toast{
    position:absolute;left:50%;bottom:74px;transform:translateX(-50%) translateY(20px);
    z-index:35;background:var(--ink);color:var(--paper);
    font-family:var(--grot);font-size:11px;letter-spacing:.06em;padding:10px 16px;
    border:1px solid var(--ink);opacity:0;pointer-events:none;transition:opacity .2s steps(2),transform .2s steps(2);
    max-width:300px;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

<script>
(function(){
  "use strict";

  var WLABEL=['very low','low','normal','high','favorite'];
  var WSHORT=['v.low','low','norm','high','fav'];
  var WHINT=[
    'Barely surfaces — only when a session runs thin.',
    'Turned down. Shows up occasionally, never crowds.',
    'Default weight. Competes fairly with everything else.',
    'Turned up. Prioritized when composing a session.',
    'Favorite. Rarely held back — near the top every time.'
  ];
  var FEEDS=['News','Comedy','Science','Tech','Music','Curiosity'];

  // fixture
  var sources=[
    {id:1, name:'NPR News',      feeds:['News'],      w:2, kind:'rss',     unseen:12, perDay:8,   skip:22, state:'followed', cap:null, flag:null,        fetch:'14m ago'},
    {id:2, name:'BBC News',      feeds:['News'],      w:2, kind:'rss',     unseen:20, perDay:30,  skip:40, state:'followed', cap:5,    flag:'noisy',     fetch:'6m ago'},
    {id:3, name:'Tom Scott',     feeds:['Curiosity'], w:4, kind:'youtube', unseen:3,  perDay:0.2, skip:5,  state:'followed', cap:null, flag:'rare',      fetch:'2d ago'},
    {id:4, name:'Kurzgesagt',    feeds:['Science'],   w:4, kind:'youtube', unseen:2,  perDay:0.1, skip:8,  state:'followed', cap:null, flag:'rare',      fetch:'5d ago'},
    {id:5, name:'Veritasium',    feeds:['Science'],   w:3, kind:'youtube', unseen:4,  perDay:0.2, skip:12, state:'followed', cap:null, flag:null,        fetch:'1d ago'},
    {id:6, name:'The Verge',     feeds:['Tech'],      w:3, kind:'rss',     unseen:18, perDay:15,  skip:35, state:'followed', cap:4,    flag:'noisy',     fetch:'22m ago'},
    {id:7, name:'Hacker News',   feeds:['Tech'],      w:1, kind:'rss',     unseen:40, perDay:30,  skip:60, state:'followed', cap:3,    flag:'very noisy',fetch:'3m ago'},
    {id:8, name:'99% Invisible', feeds:['Curiosity'], w:4, kind:'podcast', unseen:1,  perDay:0.1, skip:3,  state:'followed', cap:null, flag:'rare',      fetch:'1d ago'},
    {id:9, name:'Scumbag Dad',   feeds:['Comedy'],    w:2, kind:'youtube', unseen:8,  perDay:1,   skip:15, state:'followed', cap:null, flag:null,        fetch:'8h ago'},
    {id:10,name:'Ryan George',   feeds:['Comedy'],    w:3, kind:'youtube', unseen:2,  perDay:0.3, skip:10, state:'followed', cap:null, flag:null,        fetch:'3d ago'},
    {id:11,name:'NPR Music',     feeds:['Music'],     w:1, kind:'rss',     unseen:6,  perDay:2,   skip:45, state:'followed', cap:null, flag:null,        fetch:'1h ago'},
    {id:12,name:'Pitchfork',     feeds:['Music'],     w:2, kind:'rss',     unseen:10, perDay:5,   skip:30, state:'followed', cap:null, flag:null,        fetch:'40m ago'},
    {id:13,name:'CGP Grey',      feeds:['Curiosity'], w:3, kind:'youtube', unseen:0,  perDay:0,   skip:0,  state:'followed', cap:null, flag:'dormant',   fetch:'4 months ago', dormant:true}
  ];

  var sortMode='weight';
  var showArchived=false;
  var currentId=null;
  var delArmed=false;

  var $=function(s){return document.querySelector(s);};
  var flash=$('#flash');
  function refresh(){ flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go'); }

  var toastEl=$('#toast'); var toastT;
  function toast(msg){
    toastEl.textContent=msg; toastEl.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove('show');},1900);
  }

  function fmtDay(n){ if(n===0) return '0'; if(n<1) return n.toFixed(1); return String(n); }
  function kindLabel(k){ return k.toUpperCase(); }

  // weight mini-mark
  function wmark(w, dorm){
    var bars='';
    for(var i=0;i<5;i++){ bars+='<i class="'+(i<=w?'f':'')+'"></i>'; }
    var fav=(w===4)?'<span class="fav"></span>':'';
    return '<div class="wmark'+(dorm?' dorm':'')+'">'+bars+fav+'</div>';
  }

  // signal cell depends on sort
  function signalCell(s){
    if(sortMode==='noise'){ return '<div class="rsignal">'+fmtDay(s.perDay)+'<small>/day</small></div>'; }
    if(sortMode==='skip'){  return '<div class="rsignal">'+s.skip+'%<small>skipped</small></div>'; }
    return '<div class="rsignal">'+s.unseen+'<small>unseen</small></div>';
  }
  function flagStamp(s){
    if(s.flag==='dormant') return '<span class="stamp ghost">Dormant</span>';
    if(s.flag==='very noisy') return '<span class="stamp solid">Very noisy</span>';
    if(s.flag==='noisy') return '<span class="stamp">Noisy</span>';
    if(s.flag==='rare') return '<span class="stamp ghost">Rare</span>';
    return '';
  }

  var chev='<span class="chev"><svg width="8" height="13" viewBox="0 0 8 13"><path d="M1 1l5.5 5.5L1 12" fill="none" stroke="#8b857a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';

  function rowHTML(s){
    var trial = s.state==='trial' ? '<span class="stamp ghost">Trial</span>' : '';
    return '<div class="row'+(s.state==='archived'?' arch':'')+'" data-id="'+s.id+'">'+
      wmark(s.w, s.dormant)+
      '<div class="rmain">'+
        '<div class="rname">'+s.name+'</div>'+
        '<div class="rsub"><span class="kind">'+kindLabel(s.kind)+'</span><span class="dot"></span><span>'+s.feeds.join(' · ')+'</span></div>'+
      '</div>'+
      '<div class="rright">'+trial+flagStamp(s)+signalCell(s)+'</div>'+
      chev+
    '</div>';
  }

  function visibleSources(){
    return sources.filter(function(s){ return showArchived ? s.state==='archived' : s.state!=='archived'; });
  }

  function renderList(){
    var host=$('#listscroll');
    var list=visibleSources();
    var html='';

    if(sortMode==='feed' && !showArchived){
      FEEDS.forEach(function(f){
        var inF=list.filter(function(s){return s.feeds.indexOf(f)>=0;});
        if(!inF.length) return;
        inF.sort(function(a,b){return b.w-a.w || a.name.localeCompare(b.name);});
        html+='<div class="fsect">'+f+'<span class="cnt">'+inF.length+'</span></div>';
        inF.forEach(function(s){ html+=rowHTML(s); });
      });
    } else {
      list.sort(function(a,b){
        if(sortMode==='weight') return b.w-a.w || a.name.localeCompare(b.name);
        if(sortMode==='alpha')  return a.name.localeCompare(b.name);
        if(sortMode==='noise')  return b.perDay-a.perDay || a.name.localeCompare(b.name);
        if(sortMode==='skip')   return b.skip-a.skip || a.name.localeCompare(b.name);
        return 0;
      });
      list.forEach(function(s){ html+=rowHTML(s); });
    }

    if(showArchived && !list.length){
      html='<div class="archfoot">No archived sources</div>';
    } else if(!showArchived){
      var arch=sources.filter(function(s){return s.state==='archived';}).length;
      html+='<div class="archfoot">'+list.length+' active · '+arch+' archived</div>';
    }
    host.innerHTML=html;

    var active=sources.filter(function(s){return s.state!=='archived';}).length;
    $('#hcount').textContent=active+' sources';
    var archN=sources.filter(function(s){return s.state==='archived';}).length;
    $('#archCount').textContent=archN;
    $('#archToggle').classList.toggle('on', showArchived);
  }

  // ---- feed health ----
  function feedHealth(s){
    // share of the source's PRIMARY feed daily volume
    var f=s.feeds[0];
    var inF=sources.filter(function(x){return x.feeds.indexOf(f)>=0 && x.state!=='archived';});
    var total=inF.reduce(function(a,x){return a+x.perDay;},0);
    var share= total>0 ? Math.round(s.perDay/total*100) : 0;
    return {feed:f, share:share, skip:s.skip, others:inF.length-1};
  }

  // ---- DETAIL render ----
  function ladderHTML(s){
    var steps='';
    for(var i=0;i<5;i++){
      var filled = i<=s.w;
      steps+='<button class="lstep'+(filled?' f':'')+(i===s.w?' sel':'')+(i===4?' favstep':'')+'" data-w="'+i+'">'+
        '<span class="favmark"></span><span class="col"></span></button>';
    }
    var labels='';
    for(var j=0;j<5;j++){ labels+='<button data-w="'+j+'" class="'+(j===s.w?'sel':'')+'">'+WSHORT[j]+'</button>'; }
    return '<div class="ladder" id="ladder">'+steps+'</div>'+
           '<div class="llabels" id="llabels">'+labels+'</div>'+
           '<div class="whint" id="whint">'+WHINT[s.w]+'</div>';
  }

  function feedChipsHTML(s){
    var h='';
    FEEDS.forEach(function(f){
      var on=s.feeds.indexOf(f)>=0;
      h+='<button class="fchip'+(on?' on':'')+'" data-feed="'+f+'"><span class="box"></span>'+f+'</button>';
    });
    return h;
  }

  function healthHTML(s){
    var h=feedHealth(s);
    var outlier = h.share>=40 && h.skip>=30;
    var loud = s.perDay>=10;
    if(!outlier && !loud) return '';
    var note;
    if(outlier){
      note='<b>'+s.name+' is '+h.share+'% of your '+h.feed+' volume</b>, and you skip '+h.skip+'% of what it sends. It is crowding the feed with items you pass on.';
    } else {
      note='<b>'+s.name+' posts '+fmtDay(s.perDay)+'/day</b> — '+h.share+'% of your '+h.feed+' volume. Heavy, but you keep most of it.';
    }
    return '<div class="dsec hard"><div class="seclbl">Feed health</div>'+
      '<div class="health">'+
        '<div class="hh">'+h.feed+' feed'+(outlier?'<span class="badge">Outlier</span>':'')+'</div>'+
        '<div class="hbar"><div class="top"><span>Share of feed volume</span><b>'+h.share+'%</b></div>'+
          '<div class="htrack"><div class="fill" style="width:'+Math.min(h.share,100)+'%"></div></div></div>'+
        '<div class="hbar"><div class="top"><span>You skip</span><b>'+h.skip+'%</b></div>'+
          '<div class="htrack hatch"><div class="fill" style="width:'+Math.min(h.skip,100)+'%"></div></div></div>'+
        '<div class="hnote">'+note+'</div>'+
        (outlier?'<div class="hacts"><button class="hact" data-hact="down">Turn down</button><button class="hact solid" data-hact="cap">Cap it</button></div>':'')+
      '</div></div>';
  }

  function capText(s){
    if(s.cap===null) return {v:'—', u:'no cap'};
    return {v:String(s.cap), u:'per session'};
  }

  function detailHTML(s){
    var flags='';
    if(s.flag){
      var cls=(s.flag==='very noisy')?'flag solid':'flag';
      flags='<span class="dot"></span><span class="'+cls+'">'+s.flag+'</span>';
    }
    var ct=capText(s);
    var seghints={
      followed:'Active. Contributes to every session by its weight.',
      trial:'On a two-week trial. otium keeps or drops it based on your skips.',
      archived:'Muted but kept. History and settings preserved — reversible anytime.'
    };
    var health=healthHTML(s);
    return ''+
    '<div class="dhero">'+
      '<div class="dtitle-row">'+
        '<input class="dtitle" id="dTitle" value="'+s.name.replace(/"/g,'&quot;')+'" readonly>'+
        '<button class="dtitle-edit" id="dTitleEdit" title="Edit title"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M9.5 2.5l2 2L5 11l-2.5.5L3 9z" stroke-linejoin="round"/></svg></button>'+
      '</div>'+
      '<div class="dsub"><span>'+s.feeds.join(' · ')+'</span><span class="dot"></span><span>'+kindLabel(s.kind)+'</span>'+flags+'</div>'+
    '</div>'+

    '<div class="dsec hard">'+
      '<div class="seclbl">Weight <span class="now" id="wNow">'+WLABEL[s.w]+'</span></div>'+
      ladderHTML(s)+
    '</div>'+

    '<div class="dsec hard">'+
      '<div class="seclbl">Per-session cap <span class="now" id="capNow">'+(s.cap===null?'off':'max '+s.cap)+'</span></div>'+
      '<div class="cap">'+
        '<button class="capbtn" id="capMinus">&minus;</button>'+
        '<div class="capval"><span class="v" id="capV">'+ct.v+'</span><span class="u" id="capU">'+ct.u+'</span></div>'+
        '<button class="capbtn mid" id="capPlus">+</button>'+
      '</div>'+
      '<div class="caphint">Hard limit on how many items this source can put in one session. Tames floods without turning it down.</div>'+
    '</div>'+

    '<div class="dsec hard">'+
      '<div class="seclbl">Feeds</div>'+
      '<div class="feeds" id="dFeeds">'+feedChipsHTML(s)+'</div>'+
    '</div>'+

    health+

    '<div class="dsec hard">'+
      '<div class="seclbl">State</div>'+
      '<div class="seg" id="dSeg">'+
        '<button class="segbtn'+(s.state==='followed'?' on':'')+'" data-state="followed">Followed</button>'+
        '<button class="segbtn'+(s.state==='trial'?' on':'')+'" data-state="trial">Trial</button>'+
        '<button class="segbtn'+(s.state==='archived'?' on':'')+'" data-state="archived">Archived</button>'+
      '</div>'+
      '<div class="seghint" id="segHint">'+seghints[s.state]+'</div>'+
    '</div>'+

    '<div class="dsec">'+
      '<div class="seclbl">Statistics</div>'+
      '<div class="stats">'+
        '<div class="stat"><div class="sv">'+s.unseen+'</div><div class="sk">Unseen</div></div>'+
        '<div class="stat"><div class="sv">'+fmtDay(s.perDay)+' <em>/day</em></div><div class="sk">Post rate</div></div>'+
        '<div class="stat"><div class="sv">'+s.skip+'<em>%</em></div><div class="sk">Skipped</div></div>'+
        '<div class="stat"><div class="sv" style="font-size:15px;line-height:1.2">'+s.fetch+'</div><div class="sk">Last fetch</div></div>'+
      '</div>'+
    '</div>'+
    '<div style="height:16px"></div>';
  }

  function byId(id){ for(var i=0;i<sources.length;i++){ if(sources[i].id===id) return sources[i]; } return null; }

  var detail=$('#detail');
  var dscroll=$('#dscroll');

  function openDetail(id){
    currentId=id; delArmed=false;
    var s=byId(id);
    $('#dKind').textContent=kindLabel(s.kind);
    dscroll.innerHTML=detailHTML(s);
    dscroll.scrollTop=0;
    updateFootLabels(s);
    refresh();
    setTimeout(function(){ detail.classList.add('up'); }, 130);
    wireDetail();
  }
  function closeDetail(){
    detail.classList.remove('up');
    refresh();
    renderList();
  }

  function updateFootLabels(s){
    $('#archLbl').textContent = s.state==='archived' ? 'Unarchive' : 'Archive';
    $('#delLbl').textContent = delArmed ? 'Tap to confirm' : 'Remove';
    $('#delBtn').classList.toggle('armed', delArmed);
    $('#archBtn').classList.toggle('armed', s.state==='archived');
  }

  // ---- detail interactions ----
  function setWeight(s, w){
    if(w===s.w){ return; }
    s.w=w;
    // repaint ladder + labels
    var steps=dscroll.querySelectorAll('#ladder .lstep');
    steps.forEach(function(st,i){
      st.classList.toggle('f', i<=w);
      st.classList.toggle('sel', i===w);
    });
    var lbls=dscroll.querySelectorAll('#llabels button');
    lbls.forEach(function(b,i){ b.classList.toggle('sel', i===w); });
    $('#wNow').textContent=WLABEL[w];
    $('#whint').textContent=WHINT[w];
    // stamp pulse on the selected column
    var sel=steps[w];
    if(sel){ sel.classList.remove('stamp-pulse'); void sel.offsetWidth; sel.classList.add('stamp-pulse'); }
  }

  function setCap(s, delta){
    var order=[null,1,2,3,4,5,6,8,10]; // null = no cap (top)
    var idx=order.indexOf(s.cap);
    if(idx<0) idx=0;
    idx+=delta; // +delta increases number; -delta -> toward no cap
    if(idx<0) idx=0; if(idx>order.length-1) idx=order.length-1;
    s.cap=order[idx];
    var ct=capText(s);
    $('#capV').textContent=ct.v;
    $('#capU').textContent=ct.u;
    $('#capNow').textContent = s.cap===null?'off':'max '+s.cap;
  }

  function toggleFeed(s, f, chip){
    var i=s.feeds.indexOf(f);
    if(i>=0){
      if(s.feeds.length===1){ toast('A source needs at least one feed'); return; }
      s.feeds.splice(i,1); chip.classList.remove('on');
    } else {
      s.feeds.push(f); chip.classList.add('on');
      chip.classList.remove('stamp-pulse'); void chip.offsetWidth; chip.classList.add('stamp-pulse');
    }
    // reflect in hero subtitle
    var hero=dscroll.querySelector('.dsub span:first-child');
    if(hero) hero.textContent=s.feeds.join(' · ');
  }

  function setState(s, st){
    s.state=st;
    dscroll.querySelectorAll('#dSeg .segbtn').forEach(function(b){
      b.classList.toggle('on', b.dataset.state===st);
    });
    var hints={
      followed:'Active. Contributes to every session by its weight.',
      trial:'On a two-week trial. otium keeps or drops it based on your skips.',
      archived:'Muted but kept. History and settings preserved — reversible anytime.'
    };
    $('#segHint').textContent=hints[st];
    updateFootLabels(s);
  }

  function wireDetail(){
    var s=byId(currentId);

    // title edit
    var tEdit=$('#dTitleEdit'), tInput=$('#dTitle');
    tEdit.addEventListener('click', function(){
      if(tInput.hasAttribute('readonly')){
        tInput.removeAttribute('readonly'); tInput.classList.add('editing'); tInput.focus(); tInput.select();
      } else { commitTitle(); }
    });
    function commitTitle(){
      var v=tInput.value.trim(); if(!v){ v=s.name; tInput.value=v; }
      s.name=v; tInput.setAttribute('readonly',''); tInput.classList.remove('editing');
    }
    tInput.addEventListener('blur', commitTitle);
    tInput.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); tInput.blur(); } });

    // weight ladder + labels (event delegation)
    var ladder=$('#ladder'), llabels=$('#llabels');
    function wHandler(e){ var b=e.target.closest('[data-w]'); if(!b) return; setWeight(s, parseInt(b.dataset.w,10)); }
    ladder.addEventListener('click', wHandler);
    llabels.addEventListener('click', wHandler);

    // cap
    $('#capPlus').addEventListener('click', function(){ setCap(s, +1); });
    $('#capMinus').addEventListener('click', function(){ setCap(s, -1); });

    // feeds
    $('#dFeeds').addEventListener('click', function(e){
      var c=e.target.closest('[data-feed]'); if(!c) return; toggleFeed(s, c.dataset.feed, c);
    });

    // state
    $('#dSeg').addEventListener('click', function(e){
      var b=e.target.closest('[data-state]'); if(!b) return; setState(s, b.dataset.state);
    });

    // health quick-acts
    var hacts=dscroll.querySelector('.hacts');
    if(hacts){
      hacts.addEventListener('click', function(e){
        var b=e.target.closest('[data-hact]'); if(!b) return;
        if(b.dataset.hact==='down'){
          setWeight(s, Math.max(0, s.w-1));
          toast('Turned '+s.name+' down to '+WLABEL[s.w]);
        } else {
          if(s.cap===null) s.cap=6;
          setCap(s, +0); // no-op recalc
          // step down to a tighter cap
          setCap(s, -1);
          toast('Capped '+s.name+' at '+s.cap+' per session');
        }
      });
    }
  }

  // footer actions
  $('#archBtn').addEventListener('click', function(){
    var s=byId(currentId);
    if(s.state==='archived'){ s.state='followed'; toast(s.name+' unarchived'); updateFootLabels(s); setState(s,'followed'); }
    else { s.state='archived'; toast(s.name+' archived — muted, kept'); closeDetail(); }
  });
  $('#delBtn').addEventListener('click', function(){
    var s=byId(currentId);
    if(!delArmed){ delArmed=true; updateFootLabels(s); toast('Removing deletes it and its history. Tap again.');
      setTimeout(function(){ if(delArmed){ delArmed=false; updateFootLabels(s); } }, 3500);
      return; }
    // delete
    sources=sources.filter(function(x){return x.id!==currentId;});
    delArmed=false; toast(s.name+' removed'); closeDetail();
  });

  $('#backBtn').addEventListener('click', closeDetail);

  // ---- list interactions ----
  $('#listscroll').addEventListener('click', function(e){
    var row=e.target.closest('.row'); if(!row) return;
    openDetail(parseInt(row.dataset.id,10));
  });

  $('#sortrow').addEventListener('click', function(e){
    var c=e.target.closest('[data-sort]'); if(!c) return;
    if(sortMode===c.dataset.sort) return;
    sortMode=c.dataset.sort;
    $('#sortrow').querySelectorAll('.schip').forEach(function(b){ b.classList.toggle('on', b.dataset.sort===sortMode); });
    if(showArchived){ showArchived=false; }
    refresh(); renderList();
  });

  $('#archToggle').addEventListener('click', function(){
    showArchived=!showArchived; refresh(); renderList();
  });

  // ---- add sheet ----
  var addsheet=$('#addsheet');
  var addFeed='News';
  $('#addFeeds').innerHTML=FEEDS.map(function(f){
    return '<button class="fchip'+(f==='News'?' on':'')+'" data-feed="'+f+'"><span class="box"></span>'+f+'</button>';
  }).join('');
  $('#addFeeds').addEventListener('click', function(e){
    var c=e.target.closest('[data-feed]'); if(!c) return;
    addFeed=c.dataset.feed;
    $('#addFeeds').querySelectorAll('.fchip').forEach(function(b){ b.classList.toggle('on', b.dataset.feed===addFeed); });
  });
  $('#addBtn').addEventListener('click', function(){ addsheet.classList.add('up'); $('#addUrl').value=''; });
  $('#addClose').addEventListener('click', function(){ addsheet.classList.remove('up'); });
  $('#addGo').addEventListener('click', function(){
    var url=$('#addUrl').value.trim();
    var name=deriveName(url);
    var kind=/youtube|youtu\.be/.test(url)?'youtube':(/podcast|rss|feed|\.xml/.test(url)?'rss':'rss');
    var nid=Math.max.apply(null, sources.map(function(s){return s.id;}).concat([0]))+1;
    sources.push({id:nid, name:name, feeds:[addFeed], w:2, kind:kind, unseen:0, perDay:0, skip:0, state:'trial', cap:null, flag:null, fetch:'never'});
    addsheet.classList.remove('up');
    showArchived=false; sortMode='feed';
    $('#sortrow').querySelectorAll('.schip').forEach(function(b){ b.classList.toggle('on', b.dataset.sort==='feed'); });
    refresh(); renderList();
    toast(name+' added to '+addFeed+' — on trial');
  });
  function deriveName(url){
    if(!url) return 'New source';
    var m=url.replace(/^https?:\/\//,'').replace(/^www\./,'');
    m=m.split('/')[0].split('.')[0];
    return m.charAt(0).toUpperCase()+m.slice(1);
  }

  // keyboard (desktop preview)
  window.addEventListener('keydown', function(e){
    if(e.key==='Escape'){
      if(addsheet.classList.contains('up')) addsheet.classList.remove('up');
      else if(detail.classList.contains('up')) closeDetail();
    }
  });

  renderList();
})();
</script>
