<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>otium — e-ink pager</title>
<style>
  :root{
    --paper:#f4f2ec;
    --paper-2:#efece3;
    --ink:#1a1815;
    --ink-soft:#4b4740;
    --ink-mute:#8b857a;
    --rule:#c9c3b5;
    --rule-hard:#1a1815;
    --hair:#d9d4c8;
    --serif:"Charter","Iowan Old Style","Georgia",serif;
    --grot:"Helvetica Neue","Arial",sans-serif;
    --mono:"SF Mono","Menlo",ui-monospace,monospace;
    --didot:"Didot","Hoefler Text","Baskerville",serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:#3b3a36;
    background-image:radial-gradient(circle at 30% 20%, #4a4844 0%, #2c2b28 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    padding:18px;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;
    width:390px;height:844px;max-height:calc(100vh - 24px);
    background:var(--paper);
    border-radius:44px;
    box-shadow:0 0 0 2px #111, 0 0 0 12px #16150f, 0 30px 70px rgba(0,0,0,.55);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  /* paper grain */
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:60;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    mix-blend-mode:multiply;opacity:.6;
  }
  /* status bar */
  .status{
    position:relative;z-index:12;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 6px;
    font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--ink);
    flex:0 0 auto;
  }
  .status .dots{display:flex;gap:3px;align-items:center;}
  .status .bar{width:2px;background:var(--ink);}
  .status .bar:nth-child(1){height:5px}
  .status .bar:nth-child(2){height:7px}
  .status .bar:nth-child(3){height:9px}
  .status .bar:nth-child(4){height:11px}

  /* ---------- app header / progress strip ---------- */
  header.app{
    position:relative;z-index:12;flex:0 0 auto;
    padding:4px 26px 10px;
    border-bottom:1.5px solid var(--rule-hard);
    display:flex;align-items:center;justify-content:space-between;gap:14px;
  }
  .wordmark{
    font-family:var(--didot);
    font-size:26px;line-height:.9;letter-spacing:.01em;color:var(--ink);
    font-weight:400;
  }
  .prog{
    flex:1;display:flex;align-items:center;gap:5px;justify-content:flex-end;
  }
  .prog .seg{
    width:20px;height:4px;background:var(--paper-2);
    border:1px solid var(--rule-hard);position:relative;overflow:hidden;
  }
  .prog .seg.done::after{content:"";position:absolute;inset:0;background:var(--ink);}
  .prog .seg.cur::after{
    content:"";position:absolute;inset:0;background:var(--ink);
    background-image:repeating-linear-gradient(90deg,var(--paper) 0 1.5px,transparent 1.5px 3px);
  }
  .prog .pnum{
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink-soft);
    margin-left:4px;min-width:34px;text-align:right;
  }

  /* ---------- stage: the pager ---------- */
  .stage{position:relative;flex:1 1 auto;overflow:hidden;z-index:3;}

  /* edge page-position tick */
  .rail{
    position:absolute;top:0;bottom:0;right:0;width:5px;z-index:14;
    background:var(--paper-2);border-left:1px solid var(--hair);
    display:flex;flex-direction:column;
  }
  .rail .tick{flex:1;border-bottom:1px solid var(--hair);position:relative;}
  .rail .tick:last-child{border-bottom:0;}
  .rail .tick.on::after{
    content:"";position:absolute;inset:1px;background:var(--ink);
  }
  .rail .tick.seen::after{
    content:"";position:absolute;inset:1px;background:var(--rule);
  }

  /* pages track */
  .track{
    position:absolute;inset:0;right:5px;
    transition:transform .01s;
  }
  .page{
    position:absolute;left:0;right:0;height:100%;
    padding:16px 22px 96px;
    display:flex;flex-direction:column;
    will-change:transform,opacity;
  }

  /* e-ink refresh flash */
  .flash{
    position:absolute;inset:0;z-index:40;pointer-events:none;
    background:var(--ink);opacity:0;
  }
  .flash.go{animation:refresh .30s steps(2,end) forwards;}
  @keyframes refresh{
    0%{opacity:0}
    38%{opacity:.94}
    39%{opacity:.05}
    68%{opacity:.6}
    100%{opacity:0}
  }

  /* ---------- reason chip ---------- */
  .reason{
    display:inline-flex;align-items:center;gap:7px;align-self:flex-start;
    font-family:var(--grot);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink);border:1px solid var(--rule-hard);
    padding:5px 10px;background:var(--paper-2);margin-bottom:14px;flex:0 0 auto;
  }
  .reason .glyph{width:8px;height:8px;}

  /* ---------- media hero ---------- */
  .hero{
    flex:0 0 auto;position:relative;
    border:1.5px solid var(--rule-hard);background:var(--paper-2);
    margin-bottom:18px;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .hero.wide{aspect-ratio:16/9;width:100%;}
  .hero.tall{aspect-ratio:9/16;width:64%;max-height:360px;margin-left:auto;margin-right:auto;}
  .hero.square{aspect-ratio:4/5;width:82%;margin-left:auto;margin-right:auto;}
  .hero.small{aspect-ratio:16/9;width:100%;max-height:170px;}
  .hero svg.dith{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* play affordance */
  .play{
    position:relative;z-index:3;width:60px;height:60px;border-radius:50%;
    background:var(--paper);border:2px solid var(--rule-hard);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 0 rgba(26,24,21,.28);
    transition:transform .06s linear;
  }
  .play:active{transform:translateY(2px);box-shadow:0 0 0 rgba(0,0,0,0);}
  .play svg{margin-left:3px;}
  .play.sm{width:44px;height:44px;}

  /* duration chip */
  .durchip{
    position:absolute;right:8px;bottom:8px;z-index:3;
    font-family:var(--mono);font-size:11px;letter-spacing:.03em;
    background:var(--ink);color:var(--paper);padding:3px 7px;
    border:1px solid var(--ink);
  }
  .durchip.tl{left:8px;right:auto;top:8px;bottom:auto;}

  /* gallery dots */
  .galdots{
    position:absolute;left:0;right:0;bottom:9px;z-index:3;
    display:flex;gap:6px;justify-content:center;
  }
  .galdots i{width:6px;height:6px;border:1px solid var(--rule-hard);background:var(--paper);}
  .galdots i.on{background:var(--ink);}

  /* audio waveform hero */
  .hero.audio{aspect-ratio:auto;height:150px;width:100%;flex-direction:column;gap:12px;padding:0 18px;}
  .wave{width:100%;height:64px;display:block;}
  .audio-row{display:flex;align-items:center;gap:14px;width:100%;justify-content:center;}
  .audio-row .rt{
    font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--ink-soft);
  }

  /* article excerpt */
  .excerpt{
    font-family:var(--serif);font-size:15.5px;line-height:1.5;color:var(--ink-soft);
    border-left:2px solid var(--rule-hard);padding-left:14px;margin:0 0 4px;
    flex:0 0 auto;
  }

  /* pull quote */
  .page.quote{justify-content:center;}
  .pull{
    font-family:var(--didot);font-weight:400;font-size:34px;line-height:1.22;
    color:var(--ink);letter-spacing:-.01em;margin:0 0 22px;position:relative;
    padding-top:34px;
  }
  .pull::before{
    content:"\201C";position:absolute;top:-14px;left:-6px;
    font-family:var(--didot);font-size:88px;line-height:1;color:var(--ink);opacity:.16;
  }

  /* ---------- text block ---------- */
  .eyebrow{
    font-family:var(--grot);font-size:10px;letter-spacing:.26em;
    text-transform:uppercase;color:var(--ink-mute);
    display:flex;align-items:center;gap:8px;margin:0 0 10px;flex:0 0 auto;
  }
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--hair);}

  .ptitle{
    font-family:var(--serif);font-weight:400;
    font-size:27px;line-height:1.12;letter-spacing:-.01em;
    color:var(--ink);margin:0 0 12px;flex:0 0 auto;
  }
  .page.quote .ptitle{display:none;}

  .meta{
    display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;color:var(--ink-soft);
    margin-bottom:20px;flex:0 0 auto;
  }
  .meta .src{font-family:var(--grot);font-size:12.5px;letter-spacing:.03em;color:var(--ink);}
  .meta .dot{width:3px;height:3px;background:var(--ink-mute);border-radius:50%;}
  .meta .mtype{display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.1em;font-size:10px;}
  .meta .mtype svg{display:block;}

  .spacer{flex:1 1 auto;min-height:8px;}

  /* ---------- actions ---------- */
  .actions{display:flex;gap:10px;flex:0 0 auto;}
  .act{
    min-height:50px;border:1.5px solid var(--rule-hard);background:var(--paper);
    font-family:var(--grot);font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);display:flex;align-items:center;justify-content:center;gap:7px;
    cursor:pointer;transition:background .15s steps(2,end);
  }
  .act:active{transform:translateY(1px);}
  .act.open{background:var(--ink);color:var(--paper);flex:1.6;}
  .act.like{flex:1;}
  .act.skip{flex:1;}
  .act .ic{width:15px;height:15px;display:block;}
  .act.like.on{background:var(--ink);color:var(--paper);}
  .act.like.on .ic path{stroke:var(--paper);fill:var(--paper);}
  /* stamped "LIKED" ink */
  .stamp{
    position:absolute;top:calc(50% - 40px);left:50%;z-index:30;
    transform:translate(-50%,-50%) rotate(-11deg) scale(.6);
    font-family:var(--grot);font-weight:700;font-size:34px;letter-spacing:.16em;
    color:var(--ink);border:4px solid var(--ink);padding:6px 16px;border-radius:4px;
    opacity:0;pointer-events:none;text-transform:uppercase;
    box-shadow:0 0 0 2px var(--paper) inset;
  }
  .stamp.go{animation:stampin .5s cubic-bezier(.2,1.5,.4,1) forwards;}
  @keyframes stampin{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-11deg) scale(1.5);}
    18%{opacity:1;}
    100%{opacity:.9;transform:translate(-50%,-50%) rotate(-11deg) scale(1);}
  }

  /* swipe hint */
  .swipehint{
    position:absolute;left:0;right:5px;bottom:0;z-index:16;height:72px;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    gap:3px;padding-bottom:12px;pointer-events:none;
    background:linear-gradient(to top, var(--paper) 22%, rgba(244,242,236,0));
  }
  .swipehint .chev{width:20px;height:9px;opacity:.5;}
  .swipehint .chev:nth-child(1){animation:bob 1.8s ease-in-out infinite;}
  .swipehint .chev:nth-child(2){opacity:.24;animation:bob 1.8s ease-in-out .2s infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .swipehint .lbl{
    font-family:var(--grot);font-size:9px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--ink-mute);margin-top:2px;
  }

  /* invisible tap zone for "next" at very bottom */
  .nextzone{
    position:absolute;left:0;right:5px;bottom:0;height:64px;z-index:15;cursor:pointer;
  }

  /* ---------- end card ---------- */
  .page.end{justify-content:center;align-items:center;text-align:center;}
  .page.end .mark{font-family:var(--didot);font-size:42px;color:var(--ink);margin-bottom:6px;}
  .page.end .eline{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--ink);margin:8px 0 6px;}
  .page.end .ecount{font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.03em;margin-bottom:26px;}
  .page.end .restart{
    min-height:52px;border:1.5px solid var(--rule-hard);background:var(--ink);color:var(--paper);
    font-family:var(--serif);font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;
    cursor:pointer;padding:0 26px;
  }
  .page.end .restart:active{transform:translateY(1px);}
  .page.end .tally{
    font-family:var(--grot);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink-mute);margin-top:20px;
  }
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="status">
    <span>9:41</span>
    <span class="dots" aria-hidden="true">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
      &nbsp;<svg width="22" height="11" viewBox="0 0 22 11"><rect x="0.5" y="0.5" width="18" height="10" rx="2" fill="none" stroke="#1a1815"/><rect x="19" y="3.5" width="2" height="4" fill="#1a1815"/><rect x="2" y="2" width="13" height="7" fill="#1a1815"/></svg>
    </span>
  </div>

  <header class="app">
    <div class="wordmark">otium</div>
    <div class="prog" id="prog"></div>
  </header>

  <div class="stage" id="stage">
    <div class="flash" id="flash"></div>
    <div class="track" id="track"></div>
    <div class="rail" id="rail"></div>
    <div class="nextzone" id="nextzone"></div>
    <div class="swipehint" id="swipehint">
      <svg class="chev" viewBox="0 0 20 9"><path d="M2 7L10 2L18 7" fill="none" stroke="#1a1815" stroke-width="1.6" stroke-linecap="round"/></svg>
      <svg class="chev" viewBox="0 0 20 9"><path d="M2 7L10 2L18 7" fill="none" stroke="#1a1815" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span class="lbl">swipe up &middot; next</span>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- SVG e-ink placeholder builders ---------------- */
  // A desaturated feTurbulence dither field, unique id per instance.
  var uid = 0;
  function dither(seed, dark){
    var id = 'd'+(uid++);
    var base = dark ? 0.62 : 0.72;
    var op = dark ? 0.9 : 0.7;
    return '<svg class="dith" preserveAspectRatio="none" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'+
      '<defs>'+
        '<filter id="'+id+'">'+
          '<feTurbulence type="fractalNoise" baseFrequency="'+base+'" numOctaves="2" seed="'+seed+'" stitchTiles="stitch"/>'+
          '<feColorMatrix type="saturate" values="0"/>'+
          '<feComponentTransfer><feFuncA type="linear" slope="'+op+'"/></feComponentTransfer>'+
        '</filter>'+
      '</defs>'+
      '<rect width="100" height="100" fill="'+(dark?'#d7d1c4':'#e7e2d6')+'"/>'+
      '<rect width="100" height="100" filter="url(#'+id+')" opacity="0.55"/>'+
      // halftone dot overlay for that printed feel
      '<rect width="100" height="100" fill="url(#hp)" opacity="0.22"/>'+
    '</svg>';
  }
  // shared halftone pattern def injected once
  var hp = '<svg width="0" height="0" style="position:absolute"><defs>'+
    '<pattern id="hp" width="4" height="4" patternUnits="userSpaceOnUse">'+
      '<circle cx="1" cy="1" r="0.9" fill="#1a1815"/>'+
    '</pattern></defs></svg>';
  document.body.insertAdjacentHTML('afterbegin', hp);

  var playTri = '<svg width="20" height="22" viewBox="0 0 20 22"><path d="M2 1.5L18 11L2 20.5Z" fill="#1a1815"/></svg>';
  var playTriSm = '<svg width="15" height="17" viewBox="0 0 20 22"><path d="M2 1.5L18 11L2 20.5Z" fill="#1a1815"/></svg>';

  function waveform(){
    // deterministic-ish bars
    var bars = [4,9,14,7,19,24,16,28,12,22,30,18,26,10,20,32,15,23,8,17,27,13,21,29,11,19,25,9,16,24,14,20,6,18,28,12,22,15];
    var w = 5, gap = 2, x = 0, h = 64, out = '';
    for(var i=0;i<bars.length;i++){
      var bh = bars[i];
      out += '<rect x="'+x+'" y="'+((h-bh)/2)+'" width="'+w+'" height="'+bh+'" fill="#1a1815"/>';
      x += w+gap;
    }
    // playhead
    out += '<rect x="'+(x*0.33)+'" y="0" width="1.5" height="'+h+'" fill="#1a1815"/>';
    return '<svg class="wave" viewBox="0 0 '+x+' '+h+'" preserveAspectRatio="none">'+out+'</svg>';
  }

  var reasonGlyph = '<svg class="glyph" viewBox="0 0 8 8" width="8" height="8"><rect x="1" y="1" width="6" height="6" fill="#1a1815"/></svg>';

  var mediaIcons = {
    'vertical video':'<svg width="14" height="14" viewBox="0 0 14 14"><rect x="3.5" y="1.5" width="7" height="11" fill="none" stroke="#4b4740" stroke-width="1.2"/><path d="M5.6 5.4l2.6 1.6-2.6 1.6z" fill="#4b4740"/></svg>',
    'video':'<svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="2.5" width="12" height="9" fill="none" stroke="#4b4740" stroke-width="1.2"/><path d="M6 5.2l3 1.8-3 1.8z" fill="#4b4740"/></svg>',
    'article':'<svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 3h10M2 6h10M2 9h7" stroke="#4b4740" stroke-width="1.2" stroke-linecap="round"/></svg>',
    'photo':'<svg width="14" height="14" viewBox="0 0 14 14"><rect x="1.5" y="2.5" width="11" height="9" fill="none" stroke="#4b4740" stroke-width="1.2"/><circle cx="5" cy="6" r="1.2" fill="#4b4740"/><path d="M2 11l3.5-3 2.5 2 2-1.5 2.5 2.5" fill="none" stroke="#4b4740" stroke-width="1.2" stroke-linejoin="round"/></svg>',
    'audio':'<svg width="14" height="14" viewBox="0 0 14 14"><path d="M1.5 7h1.5M4 4.5v5M6.5 2.5v9M9 5v4M11.5 3.5v7" stroke="#4b4740" stroke-width="1.3" stroke-linecap="round"/></svg>',
    'quote':'<svg width="14" height="14" viewBox="0 0 14 14"><path d="M5 3C3 4 2.5 6 2.5 8.5H5V6H3.6C3.8 4.8 4.3 4 5 3.5zM11 3C9 4 8.5 6 8.5 8.5H11V6H9.6C9.8 4.8 10.3 4 11 3.5z" fill="#4b4740"/></svg>'
  };

  var heartSvg = '<svg class="ic" viewBox="0 0 14 14"><path d="M7 12S1.5 8.6 1.5 4.9C1.5 3.3 2.7 2 4.3 2 5.4 2 6.4 2.7 7 3.7 7.6 2.7 8.6 2 9.7 2 11.3 2 12.5 3.3 12.5 4.9 12.5 8.6 7 12 7 12z" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>';
  var openSvg = '<svg class="ic" viewBox="0 0 14 14"><path d="M4 2.5h7.5V10M11.5 2.5L4.5 9.5M2.5 5v6.5H9" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var skipSvg = '<svg class="ic" viewBox="0 0 14 14"><path d="M2.5 3l5 4-5 4zM9.5 3v8" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  /* ---------------- fixture ---------------- */
  var items = [
    { type:'vertical video', reason:'Rare &mdash; posts weekly', title:'Scumbag Dad &mdash; the school pickup bit',
      src:'Scumbag Dad', dur:'0:48' },
    { type:'video', reason:'Favorite source', title:'I got hit in the teeth at England&rsquo;s oldest ritual',
      src:'Tom Scott', dur:'10:24' },
    { type:'article', reason:'Fresh &mdash; today', title:'Apple&rsquo;s entry-level MacBook Pro could get a redesign',
      src:'The Verge', dur:'4 min read',
      excerpt:'A revamped entry model could arrive as soon as this year, per supply-chain reports.' },
    { type:'photo', reason:'High-weight source', title:'Aurora over the Faroe Islands',
      src:'Astronomy Picture of the Day', dur:'gallery' },
    { type:'audio', reason:'Rare &mdash; posts seldom', title:'The Real Book',
      src:'99% Invisible', dur:'32 min' },
    { type:'quote', reason:'Recent', title:'The best way to predict the future is to invent it.',
      src:'Kottke', dur:'' }
  ];

  /* ---------------- hero builders per media type ---------------- */
  function heroFor(it, seed){
    var t = it.type;
    if(t==='vertical video'){
      return '<div class="hero tall">'+dither(seed,true)+
        '<div class="play">'+playTri+'</div>'+
        '<span class="durchip">'+it.dur+'</span>'+
        '<span class="durchip tl">SHORT</span></div>';
    }
    if(t==='video'){
      return '<div class="hero wide">'+dither(seed,true)+
        '<div class="play">'+playTri+'</div>'+
        '<span class="durchip">'+it.dur+'</span></div>';
    }
    if(t==='article'){
      return '<div class="hero small">'+dither(seed,false)+'</div>';
    }
    if(t==='photo'){
      return '<div class="hero square">'+dither(seed,false)+
        '<div class="galdots"><i class="on"></i><i></i><i></i></div>'+
        '<span class="durchip tl">1 / 3</span></div>';
    }
    if(t==='audio'){
      return '<div class="hero audio">'+waveform()+
        '<div class="audio-row"><div class="play sm">'+playTriSm+'</div>'+
        '<span class="rt">0:00 / '+it.dur+'</span></div></div>';
    }
    return ''; // quote: no hero
  }

  /* ---------------- build pages ---------------- */
  var track = document.getElementById('track');
  var pages = [];

  items.forEach(function(it, i){
    var p = document.createElement('div');
    p.className = 'page' + (it.type==='quote' ? ' quote' : '');
    var hero = heroFor(it, 3+i*7);
    var metaExtra = it.type==='quote' ? '' :
      '<span class="dot"></span><span>'+it.dur+'</span>';
    var body =
      '<span class="reason">'+reasonGlyph+it.reason+'</span>'+
      hero +
      (it.type==='quote'
        ? '<blockquote class="pull">'+it.title+'</blockquote>'
        : '<h2 class="ptitle">'+it.title+'</h2>') +
      (it.excerpt ? '<p class="excerpt">'+it.excerpt+'</p>' : '') +
      '<div class="meta"><span class="src">'+it.src+'</span>'+metaExtra+
        '<span class="dot"></span><span class="mtype">'+mediaIcons[it.type]+it.type+'</span></div>'+
      '<div class="spacer"></div>'+
      '<div class="actions">'+
        '<button class="act open" data-a="open">'+openSvg+'Open</button>'+
        '<button class="act like" data-a="like">'+heartSvg+'Like</button>'+
        '<button class="act skip" data-a="skip">'+skipSvg+'Skip</button>'+
      '</div>'+
      '<div class="stamp">Liked</div>';
    p.innerHTML = body;
    track.appendChild(p);
    pages.push(p);
  });

  // end page
  var end = document.createElement('div');
  end.className = 'page end';
  end.innerHTML =
    '<div class="mark">&#10086;</div>'+
    '<div class="eyebrow" style="align-self:center">the set is done</div>'+
    '<div class="eline">That&rsquo;s your session.</div>'+
    '<div class="ecount">6 items &middot; 1 liked</div>'+
    '<button class="restart" id="restart">Start another <span style="font-family:var(--grot)">&rarr;</span></button>'+
    '<div class="tally" id="tally">no infinite scroll here</div>';
  track.appendChild(end);
  pages.push(end);

  var TOTAL = pages.length;      // includes end page
  var CONTENT = items.length;    // real items

  /* ---------------- progress strip + edge rail ---------------- */
  var progEl = document.getElementById('prog');
  var railEl = document.getElementById('rail');
  var segs = [], ticks = [];
  for(var i=0;i<CONTENT;i++){
    var s = document.createElement('span'); s.className='seg'; progEl.appendChild(s); segs.push(s);
  }
  var pnum = document.createElement('span'); pnum.className='pnum'; progEl.appendChild(pnum);
  for(var j=0;j<TOTAL;j++){
    var tk = document.createElement('div'); tk.className='tick'; railEl.appendChild(tk); ticks.push(tk);
  }

  /* ---------------- pager state + layout ---------------- */
  var stage = document.getElementById('stage');
  var flash = document.getElementById('flash');
  var swipehint = document.getElementById('swipehint');
  var cur = 0;
  var H = 0;
  function measure(){ H = stage.clientHeight; layout(false); }
  function layout(animate){
    for(var i=0;i<TOTAL;i++){
      var offset = (i - cur) * H;
      var pg = pages[i];
      pg.style.transition = animate ? 'transform .34s steps(4,end), opacity .34s steps(3,end)' : 'none';
      pg.style.transform = 'translateY('+offset+'px)';
      pg.style.opacity = (i===cur) ? '1' : '0';
      pg.style.pointerEvents = (i===cur) ? 'auto' : 'none';
    }
  }

  function updateChrome(){
    for(var i=0;i<CONTENT;i++){
      segs[i].classList.toggle('done', i<cur);
      segs[i].classList.toggle('cur', i===cur);
    }
    for(var j=0;j<TOTAL;j++){
      ticks[j].classList.toggle('on', j===cur);
      ticks[j].classList.toggle('seen', j<cur);
    }
    if(cur<CONTENT){
      pnum.textContent = (cur+1)+' / '+CONTENT;
      swipehint.style.display = '';
    } else {
      pnum.textContent = 'done';
      swipehint.style.display = 'none';
    }
  }

  /* ---------------- page turn w/ e-ink flash ---------------- */
  var busy = false;
  function goTo(idx){
    idx = Math.max(0, Math.min(TOTAL-1, idx));
    if(idx===cur || busy) return;
    busy = true;
    var forward = idx>cur;
    // e-ink refresh flash on advance (and back)
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
    // mid-flash, swap
    setTimeout(function(){
      cur = idx;
      layout(true);
      updateChrome();
    }, forward ? 120 : 120);
    setTimeout(function(){ busy=false; }, 380);
  }
  function next(){ goTo(cur+1); }
  function prev(){ goTo(cur-1); }

  /* ---------------- gestures ---------------- */
  var sy=0, sx=0, tracking=false, dragOffset=0;
  function onStart(e){
    if(busy) return;
    var pt = e.touches ? e.touches[0] : e;
    sy = pt.clientY; sx = pt.clientX; tracking=true; dragOffset=0;
  }
  function onMove(e){
    if(!tracking || busy) return;
    var pt = e.touches ? e.touches[0] : e;
    var dy = pt.clientY - sy;
    var dx = pt.clientX - sx;
    if(Math.abs(dy) < Math.abs(dx)) return; // horizontal, ignore
    // rubber-band the current page a little while dragging
    dragOffset = dy;
    // resist at ends
    if((cur===0 && dy>0) || (cur===TOTAL-1 && dy<0)) dragOffset = dy*0.28;
    else dragOffset = dy*0.55;
    pages[cur].style.transition='none';
    pages[cur].style.transform='translateY('+dragOffset+'px)';
    if(e.cancelable) e.preventDefault();
  }
  function onEnd(){
    if(!tracking) return;
    tracking=false;
    var TH = 64;
    if(dragOffset <= -TH){ pages[cur].style.transform='translateY(0)'; next(); }
    else if(dragOffset >= TH){ pages[cur].style.transform='translateY(0)'; prev(); }
    else {
      // snap back
      pages[cur].style.transition='transform .2s steps(3,end)';
      pages[cur].style.transform='translateY(0)';
    }
    dragOffset=0;
  }

  stage.addEventListener('touchstart', onStart, {passive:true});
  stage.addEventListener('touchmove', onMove, {passive:false});
  stage.addEventListener('touchend', onEnd);
  stage.addEventListener('pointerdown', function(e){ if(e.pointerType==='mouse') onStart(e); });
  window.addEventListener('pointermove', function(e){ if(e.pointerType==='mouse') onMove(e); });
  window.addEventListener('pointerup', function(e){ if(e.pointerType==='mouse') onEnd(e); });

  // wheel = page turn (desktop feel)
  var wheelLock=false;
  stage.addEventListener('wheel', function(e){
    e.preventDefault();
    if(wheelLock || busy) return;
    if(Math.abs(e.deltaY) < 8) return;
    wheelLock=true;
    if(e.deltaY>0) next(); else prev();
    setTimeout(function(){ wheelLock=false; }, 420);
  }, {passive:false});

  // keyboard
  window.addEventListener('keydown', function(e){
    if(e.key==='ArrowUp'||e.key==='PageUp'){ e.preventDefault(); prev(); }
    if(e.key==='ArrowDown'||e.key==='PageDown'||e.key===' '){ e.preventDefault(); next(); }
  });

  // bottom "next" tap zone
  document.getElementById('nextzone').addEventListener('click', function(e){
    // only when not on end page
    if(cur < TOTAL-1) next();
  });

  /* ---------------- per-item actions ---------------- */
  track.addEventListener('click', function(e){
    var btn = e.target.closest('[data-a]');
    var play = e.target.closest('.play');
    var pg = pages[cur];
    if(play){
      // preview: pulse the play button + a soft e-ink tick on the hero
      var hero = play.closest('.hero');
      if(hero){ hero.animate([{filter:'invert(0)'},{filter:'invert(1)'},{filter:'invert(0)'}],
        {duration:280, easing:'steps(2,end)'}); }
      play.animate([{transform:'scale(1)'},{transform:'scale(.86)'},{transform:'scale(1)'}],
        {duration:220, easing:'steps(2,end)'});
      return;
    }
    if(!btn) return;
    var a = btn.dataset.a;
    if(a==='like'){
      btn.classList.toggle('on');
      if(btn.classList.contains('on')){
        var st = pg.querySelector('.stamp');
        st.classList.remove('go'); void st.offsetWidth; st.classList.add('go');
      }
    } else if(a==='skip'){
      // skip = advance with the same page-turn
      next();
    } else if(a==='open'){
      // open: full-frame invert flash (simulates leaving into the source)
      flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
      btn.animate([{transform:'translateY(0)'},{transform:'translateY(1px)'},{transform:'translateY(0)'}],
        {duration:160});
    }
  });

  document.getElementById('restart') && track.addEventListener('click', function(e){
    if(e.target.closest('#restart')){
      // count likes for the tally
      goTo(0);
    }
  });

  /* ---------------- init ---------------- */
  window.addEventListener('resize', measure);
  requestAnimationFrame(function(){
    measure();
    updateChrome();
    // opening e-ink stamp-in
    flash.classList.add('go');
  });

})();
</script>
</body>
</html>
