<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>otium — e-ink · gesture actions</title>
<style>
  :root{
    --paper:#f4f2ec;
    --paper-2:#efece3;
    --ink:#1a1815;
    --ink-soft:#4b4740;
    --ink-mute:#8b857a;
    --rule:#c9c3b5;
    --rule-hard:#1a1815;
    --hair:#d9d4c8;
    --serif:"Charter","Iowan Old Style","Georgia",serif;
    --grot:"Helvetica Neue","Arial",sans-serif;
    --mono:"SF Mono","Menlo",ui-monospace,monospace;
    --didot:"Didot","Hoefler Text","Baskerville",serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:#3b3a36;
    background-image:radial-gradient(circle at 30% 20%, #4a4844 0%, #2c2b28 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    padding:18px;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;
    width:390px;height:844px;max-height:calc(100vh - 24px);
    background:var(--paper);
    border-radius:44px;
    box-shadow:0 0 0 2px #111, 0 0 0 12px #16150f, 0 30px 70px rgba(0,0,0,.55);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  /* paper grain */
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:60;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    mix-blend-mode:multiply;opacity:.6;
  }

  /* status bar */
  .status{
    position:relative;z-index:4;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 6px;
    font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--ink);
    flex:0 0 auto;
  }
  .status .dots{display:flex;gap:3px;align-items:center;}
  .status .bar{width:2px;background:var(--ink);}
  .status .bar:nth-child(1){height:5px}
  .status .bar:nth-child(2){height:7px}
  .status .bar:nth-child(3){height:9px}
  .status .bar:nth-child(4){height:11px}

  /* ---------- app header ---------- */
  header.app{
    position:relative;z-index:4;flex:0 0 auto;
    padding:6px 26px 12px;
    border-bottom:1.5px solid var(--rule-hard);
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .wordmark{
    font-family:var(--didot);
    font-size:34px;line-height:.9;letter-spacing:.01em;color:var(--ink);
    font-weight:400;
  }
  .tagline{
    font-family:var(--grot);
    font-size:9.5px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--ink-soft);
    padding-bottom:5px;
  }

  /* ---------- progress strip ---------- */
  .progress{
    position:relative;z-index:4;flex:0 0 auto;
    display:flex;align-items:center;gap:12px;
    padding:11px 26px 12px;
    border-bottom:1px solid var(--hair);
  }
  .progress .idx{
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-soft);
    white-space:nowrap;
  }
  .progress .idx b{color:var(--ink);font-weight:700;}
  .ticks{display:flex;gap:5px;flex:1;align-items:center;}
  .ticks .tk{
    flex:1;height:6px;border:1px solid var(--rule-hard);background:var(--paper);
    position:relative;overflow:hidden;
  }
  .ticks .tk.done::after{
    content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(45deg,var(--ink) 0 1.4px,transparent 1.4px 3px);
  }
  .ticks .tk.cur{background:var(--ink);}
  .ticks .tk.liked::before{
    content:"";position:absolute;inset:0;background:var(--ink);
  }

  /* ---------- deck stage ---------- */
  .stage{
    position:relative;flex:1 1 auto;overflow:hidden;z-index:3;
  }

  /* e-ink refresh flash */
  .flash{
    position:absolute;inset:0;z-index:50;pointer-events:none;
    background:var(--ink);opacity:0;
  }
  .flash.go{animation:refresh .30s steps(2,end) forwards;}
  @keyframes refresh{
    0%{opacity:0}
    38%{opacity:.94}
    40%{opacity:.05}
    68%{opacity:.6}
    100%{opacity:0}
  }

  /* the card */
  .card{
    position:absolute;top:14px;left:18px;right:18px;bottom:14px;
    background:var(--paper);
    border:1.5px solid var(--rule-hard);
    box-shadow:6px 7px 0 rgba(26,24,21,.14), 12px 14px 0 rgba(26,24,21,.06);
    display:flex;flex-direction:column;
    touch-action:pan-y;
    overflow:hidden;
    will-change:transform;
    user-select:none;
  }
  .card.behind{
    top:20px;left:24px;right:24px;bottom:8px;
    z-index:1;box-shadow:none;opacity:.55;pointer-events:none;
  }
  .card.front{z-index:2;}
  .card.settling{transition:transform .34s steps(5,end), opacity .34s;}
  .card.pressing{box-shadow:3px 4px 0 rgba(26,24,21,.16);}

  /* swipe side stamps */
  .swipe-stamp{
    position:absolute;top:26px;z-index:9;pointer-events:none;
    font-family:var(--grot);font-size:15px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;color:var(--ink);
    border:2.5px solid var(--ink);padding:7px 13px;
    opacity:0;
  }
  .swipe-stamp.like{left:20px;transform:rotate(-11deg) scale(.9);}
  .swipe-stamp.skip{right:20px;transform:rotate(9deg) scale(.9);}

  /* ---------- card body ---------- */
  .card-scroll{
    flex:1;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding:16px 18px 12px;
  }
  .card-scroll::-webkit-scrollbar{width:0;}

  .reason{
    display:inline-flex;align-items:center;gap:7px;
    font-family:var(--grot);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink);border:1px solid var(--rule-hard);
    padding:4px 9px;margin-bottom:14px;background:var(--paper-2);
  }
  .reason .glyph{width:9px;height:9px;flex:0 0 auto;}

  /* ---------- media frames ---------- */
  .media{
    position:relative;margin:0 0 15px;border:1.5px solid var(--rule-hard);
    background:var(--paper-2);overflow:hidden;cursor:pointer;
  }
  .media.tall{max-width:206px;margin-left:auto;margin-right:auto;}
  .media svg{display:block;width:100%;height:auto;}
  .media .play{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:52px;height:52px;border-radius:50%;
    background:var(--paper);border:2px solid var(--rule-hard);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 0 rgba(26,24,21,.28);
  }
  .media .play::after{
    content:"";margin-left:3px;
    border-left:16px solid var(--ink);
    border-top:10px solid transparent;border-bottom:10px solid transparent;
  }
  .chip-dur{
    position:absolute;right:8px;bottom:8px;
    font-family:var(--mono);font-size:11px;letter-spacing:.03em;
    background:var(--ink);color:var(--paper);padding:2px 7px;
  }
  .gallery-dots{
    position:absolute;left:0;right:0;bottom:9px;
    display:flex;justify-content:center;gap:6px;
  }
  .gallery-dots i{width:6px;height:6px;border:1px solid var(--paper);background:transparent;border-radius:50%;
    box-shadow:0 0 0 1px rgba(26,24,21,.5);}
  .gallery-dots i.on{background:var(--paper);}

  /* audio waveform */
  .audio{
    display:flex;align-items:center;gap:12px;
    border:1.5px solid var(--rule-hard);background:var(--paper-2);
    padding:14px 14px;margin:0 0 15px;cursor:pointer;
  }
  .audio .aplay{
    flex:0 0 auto;width:42px;height:42px;border-radius:50%;
    border:2px solid var(--rule-hard);background:var(--paper);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 0 rgba(26,24,21,.28);
  }
  .audio .aplay::after{
    content:"";margin-left:3px;
    border-left:13px solid var(--ink);
    border-top:8px solid transparent;border-bottom:8px solid transparent;
  }
  .audio .wave{flex:1;height:40px;}
  .audio .adur{
    font-family:var(--mono);font-size:11px;color:var(--ink-soft);white-space:nowrap;
  }

  /* pull-quote */
  .pullquote{
    border-left:4px solid var(--rule-hard);
    padding:6px 4px 6px 18px;margin:2px 0 16px;
  }
  .pullquote .mark{
    font-family:var(--didot);font-size:54px;line-height:.2;color:var(--ink);
    display:block;height:26px;
  }
  .pullquote p{
    font-family:var(--serif);font-style:italic;font-size:23px;line-height:1.34;
    color:var(--ink);margin:6px 0 0;letter-spacing:-.01em;
  }

  h2.title{
    font-family:var(--serif);font-weight:400;font-size:25px;line-height:1.16;
    letter-spacing:-.008em;color:var(--ink);margin:0 0 10px;cursor:pointer;
  }
  .card.quotecard h2.title{font-size:19px;color:var(--ink-soft);font-style:italic;}

  .excerpt{
    font-family:var(--serif);font-size:15px;line-height:1.5;color:var(--ink-soft);
    margin:0 0 12px;
  }

  .meta{
    display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;color:var(--ink-soft);
    margin-bottom:4px;
  }
  .meta .src{font-family:var(--grot);font-size:12.5px;letter-spacing:.03em;color:var(--ink);}
  .meta .dot{width:3px;height:3px;background:var(--ink-mute);border-radius:50%;}
  .meta .mtype{display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.1em;font-size:10px;}

  /* expanded preview region (long-press) */
  .expand{
    max-height:0;overflow:hidden;opacity:0;
    border-top:1px dashed var(--rule);margin-top:0;
    transition:max-height .4s steps(6,end),opacity .4s,margin-top .4s,padding .4s;
  }
  .card.expanded .expand{
    max-height:520px;opacity:1;margin-top:14px;padding-top:14px;
  }
  .expand .exlabel{
    font-family:var(--grot);font-size:9px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--ink-mute);margin:0 0 10px;display:flex;align-items:center;gap:8px;
  }
  .expand .exlabel::after{content:"";flex:1;height:1px;background:var(--hair);}
  .expand p{
    font-family:var(--serif);font-size:14.5px;line-height:1.56;color:var(--ink-soft);margin:0 0 11px;
  }
  .expand p:first-letter{}

  /* ---------- feedback stamp overlay ---------- */
  .stamp{
    position:absolute;left:50%;top:44%;z-index:12;pointer-events:none;
    transform:translate(-50%,-50%) scale(.4) rotate(-8deg);
    opacity:0;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .stamp .word{
    font-family:var(--grot);font-size:20px;font-weight:700;
    letter-spacing:.24em;text-transform:uppercase;color:var(--ink);
    border:3px solid var(--ink);padding:9px 16px;
    background:var(--paper);
  }
  .stamp .heart svg{width:78px;height:78px;display:block;}
  .stamp.go{animation:stampIn .5s steps(4,end) forwards;}
  @keyframes stampIn{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.35) rotate(-14deg);}
    45%{opacity:1;transform:translate(-50%,-50%) scale(1.08) rotate(-6deg);}
    70%{opacity:1;transform:translate(-50%,-50%) scale(.98) rotate(-8deg);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1) rotate(-8deg);}
  }

  /* persistent liked corner mark on card */
  .liked-flag{
    position:absolute;right:0;top:0;z-index:8;pointer-events:none;
    width:0;height:0;border-top:44px solid var(--ink);border-left:44px solid transparent;
    opacity:0;transition:opacity .2s steps(2,end);
  }
  .liked-flag svg{position:absolute;right:5px;top:-40px;width:15px;height:15px;}
  .card.liked .liked-flag{opacity:1;}

  /* ---------- action bar / legend ---------- */
  .actionbar{
    flex:0 0 auto;border-top:1.5px solid var(--rule-hard);
    display:flex;background:var(--paper);
  }
  .actionbar .ab{
    flex:1;min-height:56px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    font-family:var(--grot);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ink);cursor:pointer;position:relative;
  }
  .actionbar .ab + .ab{border-left:1px solid var(--hair);}
  .actionbar .ab:active{background:var(--paper-2);}
  .actionbar .ab svg{display:block;}
  .actionbar .ab.on{background:var(--ink);color:var(--paper);}
  .actionbar .ab.on svg *{stroke:var(--paper);fill:none;}
  .actionbar .ab.on svg .fillh{fill:var(--paper);}

  /* legend under deck */
  .legend{
    position:absolute;left:0;right:0;bottom:0;z-index:5;
    background:var(--paper);border-top:1px solid var(--hair);
    padding:8px 16px 10px;
    display:flex;flex-wrap:wrap;gap:4px 14px;justify-content:center;
  }
  .legend span{
    font-family:var(--grot);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-mute);display:inline-flex;align-items:center;gap:5px;
  }
  .legend span b{color:var(--ink);font-weight:700;letter-spacing:.06em;}

  /* end-of-session panel */
  .done-panel{
    position:absolute;inset:0;z-index:20;background:var(--paper);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:0 40px;text-align:center;
  }
  .done-panel.show{display:flex;}
  .done-panel .mark{font-family:var(--didot);font-size:40px;color:var(--ink);}
  .done-panel .line{
    font-family:var(--serif);font-style:italic;font-size:22px;color:var(--ink);margin:16px 0 6px;
  }
  .done-panel .count{
    font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.03em;margin-bottom:26px;
  }
  .done-panel .restart{
    min-height:52px;padding:0 26px;border:1.5px solid var(--rule-hard);
    background:var(--ink);color:var(--paper);
    font-family:var(--serif);font-size:17px;cursor:pointer;
    display:inline-flex;align-items:center;gap:10px;
  }
  .done-panel .restart:active{transform:translateY(1px);}
  .done-panel .tally{
    font-family:var(--grot);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ink-mute);margin-top:22px;
  }
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="status">
    <span>9:41</span>
    <span class="dots" aria-hidden="true">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
      &nbsp;<svg width="22" height="11" viewBox="0 0 22 11"><rect x="0.5" y="0.5" width="18" height="10" rx="2" fill="none" stroke="#1a1815"/><rect x="19" y="3.5" width="2" height="4" fill="#1a1815"/><rect x="2" y="2" width="13" height="7" fill="#1a1815"/></svg>
    </span>
  </div>

  <header class="app">
    <div class="wordmark">otium</div>
    <div class="tagline">one&nbsp;thing at&nbsp;a&nbsp;time</div>
  </header>

  <div class="progress">
    <span class="idx"><b id="pidx">1</b> / <span id="ptot">6</span></span>
    <div class="ticks" id="ticks"></div>
  </div>

  <div class="stage" id="stage">
    <div class="flash" id="flash"></div>
    <!-- cards injected here -->
    <div class="done-panel" id="donePanel">
      <div class="mark">&#10086;</div>
      <div class="line">That&rsquo;s your session.</div>
      <div class="count" id="doneCount">6 items &middot; ~48 min</div>
      <button class="restart" id="restart">Begin again <span style="font-family:var(--grot);font-size:14px;">&#8635;</span></button>
      <div class="tally" id="tally">0 liked &middot; 0 opened</div>
    </div>

    <div class="legend">
      <span><b>Double-tap</b> like</span>
      <span><b>Swipe &rarr;</b> like</span>
      <span><b>Swipe &larr;</b> skip</span>
      <span><b>Long-press</b> preview</span>
      <span><b>Tap</b> open</span>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- dithered media placeholders ---------------- */
  // Each returns an <svg> string that fills its container. feTurbulence desaturated -> e-ink halftone.
  function ditherDefs(id, freq, seed){
    return '<defs>'+
      '<filter id="'+id+'"><feTurbulence type="fractalNoise" baseFrequency="'+freq+'" numOctaves="2" seed="'+seed+'" stitchTiles="stitch"/>'+
        '<feColorMatrix type="saturate" values="0"/>'+
        '<feComponentTransfer><feFuncR type="discrete" tableValues="0 0 .55 .55 .9 .9 1"/><feFuncG type="discrete" tableValues="0 0 .55 .55 .9 .9 1"/><feFuncB type="discrete" tableValues="0 0 .55 .55 .9 .9 1"/></feComponentTransfer>'+
      '</filter>'+
      '<pattern id="hatch'+id+'" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">'+
        '<rect width="6" height="6" fill="transparent"/><line x1="0" y1="0" x2="0" y2="6" stroke="#1a1815" stroke-width="1" opacity="0.28"/></pattern>'+
    '</defs>';
  }
  // horizontal 16:9
  function svgLandscape(seed){
    var w=320,h=180;
    return '<svg viewBox="0 0 '+w+' '+h+'">'+
      ditherDefs('lf'+seed, '0.22', seed)+
      '<rect width="'+w+'" height="'+h+'" fill="#e7e3d8"/>'+
      '<rect width="'+w+'" height="'+h+'" filter="url(#lf'+seed+')" opacity="0.62"/>'+
      '<rect width="'+w+'" height="'+h+'" fill="url(#hatchlf'+seed+')"/>'+
      // faux horizon composition lines
      '<line x1="0" y1="118" x2="'+w+'" y2="106" stroke="#1a1815" stroke-width="1.4" opacity="0.5"/>'+
      '<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="none" stroke="#1a1815" stroke-width="1" opacity="0.5"/>'+
    '</svg>';
  }
  // vertical 9:16
  function svgPortrait(seed){
    var w=180,h=320;
    return '<svg viewBox="0 0 '+w+' '+h+'">'+
      ditherDefs('pf'+seed, '0.26', seed)+
      '<rect width="'+w+'" height="'+h+'" fill="#e7e3d8"/>'+
      '<rect width="'+w+'" height="'+h+'" filter="url(#pf'+seed+')" opacity="0.6"/>'+
      '<rect width="'+w+'" height="'+h+'" fill="url(#hatchpf'+seed+')"/>'+
      // subject silhouette suggestion
      '<ellipse cx="90" cy="150" rx="44" ry="54" fill="#1a1815" opacity="0.16"/>'+
      '<line x1="0" y1="238" x2="'+w+'" y2="238" stroke="#1a1815" stroke-width="1.2" opacity="0.4"/>'+
    '</svg>';
  }
  // photo (image) with rich tonal dither
  function svgPhoto(seed){
    var w=320,h=210;
    return '<svg viewBox="0 0 '+w+' '+h+'">'+
      ditherDefs('ph'+seed, '0.16', seed)+
      '<rect width="'+w+'" height="'+h+'" fill="#dcd7ca"/>'+
      '<rect width="'+w+'" height="'+h+'" filter="url(#phph'+seed+')" opacity="0.72"/>'+
      // aurora-ish streaks
      '<path d="M0 60 Q 80 20 160 55 T 320 40" fill="none" stroke="#1a1815" stroke-width="2" opacity="0.32"/>'+
      '<path d="M0 90 Q 90 55 180 88 T 320 74" fill="none" stroke="#1a1815" stroke-width="1.4" opacity="0.22"/>'+
      '<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="none" stroke="#1a1815" stroke-width="1" opacity="0.5"/>'+
    '</svg>';
  }
  // small article hero
  function svgHero(seed){
    var w=320,h=132;
    return '<svg viewBox="0 0 '+w+' '+h+'">'+
      ditherDefs('hr'+seed, '0.2', seed)+
      '<rect width="'+w+'" height="'+h+'" fill="#e4e0d5"/>'+
      '<rect width="'+w+'" height="'+h+'" filter="url(#hrhr'+seed+')" opacity="0.55"/>'+
      '<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="none" stroke="#1a1815" stroke-width="1" opacity="0.5"/>'+
    '</svg>';
  }
  // audio waveform bars
  function svgWave(){
    var bars=42, w=280, h=40, gap=w/bars, out='';
    var seedv=[3,7,12,20,28,34,30,22,15,9,5,11,19,27,33,29,21,14,8,6,13,23,31,26,18,10,7,16,24,32,25,17,9,12,20,28,22,14,8,5,10,18];
    for(var i=0;i<bars;i++){
      var bh=(seedv[i%seedv.length]/34)*h*0.9+3;
      var x=i*gap+1, y=(h-bh)/2;
      out+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(gap-2).toFixed(1)+'" height="'+bh.toFixed(1)+'" fill="#1a1815" opacity="'+(i<14?'0.85':'0.32')+'"/>';
    }
    return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:100%">'+out+'</svg>';
  }

  var reasonGlyph = '<svg class="glyph" viewBox="0 0 9 9" width="9" height="9"><rect x="1.2" y="1.2" width="6.6" height="6.6" fill="#1a1815"/></svg>';
  var heartFull = '<svg viewBox="0 0 14 14"><path d="M7 12.4S1.2 8.7 1.2 4.8C1.2 3.1 2.5 1.8 4.2 1.8 5.4 1.8 6.4 2.5 7 3.6 7.6 2.5 8.6 1.8 9.8 1.8 11.5 1.8 12.8 3.1 12.8 4.8 12.8 8.7 7 12.4 7 12.4z" class="fillh" fill="#1a1815"/></svg>';

  var mediaTypeIcon = {
    'vertical-video':'<svg width="13" height="13" viewBox="0 0 13 13"><rect x="3.5" y="1.5" width="6" height="10" fill="none" stroke="#4b4740" stroke-width="1.1"/><path d="M5.6 5l2 1.5-2 1.5z" fill="#4b4740"/></svg>',
    'video':'<svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="2.5" width="12" height="9" fill="none" stroke="#4b4740" stroke-width="1.1"/><path d="M6 5.2l3 1.8-3 1.8z" fill="#4b4740"/></svg>',
    'article':'<svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 3h10M2 6h10M2 9h7" stroke="#4b4740" stroke-width="1.1" stroke-linecap="round"/></svg>',
    'image':'<svg width="14" height="14" viewBox="0 0 14 14"><rect x="1.5" y="2.5" width="11" height="9" fill="none" stroke="#4b4740" stroke-width="1.1"/><circle cx="5" cy="6" r="1.2" fill="#4b4740"/><path d="M2 11l3.5-3 2.5 2 2-1.6 2.5 2.6" fill="none" stroke="#4b4740" stroke-width="1.1"/></svg>',
    'audio':'<svg width="14" height="14" viewBox="0 0 14 14"><path d="M1.5 7h1.5M4 4.5v5M6.5 2.5v9M9 5v4M11.5 3.5v7" stroke="#4b4740" stroke-width="1.2" stroke-linecap="round"/></svg>',
    'quote':'<svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 4c-1.2.4-2 1.4-2 2.8V10h3V6.8H2.4C2.4 5.7 2.9 5 3.6 4.7zM9 4c-1.2.4-2 1.4-2 2.8V10h3V6.8H8.4C8.4 5.7 8.9 5 9.6 4.7z" fill="#4b4740"/></svg>'
  };

  /* ---------------- fixture ---------------- */
  var ITEMS = [
    {
      type:'vertical-video', reason:'Rare &mdash; posts weekly',
      title:'Scumbag Dad &mdash; the school pickup bit',
      src:'Scumbag Dad', dur:'0:48', mlabel:'Short',
      media:function(){
        return '<div class="media tall">'+svgPortrait(11)+
          '<span class="play"></span><span class="chip-dur">0:48</span></div>';
      },
      expand:['A 48-second vertical clip. The bit: he parks in the fire lane, insists it&rsquo;s "just for a second," and narrates every other parent&rsquo;s failure while doing the exact same thing.',
              'Fork off, it&rsquo;s a short &mdash; the preview just loops the first frames larger.']
    },
    {
      type:'video', reason:'Favorite source',
      title:'I got hit in the teeth at England&rsquo;s oldest ritual',
      src:'Tom Scott', dur:'10:24', mlabel:'Video',
      media:function(){
        return '<div class="media">'+svgLandscape(4)+
          '<span class="play"></span><span class="chip-dur">10:24</span></div>';
      },
      expand:['Tom travels to a village that has run the same shrove-tide football scrum for eight centuries. There are no real rules, the "pitch" is the whole town, and the goals are three miles apart.',
              'The teeth incident happens around the six-minute mark. He is fine. Mostly.']
    },
    {
      type:'article', reason:'Fresh &mdash; today',
      title:'Apple&rsquo;s entry-level MacBook Pro could get a redesign',
      src:'The Verge', dur:'4 min read', mlabel:'Article',
      excerpt:'A revamped entry model could arrive as soon as this year, per supply-chain reports.',
      media:function(){
        return '<div class="media">'+svgHero(7)+'</div>';
      },
      expand:['Supply-chain checks point to a thinner chassis and a move to the same display stack as the higher tiers, which would collapse most of the visible gap between the entry model and the 14-inch.',
              'The reporting is single-sourced and Apple has not commented, so treat the timeline as the softest part of the claim. The redesign itself is corroborated across two assemblers.',
              'If it ships this year it resets the whole line&rsquo;s pricing ladder.']
    },
    {
      type:'image', reason:'High-weight source',
      title:'Aurora over the Faroe Islands',
      src:'Astronomy Picture of the Day', dur:'Photo', mlabel:'Image',
      media:function(){
        return '<div class="media">'+svgPhoto(2)+
          '<span class="chip-dur">1 / 3</span>'+
          '<span class="gallery-dots"><i class="on"></i><i></i><i></i></span></div>';
      },
      expand:['Three frames in the set: the ridge line at blue hour, the full curtain overhead, and a long exposure over the fjord where the green folds into the water.',
              'Shot at 14mm, stacked. The dither here is standing in for a very green sky.']
    },
    {
      type:'audio', reason:'Rare &mdash; posts seldom',
      title:'The Real Book',
      src:'99% Invisible', dur:'32 min', mlabel:'Audio',
      media:function(){
        return '<div class="audio"><span class="aplay"></span>'+
          '<span class="wave">'+svgWave()+'</span>'+
          '<span class="adur">32:10</span></div>';
      },
      expand:['The story of the illegal fake book that every working jazz musician owned for decades &mdash; a bootleg of a bootleg, passed hand to hand, more authoritative than anything the labels published.',
              'Preview scrubs to the cold open. Long-press again on the waveform to collapse.']
    },
    {
      type:'quote', reason:'Recent',
      title:'Kottke',
      src:'Kottke', dur:'Text', mlabel:'Quote',
      quote:'The best way to predict the future is to invent it.',
      media:function(){
        return '<div class="pullquote"><span class="mark">&ldquo;</span>'+
          '<p>The best way to predict the future is to invent it.</p></div>';
      },
      expand:['Alan Kay, at a 1971 Xerox PARC meeting, arguing against forecasting as a spectator sport.',
              'Kottke pulled it alongside a note on why the good version of this idea is about agency, not hustle.']
    }
  ];

  /* ---------------- render ---------------- */
  var stage = document.getElementById('stage');
  var flash = document.getElementById('flash');
  var ticksWrap = document.getElementById('ticks');
  var pidx = document.getElementById('pidx');
  var ptot = document.getElementById('ptot');
  var donePanel = document.getElementById('donePanel');
  var legendEl = document.querySelector('.legend');

  ptot.textContent = ITEMS.length;
  var state = ITEMS.map(function(){ return {liked:false, opened:false, seen:false}; });
  var idx = 0;

  // build tick strip
  var tickEls = ITEMS.map(function(){
    var t=document.createElement('span'); t.className='tk'; ticksWrap.appendChild(t); return t;
  });
  function paintTicks(){
    tickEls.forEach(function(t,i){
      t.classList.toggle('done', i<idx);
      t.classList.toggle('cur', i===idx);
      t.classList.toggle('liked', state[i].liked && i<idx);
    });
    pidx.textContent = Math.min(idx+1, ITEMS.length);
  }

  function buildCard(i, cls){
    var it = ITEMS[i];
    var card = document.createElement('div');
    card.className = 'card '+cls+(it.type==='quote'?' quotecard':'');
    if(state[i].liked) card.classList.add('liked');
    card.dataset.i = i;

    var mediaHtml = it.media ? it.media() : '';
    var excerptHtml = it.excerpt ? '<p class="excerpt">'+it.excerpt+'</p>' : '';
    var titleHtml = '<h2 class="title">'+it.title+'</h2>';
    // quote: title is the source-y attribution, media is the pullquote itself
    var body;
    if(it.type==='quote'){
      body = '<span class="reason">'+reasonGlyph+it.reason+'</span>'+ mediaHtml +
             '<div class="meta"><span class="src">'+it.src+'</span><span class="dot"></span>'+
             '<span class="mtype">'+mediaTypeIcon[it.type]+it.mlabel+'</span></div>';
    } else {
      body = '<span class="reason">'+reasonGlyph+it.reason+'</span>'+
             mediaHtml + titleHtml + excerptHtml +
             '<div class="meta"><span class="src">'+it.src+'</span><span class="dot"></span>'+
             '<span>'+it.dur+'</span><span class="dot"></span>'+
             '<span class="mtype">'+mediaTypeIcon[it.type]+it.mlabel+'</span></div>';
    }

    var expandHtml = '<div class="expand"><p class="exlabel">Preview</p>'+
      it.expand.map(function(p){return '<p>'+p+'</p>';}).join('')+'</div>';

    card.innerHTML =
      '<span class="swipe-stamp like">Like</span>'+
      '<span class="swipe-stamp skip">Skip</span>'+
      '<span class="liked-flag">'+heartFull+'</span>'+
      '<div class="stamp" data-stamp><div class="word"></div></div>'+
      '<div class="card-scroll">'+ body + expandHtml +'</div>'+
      '<div class="actionbar">'+
        '<div class="ab" data-a="preview"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1.5 9S4.5 3.5 9 3.5 16.5 9 16.5 9 13.5 14.5 9 14.5 1.5 9 1.5 9z" stroke="#1a1815" stroke-width="1.3"/><circle cx="9" cy="9" r="2.2" stroke="#1a1815" stroke-width="1.3"/></svg>Preview</div>'+
        '<div class="ab '+(state[i].liked?'on':'')+'" data-a="like"><svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 15.5S2 11 2 6.4C2 4.3 3.6 2.8 5.6 2.8 7 2.8 8.2 3.7 9 4.9 9.8 3.7 11 2.8 12.4 2.8 14.4 2.8 16 4.3 16 6.4 16 11 9 15.5 9 15.5z" fill="none" stroke="#1a1815" stroke-width="1.3" class="hb"/></svg>Like</div>'+
        '<div class="ab" data-a="open"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M6 3h9v9M15 3l-8 8M3 7v8h8" stroke="#1a1815" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Open</div>'+
        '<div class="ab" data-a="skip"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 4l6 5-6 5zM12 4v10" stroke="#1a1815" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Skip</div>'+
      '</div>';
    return card;
  }

  var frontCard=null, behindCard=null;

  function mount(){
    // clear existing cards (not flash/done/legend)
    Array.prototype.slice.call(stage.querySelectorAll('.card')).forEach(function(c){c.remove();});
    if(idx>=ITEMS.length){ finish(); return; }
    behindCard = (idx+1<ITEMS.length) ? buildCard(idx+1,'behind') : null;
    if(behindCard) stage.insertBefore(behindCard, flash.nextSibling);
    frontCard = buildCard(idx,'front');
    stage.insertBefore(frontCard, legendEl);
    state[idx].seen = true;
    wireGestures(frontCard);
    paintTicks();
  }

  /* ---------------- feedback stamp ---------------- */
  function showStamp(card, kind){
    var s = card.querySelector('[data-stamp]');
    var word = s.querySelector('.word');
    if(kind==='like'){
      s.innerHTML = '<div class="heart">'+heartFull.replace('width="14"','').replace('height="14"','')+'</div>';
      s.firstChild.className='heart';
    } else {
      s.innerHTML = '<div class="word">'+kind+'</div>';
    }
    s.classList.remove('go'); void s.offsetWidth; s.classList.add('go');
  }

  function tickFlash(){
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
  }

  /* ---------------- actions ---------------- */
  function setLiked(card, i, on){
    state[i].liked = on;
    card.classList.toggle('liked', on);
    var likeBtn = card.querySelector('[data-a="like"]');
    if(likeBtn) likeBtn.classList.toggle('on', on);
    paintTicks();
  }

  function doLike(card, i){
    if(!state[i].liked){
      setLiked(card, i, true);
      showStamp(card, 'like');
    } else {
      setLiked(card, i, false); // double-tap again unlikes, no stamp
    }
  }

  function doOpen(card, i){
    state[i].opened = true;
    showStamp(card, 'opened');
  }

  function togglePreview(card){
    card.classList.toggle('expanded');
    if(card.classList.contains('expanded')){
      showStamp(card,'preview');
      var sc = card.querySelector('.card-scroll');
      setTimeout(function(){ sc.scrollTo({top:sc.scrollHeight*0.4, behavior:'smooth'}); }, 260);
    }
  }

  function advance(direction, i){
    // direction: 'like'(right) or 'skip'(left)
    if(direction==='like' && !state[i].liked){ setLiked(frontCard,i,true); }
    var card = frontCard;
    var toX = direction==='like' ? 520 : -520;
    var rot = direction==='like' ? 14 : -14;
    card.classList.add('settling');
    card.style.transform = 'translateX('+toX+'px) rotate('+rot+'deg)';
    card.style.opacity = '0';
    tickFlash();
    setTimeout(function(){
      idx++;
      mount();
    }, 300);
  }

  /* ---------------- gesture wiring ---------------- */
  function wireGestures(card){
    var scroll = card.querySelector('.card-scroll');
    var likeStamp = card.querySelector('.swipe-stamp.like');
    var skipStamp = card.querySelector('.swipe-stamp.skip');

    var startX=0, startY=0, dx=0, dy=0;
    var down=false, moved=false, lockH=false, lockV=false;
    var startT=0, lpTimer=null, lpFired=false;
    var lastTap=0, singleTimer=null;
    var i = idx;

    var SWIPE=110, LONG=460, TAPMOVE=10, DTAP=280;

    function clearLP(){ if(lpTimer){clearTimeout(lpTimer);lpTimer=null;} }

    function pointerDown(e){
      if(e.button===1||e.button===2) return;
      down=true; moved=false; lockH=false; lockV=false; lpFired=false;
      startX=e.clientX; startY=e.clientY; dx=0; dy=0; startT=Date.now();
      card.classList.add('pressing');
      if(card.setPointerCapture && e.pointerId!=null){ try{card.setPointerCapture(e.pointerId);}catch(_){} }
      clearLP();
      lpTimer=setTimeout(function(){
        if(!down) return;
        if(Math.abs(dx)<TAPMOVE && Math.abs(dy)<TAPMOVE){
          lpFired=true;
          navigator.vibrate && navigator.vibrate(8);
          togglePreview(card);
          card.classList.remove('pressing');
        }
      }, LONG);
    }

    function pointerMove(e){
      if(!down) return;
      dx=e.clientX-startX; dy=e.clientY-startY;
      if(!lockH && !lockV){
        if(Math.abs(dx)>8 && Math.abs(dx)>Math.abs(dy)*1.3){ lockH=true; clearLP(); }
        else if(Math.abs(dy)>8){ lockV=true; clearLP(); } // vertical => let it scroll
      }
      if(Math.abs(dx)>TAPMOVE||Math.abs(dy)>TAPMOVE){ moved=true; }
      if(lockH){
        e.preventDefault();
        card.classList.remove('pressing');
        var rot = dx*0.03;
        card.style.transform='translateX('+dx+'px) rotate('+rot+'deg)';
        var p = Math.max(0, Math.min(1, Math.abs(dx)/SWIPE));
        if(dx>0){ likeStamp.style.opacity=p; skipStamp.style.opacity=0; }
        else{ skipStamp.style.opacity=p; likeStamp.style.opacity=0; }
      }
    }

    function pointerUp(e){
      if(!down) return;
      down=false;
      card.classList.remove('pressing');
      clearLP();
      var dt=Date.now()-startT;

      if(lpFired){ return; } // long-press already handled

      if(lockH && Math.abs(dx)>=SWIPE){
        advance(dx>0?'like':'skip', i);
        return;
      }

      if(lockH){
        // released a short horizontal drag -> spring back
        card.classList.add('settling');
        card.style.transform='';
        likeStamp.style.opacity=0; skipStamp.style.opacity=0;
        setTimeout(function(){ card.classList.remove('settling'); }, 340);
        return;
      }

      // tap logic (no horizontal lock, minimal move, quick)
      if(!moved && dt<LONG){
        var now=Date.now();
        if(now-lastTap < DTAP){
          // double tap -> like
          if(singleTimer){ clearTimeout(singleTimer); singleTimer=null; }
          lastTap=0;
          doLike(card, i);
        } else {
          lastTap=now;
          var tappedMediaOrTitle = !!(e.target.closest('.media')||e.target.closest('.audio')||e.target.closest('.pullquote')||e.target.closest('.title'));
          singleTimer=setTimeout(function(){
            singleTimer=null;
            if(tappedMediaOrTitle){ doOpen(card, i); }
          }, DTAP);
        }
      }
    }

    card.addEventListener('pointerdown', pointerDown);
    card.addEventListener('pointermove', pointerMove, {passive:false});
    window.addEventListener('pointerup', pointerUp);
    card.addEventListener('pointercancel', function(){ down=false; clearLP(); card.classList.remove('pressing'); });

    // action bar buttons (explicit, non-gesture path)
    card.querySelectorAll('.ab').forEach(function(b){
      b.addEventListener('click', function(ev){
        ev.stopPropagation();
        var a=b.dataset.a;
        if(a==='like') doLike(card, i);
        else if(a==='open') doOpen(card, i);
        else if(a==='preview') togglePreview(card);
        else if(a==='skip') advance('skip', i);
      });
    });
  }

  /* ---------------- finish ---------------- */
  function finish(){
    var liked = state.filter(function(s){return s.liked;}).length;
    var opened = state.filter(function(s){return s.opened;}).length;
    document.getElementById('tally').innerHTML = liked+' liked &middot; '+opened+' opened';
    tickFlash();
    setTimeout(function(){ donePanel.classList.add('show'); }, 200);
    paintTicks();
    pidx.textContent = ITEMS.length;
  }

  document.getElementById('restart').addEventListener('click', function(){
    idx=0;
    state = ITEMS.map(function(){ return {liked:false, opened:false, seen:false}; });
    donePanel.classList.remove('show');
    tickFlash();
    setTimeout(mount, 160);
  });

  /* ---------------- boot ---------------- */
  mount();

})();
</script>
</body>
</html>
