<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>otium — e-ink · tap zones</title>
<style>
  :root{
    --paper:#f4f2ec;
    --paper-2:#efece3;
    --ink:#1a1815;
    --ink-soft:#4b4740;
    --ink-mute:#8b857a;
    --rule:#c9c3b5;
    --rule-hard:#1a1815;
    --hair:#d9d4c8;
    --serif:"Charter","Iowan Old Style","Georgia",serif;
    --grot:"Helvetica Neue","Arial",sans-serif;
    --mono:"SF Mono","Menlo",ui-monospace,monospace;
    --didot:"Didot","Hoefler Text","Baskerville",serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:#3b3a36;
    background-image:radial-gradient(circle at 30% 20%, #4a4844 0%, #2c2b28 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    padding:18px;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;
    width:390px;height:844px;max-height:calc(100vh - 24px);
    background:var(--paper);
    border-radius:44px;
    box-shadow:0 0 0 2px #111, 0 0 0 12px #16150f, 0 30px 70px rgba(0,0,0,.55);
    overflow:hidden;
    display:flex;flex-direction:column;
    user-select:none;
  }
  /* paper grain */
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:6;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    mix-blend-mode:multiply;opacity:.6;
  }

  /* status bar */
  .status{
    position:relative;z-index:4;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 8px;
    font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--ink);
    flex:0 0 auto;
  }
  .status .dots{display:flex;gap:3px;align-items:center;}
  .status .bar{width:2px;background:var(--ink);}
  .status .bar:nth-child(1){height:5px}
  .status .bar:nth-child(2){height:7px}
  .status .bar:nth-child(3){height:9px}
  .status .bar:nth-child(4){height:11px}

  /* ---------- minimal top strip ---------- */
  .topstrip{
    position:relative;z-index:4;flex:0 0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:2px 24px 10px;
  }
  .topstrip .wm{
    font-family:var(--didot);font-size:19px;color:var(--ink);letter-spacing:.01em;
  }
  .topstrip .idx{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--ink-soft);
  }
  .topstrip .idx b{color:var(--ink);font-weight:700;}

  /* ---------- reader stage ---------- */
  .stage{position:relative;flex:1 1 auto;overflow:hidden;z-index:3;}

  .page{
    position:absolute;inset:0;
    padding:14px 30px 78px;
    display:flex;flex-direction:column;
    opacity:0;visibility:hidden;
    transition:opacity .3s steps(3,end);
  }
  .page.active{opacity:1;visibility:visible;}

  /* e-ink refresh flash */
  .flash{
    position:absolute;inset:0;z-index:20;pointer-events:none;
    background:var(--ink);opacity:0;
  }
  .flash.go{animation:refresh .26s steps(2,end) forwards;}
  @keyframes refresh{
    0%{opacity:0}
    40%{opacity:.92}
    41%{opacity:.04}
    70%{opacity:.5}
    100%{opacity:0}
  }

  /* reason stamp */
  .reason{
    align-self:flex-start;
    display:inline-flex;align-items:center;gap:7px;
    font-family:var(--grot);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink);border:1px solid var(--rule-hard);
    padding:4px 9px;background:var(--paper-2);
    margin-bottom:20px;
  }
  .reason .glyph{width:9px;height:9px;flex:0 0 auto;}

  /* media block */
  .media{
    align-self:stretch;position:relative;margin-bottom:22px;
  }
  .media.center{display:flex;justify-content:center;}
  .frame{
    position:relative;border:1.5px solid var(--rule-hard);background:var(--paper-2);
    overflow:hidden;
  }
  /* dither fields via layered radial + hatch */
  .dith{
    position:absolute;inset:0;
    background-image:radial-gradient(var(--ink) .8px, transparent 1.1px);
    background-size:5px 5px;opacity:.16;
  }
  .dith.d2{
    background-image:radial-gradient(var(--ink) 1px, transparent 1.3px);
    background-size:7px 7px;opacity:.1;
  }
  .hatch{
    position:absolute;inset:0;opacity:.12;
    background-image:repeating-linear-gradient(45deg, var(--ink) 0 1px, transparent 1px 6px);
  }
  /* tonal wash to imply a scene */
  .wash{position:absolute;inset:0;opacity:.5;mix-blend-mode:multiply;}

  .play{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:52px;height:52px;border-radius:50%;
    border:1.5px solid var(--rule-hard);background:var(--paper);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 0 rgba(26,24,21,.25);
  }
  .play::after{
    content:"";margin-left:3px;
    border-left:15px solid var(--ink);
    border-top:9px solid transparent;border-bottom:9px solid transparent;
  }
  .chip-dur{
    position:absolute;right:8px;bottom:8px;
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;
    color:var(--paper);background:var(--ink);
    padding:2px 7px;border:1px solid var(--ink);
  }
  .gdots{
    position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
    display:flex;gap:6px;
  }
  .gdots i{width:6px;height:6px;border:1px solid var(--rule-hard);background:var(--paper);}
  .gdots i.on{background:var(--ink);}

  /* audio waveform */
  .wave{
    align-self:stretch;border:1.5px solid var(--rule-hard);background:var(--paper-2);
    padding:16px 16px 12px;margin-bottom:22px;
  }
  .wave svg{display:block;width:100%;height:66px;}
  .wave .wfoot{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:12px;
  }
  .wave .wplay{
    display:flex;align-items:center;gap:10px;
    font-family:var(--grot);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);
  }
  .wave .wplay .pbtn{
    width:34px;height:34px;border-radius:50%;border:1.5px solid var(--rule-hard);background:var(--paper);
    display:flex;align-items:center;justify-content:center;
  }
  .wave .wplay .pbtn::after{
    content:"";margin-left:2px;
    border-left:11px solid var(--ink);
    border-top:7px solid transparent;border-bottom:7px solid transparent;
  }
  .wave .wtime{font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.03em;}

  /* pull-quote */
  .pull{
    align-self:stretch;flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;
    padding:4px 2px 20px;
  }
  .pull .qmark{
    font-family:var(--didot);font-size:96px;line-height:.5;color:var(--ink);
    margin:0 0 12px;height:52px;
  }
  .pull blockquote{
    margin:0;font-family:var(--serif);font-style:italic;font-weight:400;
    font-size:32px;line-height:1.24;letter-spacing:-.01em;color:var(--ink);
  }
  .pull .qrule{width:64px;height:1.5px;background:var(--rule-hard);margin:24px 0 0;}

  /* article excerpt */
  .excerpt{
    font-family:var(--serif);font-size:16px;line-height:1.5;color:var(--ink-soft);
    margin:0 0 4px;
  }
  .excerpt::first-letter{
    font-family:var(--didot);font-size:46px;line-height:.8;float:left;
    padding:4px 8px 0 0;color:var(--ink);
  }

  /* text block */
  .txt{flex:1 1 auto;display:flex;flex-direction:column;}

  h1.rt{
    font-family:var(--serif);font-weight:400;
    font-size:27px;line-height:1.16;letter-spacing:-.01em;color:var(--ink);
    margin:0 0 12px;
  }
  h1.rt em{font-style:italic;}
  .byline{
    display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;color:var(--ink-soft);
    margin:auto 0 0;padding-top:16px;
  }
  .byline .src{font-family:var(--grot);font-size:12.5px;letter-spacing:.03em;color:var(--ink);}
  .byline .dot{width:3px;height:3px;background:var(--ink-mute);border-radius:50%;}
  .byline .mtype{
    display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;
    letter-spacing:.12em;font-size:10px;font-family:var(--grot);color:var(--ink);
  }

  /* liked heart stamp overlay on media */
  .likestamp{
    position:absolute;left:10px;top:10px;z-index:3;
    opacity:0;transform:scale(.6) rotate(-14deg);
    transition:opacity .01s;
  }
  .likestamp.on{
    opacity:1;
    animation:stamp .32s steps(3,end);
  }
  @keyframes stamp{
    0%{opacity:0;transform:scale(1.5) rotate(-14deg);}
    60%{opacity:1;transform:scale(.9) rotate(-14deg);}
    100%{opacity:1;transform:scale(1) rotate(-14deg);}
  }
  .likestamp svg{display:block;}

  /* ---------- tap-zone hint edges ---------- */
  .zonehint{
    position:absolute;top:50%;transform:translateY(-50%);z-index:5;pointer-events:none;
    font-family:var(--grot);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink-mute);opacity:0;transition:opacity .18s;
    display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  .zonehint.left{left:14px;}
  .zonehint.right{right:14px;}
  .zonehint.show{opacity:.9;}
  .zonehint .arw{font-size:16px;color:var(--ink);}

  /* ---------- tap zones ---------- */
  .zones{position:absolute;inset:0;z-index:7;display:flex;}
  .zone{flex:1;}
  .zone.back{flex:0 0 30%;}
  .zone.fwd{flex:0 0 30%;}
  .zone.mid{flex:1;}
  .zone:active{background:rgba(26,24,21,.03);}

  /* invisible open target sits above mid zone, over media+title */
  .opentarget{
    position:absolute;left:30%;right:30%;top:0;bottom:78px;z-index:8;
  }

  /* ---------- bottom: progress rule + long-press dock ---------- */
  .dockbar{
    position:absolute;left:0;right:0;bottom:0;z-index:9;height:78px;
    display:flex;flex-direction:column;justify-content:flex-end;
    pointer-events:none;
  }
  /* the long-press handle (center) */
  .handle{
    pointer-events:auto;
    align-self:center;margin-bottom:12px;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    padding:6px 22px 4px;
    opacity:.75;transition:opacity .2s;
  }
  .handle:active{opacity:1;}
  .handle .grip{
    width:40px;height:4px;border-radius:2px;background:var(--ink-mute);
    position:relative;overflow:hidden;
  }
  .handle .grip::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--ink);
    transition:width .05s linear;
  }
  .handle.press .grip::after{width:100%;transition:width .5s linear;}
  .handle .hlabel{
    font-family:var(--grot);font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mute);
  }

  /* hair-thin progress rule flush to bottom */
  .progress{
    position:relative;height:2px;background:var(--hair);
    border-top:1px solid var(--hair);
  }
  .progress .fill{
    position:absolute;left:0;top:0;bottom:0;background:var(--ink);
    width:16.6%;transition:width .34s steps(4,end);
  }
  .progress .ticks{position:absolute;inset:0;display:flex;}
  .progress .ticks i{flex:1;}
  .progress .ticks i + i{border-left:1px solid var(--paper);}

  /* ---------- action dock (revealed by long-press) ---------- */
  .dock{
    position:absolute;left:0;right:0;bottom:0;z-index:12;
    background:var(--paper);border-top:1.5px solid var(--rule-hard);
    transform:translateY(100%);
    transition:transform .32s steps(4,end);
    padding:16px 22px calc(16px + env(safe-area-inset-bottom));
  }
  .dock.up{transform:translateY(0);}
  .dock::before{
    content:"";position:absolute;top:6px;left:50%;transform:translateX(-50%);
    width:40px;height:4px;border-radius:2px;background:var(--ink-mute);
  }
  .dock .drow{display:flex;gap:11px;margin-top:12px;}
  .dact{
    flex:1;min-height:52px;border:1.5px solid var(--rule-hard);background:var(--paper);
    font-family:var(--grot);font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);display:flex;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;
  }
  .dact:active{transform:translateY(1px);}
  .dact .ic{width:15px;height:15px;display:block;}
  .dact.open{background:var(--ink);color:var(--paper);flex:1.4;}
  .dact.open .ic *{stroke:var(--paper);}
  .dact.like.on{background:var(--ink);color:var(--paper);}
  .dact.like.on .ic path{fill:var(--paper);stroke:var(--paper);}
  .dact.skip.on{opacity:.5;}
  .dock .dclose{
    text-align:center;margin-top:14px;
    font-family:var(--grot);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute);
    cursor:pointer;
  }
  .scrim{
    position:absolute;inset:0;z-index:11;background:var(--ink);opacity:0;visibility:hidden;
    transition:opacity .3s,visibility .3s;
  }
  .scrim.on{opacity:.14;visibility:visible;}

  /* ---------- open sheet (article/media viewer) ---------- */
  .opensheet{
    position:absolute;inset:0;z-index:15;background:var(--paper);
    transform:translateY(100%);transition:transform .34s steps(4,end);
    display:flex;flex-direction:column;
  }
  .opensheet.up{transform:translateY(0);}
  .opensheet .ohead{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 24px 12px;border-bottom:1.5px solid var(--rule-hard);
  }
  .opensheet .ohead .otag{
    font-family:var(--grot);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);
  }
  .opensheet .oclose{
    font-family:var(--grot);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);
    border:1.5px solid var(--rule-hard);padding:6px 12px;cursor:pointer;background:var(--paper);
  }
  .opensheet .obody{padding:22px 26px;overflow-y:auto;}
  .opensheet .obody h2{
    font-family:var(--serif);font-weight:400;font-size:26px;line-height:1.14;color:var(--ink);margin:0 0 10px;
  }
  .opensheet .obody p{
    font-family:var(--serif);font-size:16px;line-height:1.55;color:var(--ink-soft);margin:0 0 14px;
  }
  .opensheet .obody .osrc{
    font-family:var(--mono);font-size:11.5px;letter-spacing:.03em;color:var(--ink-mute);
    margin-bottom:20px;
  }
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="status">
    <span>9:41</span>
    <span class="dots" aria-hidden="true">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
      &nbsp;<svg width="22" height="11" viewBox="0 0 22 11"><rect x="0.5" y="0.5" width="18" height="10" rx="2" fill="none" stroke="#1a1815"/><rect x="19" y="3.5" width="2" height="4" fill="#1a1815"/><rect x="2" y="2" width="13" height="7" fill="#1a1815"/></svg>
    </span>
  </div>

  <div class="topstrip">
    <div class="wm">otium</div>
    <div class="idx"><b id="idxN">1</b> / 6</div>
  </div>

  <div class="stage" id="stage">
    <div class="flash" id="flash"></div>

    <!-- pages injected here -->

    <!-- edge hints -->
    <div class="zonehint left" id="hintL"><span class="arw">&larr;</span>back</div>
    <div class="zonehint right" id="hintR"><span class="arw">&rarr;</span>next</div>

    <!-- tap zones -->
    <div class="zones" id="zones">
      <div class="zone back" id="zBack"></div>
      <div class="zone mid"  id="zMid"></div>
      <div class="zone fwd"  id="zFwd"></div>
    </div>
    <!-- open target (tap media/title) sits over the middle column -->
    <div class="opentarget" id="zOpen"></div>

    <!-- bottom dockbar: long-press handle + progress -->
    <div class="dockbar">
      <div class="handle" id="handle">
        <div class="grip" id="grip"></div>
        <div class="hlabel">hold for actions</div>
      </div>
    </div>

    <div class="scrim" id="scrim"></div>

    <!-- action dock -->
    <div class="dock" id="dock">
      <div class="drow">
        <button class="dact open" id="dOpen">
          <svg class="ic" viewBox="0 0 14 14"><path d="M4 2.5h7.5V10M11.5 2.5L4.5 9.5M2.5 5v6.5H9" fill="none" stroke="#1a1815" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Open
        </button>
        <button class="dact like" id="dLike">
          <svg class="ic" viewBox="0 0 14 14"><path d="M7 12S1.5 8.6 1.5 4.9C1.5 3.3 2.7 2 4.3 2 5.4 2 6.4 2.7 7 3.7 7.6 2.7 8.6 2 9.7 2 11.3 2 12.5 3.3 12.5 4.9 12.5 8.6 7 12 7 12z" fill="none" stroke="#1a1815" stroke-width="1.2"/></svg>
          Like
        </button>
        <button class="dact skip" id="dSkip">
          <svg class="ic" viewBox="0 0 14 14"><path d="M2.5 3l5 4-5 4zM9.5 3v8" fill="none" stroke="#1a1815" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Skip
        </button>
      </div>
      <div class="dclose" id="dClose">close</div>
    </div>

    <!-- progress rule flush bottom -->
    <div class="progress">
      <div class="ticks"><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <div class="fill" id="pFill"></div>
    </div>

    <!-- open sheet -->
    <div class="opensheet" id="opensheet">
      <div class="ohead">
        <div class="otag" id="oTag">Opening</div>
        <button class="oclose" id="oClose">Close</button>
      </div>
      <div class="obody" id="oBody"></div>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";

  var reasonGlyph = '<svg class="glyph" viewBox="0 0 9 9" width="9" height="9"><rect x="1.2" y="1.2" width="6.6" height="6.6" fill="#1a1815"/></svg>';
  var likeStampSvg = '<svg width="46" height="46" viewBox="0 0 46 46"><circle cx="23" cy="23" r="21" fill="none" stroke="#1a1815" stroke-width="1.5" stroke-dasharray="2 3"/><path d="M23 34S11 26.5 11 18.6C11 15.1 13.6 12.4 17 12.4 19.3 12.4 21.4 13.9 23 16.1 24.6 13.9 26.7 12.4 29 12.4 32.4 12.4 35 15.1 35 18.6 35 26.5 23 34 23 34z" fill="#1a1815"/></svg>';

  // ---- media renderers (e-ink SVG placeholders) ----
  function mVerticalVideo(dur){
    return '<div class="media center"><div class="frame" style="width:196px;height:348px;">'+
      '<div class="dith"></div><div class="dith d2"></div>'+
      '<svg class="wash" viewBox="0 0 100 178" preserveAspectRatio="xMidYMid slice">'+
        '<rect x="0" y="120" width="100" height="58" fill="#1a1815" opacity="0.35"/>'+
        '<ellipse cx="50" cy="70" rx="20" ry="26" fill="#1a1815" opacity="0.4"/>'+
        '<rect x="34" y="96" width="32" height="60" rx="10" fill="#1a1815" opacity="0.45"/>'+
      '</svg>'+
      '<div class="likestamp" data-stamp>'+likeStampSvg+'</div>'+
      '<div class="play"></div>'+
      '<span class="chip-dur">'+dur+'</span>'+
    '</div></div>';
  }
  function mHorizVideo(dur){
    return '<div class="media"><div class="frame" style="width:100%;padding-top:56.25%;">'+
      '<div class="dith"></div><div class="dith d2"></div>'+
      '<svg class="wash" viewBox="0 0 160 90" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%;">'+
        '<rect x="0" y="58" width="160" height="32" fill="#1a1815" opacity="0.3"/>'+
        '<path d="M0 60 Q40 40 80 56 T160 50 V90 H0 Z" fill="#1a1815" opacity="0.25"/>'+
        '<circle cx="118" cy="30" r="12" fill="#1a1815" opacity="0.3"/>'+
      '</svg>'+
      '<div class="likestamp" data-stamp>'+likeStampSvg+'</div>'+
      '<div class="play"></div>'+
      '<span class="chip-dur">'+dur+'</span>'+
    '</div></div>';
  }
  function mArticleHero(){
    return '<div class="media"><div class="frame" style="width:100%;padding-top:42%;">'+
      '<div class="dith"></div><div class="dith d2"></div><div class="hatch"></div>'+
      '<svg class="wash" viewBox="0 0 160 68" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%;">'+
        '<rect x="52" y="14" width="56" height="40" rx="4" fill="#1a1815" opacity="0.3"/>'+
        '<rect x="60" y="22" width="40" height="3" fill="#f4f2ec" opacity="0.5"/>'+
        '<rect x="60" y="30" width="40" height="16" rx="2" fill="#1a1815" opacity="0.4"/>'+
      '</svg>'+
      '<div class="likestamp" data-stamp>'+likeStampSvg+'</div>'+
    '</div></div>';
  }
  function mPhoto(){
    return '<div class="media"><div class="frame" style="width:100%;padding-top:66%;">'+
      '<div class="dith"></div><div class="dith d2"></div>'+
      '<svg class="wash" viewBox="0 0 160 106" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%;">'+
        '<rect x="0" y="70" width="160" height="36" fill="#1a1815" opacity="0.45"/>'+
        '<path d="M0 40 Q30 10 60 30 T120 20 T160 34 V70 H0 Z" fill="#1a1815" opacity="0.28"/>'+
        '<path d="M0 55 Q40 30 80 48 T160 40 V70 H0 Z" fill="#1a1815" opacity="0.22"/>'+
        '<circle cx="30" cy="18" r="1.4" fill="#1a1815"/><circle cx="70" cy="10" r="1.2" fill="#1a1815"/><circle cx="120" cy="16" r="1.6" fill="#1a1815"/><circle cx="146" cy="9" r="1.2" fill="#1a1815"/>'+
      '</svg>'+
      '<div class="likestamp" data-stamp>'+likeStampSvg+'</div>'+
      '<div class="gdots"><i class="on"></i><i></i><i></i></div>'+
    '</div></div>';
  }
  function mAudio(dur){
    var bars='';
    var heights=[10,22,38,26,48,60,40,54,30,46,58,34,20,44,62,50,28,42,56,36,18,30,48,60,44,24,38,52,32,16,26,40,54,46,30,20];
    var n=heights.length, w=100/n;
    for(var i=0;i<n;i++){
      var h=heights[i], y=(66-h)/2;
      bars+='<rect x="'+(i*w+w*0.18).toFixed(2)+'" y="'+y.toFixed(1)+'" width="'+(w*0.5).toFixed(2)+'" height="'+h+'" fill="#1a1815" opacity="'+(i<14?0.85:0.28)+'"/>';
    }
    return '<div class="wave">'+
      '<svg viewBox="0 0 100 66" preserveAspectRatio="none">'+bars+
        '<line x1="0" y1="33" x2="100" y2="33" stroke="#1a1815" stroke-width="0.4" opacity="0.3"/>'+
      '</svg>'+
      '<div class="wfoot">'+
        '<div class="wplay"><span class="pbtn"></span>Listen</div>'+
        '<div class="wtime">14:20 / '+dur+'</div>'+
      '</div>'+
    '</div>';
  }

  // ---- fixture ----
  var items = [
    { type:'vshort', reason:'Rare — posts weekly', title:'Scumbag Dad — the <em>school pickup</em> bit',
      src:'Scumbag Dad', dur:'0:48', mtype:'Short',
      media:function(){return mVerticalVideo('0:48');},
      full:'Ninety seconds of a dad narrating the tactical chaos of the elementary-school pickup line like a nature documentary. The bit lands because it is exactly true.' },
    { type:'hvideo', reason:'Favorite source', title:'I got hit in the teeth at England&rsquo;s <em>oldest ritual</em>',
      src:'Tom Scott', dur:'10:24', mtype:'Video',
      media:function(){return mHorizVideo('10:24');},
      full:'A centuries-old shrovetide football match with no real rules, a whole town as the pitch, and goals two miles apart. Tom takes an elbow to the face and keeps filming.' },
    { type:'article', reason:'Fresh — today', title:'Apple&rsquo;s entry-level MacBook Pro could get a <em>redesign</em>',
      src:'The Verge', dur:'4 min read', mtype:'Article',
      excerpt:'A revamped entry model could arrive as soon as this year, per supply-chain reports.',
      media:function(){return mArticleHero();},
      full:'A revamped entry model could arrive as soon as this year, per supply-chain reports. The changes reportedly center on a thinner chassis and a shift to the newer display stack currently reserved for the higher tiers, which would close the gap between the base and Pro lines.' },
    { type:'photo', reason:'High-weight source', title:'Aurora over the <em>Faroe Islands</em>',
      src:'Astronomy Picture of the Day', dur:'Photo', mtype:'Image',
      media:function(){return mPhoto();},
      full:'Green curtains of aurora ripple over a sea-cliff village in the North Atlantic. A three-frame set: the wide field, a tighter crop on the ridgeline, and a long exposure over the harbor.' },
    { type:'audio', reason:'Rare — posts seldom', title:'The <em>Real Book</em>',
      src:'99% Invisible', dur:'32 min', mtype:'Audio',
      media:function(){return mAudio('32:00');},
      full:'For decades, every working jazz musician carried the same illegal, hand-copied fake book. The story of how a bootleg became the standard, and what happened when it finally went legit.' },
    { type:'quote', reason:'Recent', title:'', src:'Kottke', dur:'Quote', mtype:'Text',
      quote:'The best way to predict the future is to invent it.',
      media:null,
      full:'Alan Kay, 1971. Kottke pulls it back up in a short note on tool-makers versus forecasters, and why building beats betting.' }
  ];

  // ---- build pages ----
  var stage = document.getElementById('stage');
  var flash = document.getElementById('flash');
  var pageEls = [];
  var beforeAnchor = document.querySelector('.zonehint.left');

  items.forEach(function(it, i){
    var p = document.createElement('div');
    p.className = 'page';
    var html = '<span class="reason">'+reasonGlyph+it.reason+'</span>';

    if(it.type==='quote'){
      html += '<div class="pull">'+
        '<div class="qmark">&ldquo;</div>'+
        '<blockquote>'+it.quote+'</blockquote>'+
        '<div class="qrule"></div>'+
        '<div class="byline"><span class="src">'+it.src+'</span><span class="dot"></span>'+
          '<span class="mtype">'+it.mtype+'</span></div>'+
      '</div>';
    } else if(it.type==='article'){
      html += it.media();
      html += '<div class="txt">'+
        '<h1 class="rt">'+it.title+'</h1>'+
        '<p class="excerpt">'+it.excerpt+'</p>'+
        '<div class="byline"><span class="src">'+it.src+'</span><span class="dot"></span>'+
          '<span>'+it.dur+'</span><span class="dot"></span>'+
          '<span class="mtype">'+it.mtype+'</span></div>'+
      '</div>';
    } else {
      html += it.media();
      html += '<div class="txt">'+
        '<h1 class="rt">'+it.title+'</h1>'+
        '<div class="byline"><span class="src">'+it.src+'</span><span class="dot"></span>'+
          '<span>'+it.dur+'</span><span class="dot"></span>'+
          '<span class="mtype">'+it.mtype+'</span></div>'+
      '</div>';
    }
    p.innerHTML = html;
    stage.insertBefore(p, flash.nextSibling);
    pageEls.push(p);
  });

  // ---- state ----
  var idx = 0;
  var liked = items.map(function(){return false;});
  var skipped = items.map(function(){return false;});
  var N = items.length;

  var idxN = document.getElementById('idxN');
  var pFill = document.getElementById('pFill');
  var dock = document.getElementById('dock');
  var scrim = document.getElementById('scrim');
  var dLike = document.getElementById('dLike');
  var dSkip = document.getElementById('dSkip');

  function doFlash(){
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
  }

  function render(){
    pageEls.forEach(function(p,i){ p.classList.toggle('active', i===idx); });
    idxN.textContent = (idx+1);
    pFill.style.width = ((idx+1)/N*100).toFixed(3)+'%';
    // sync stamp
    var stamp = pageEls[idx].querySelector('[data-stamp]');
    if(stamp) stamp.classList.toggle('on', liked[idx]);
    // sync dock buttons to this item
    dLike.classList.toggle('on', liked[idx]);
    dSkip.classList.toggle('on', skipped[idx]);
    pageEls[idx].style.opacity = skipped[idx] ? '0.4' : '';
  }

  function show(n){
    if(n<0||n>=N||n===idx) return;
    idx = n;
    doFlash();
    setTimeout(render, 120);
  }
  function next(){ if(idx<N-1) show(idx+1); else { doFlash(); } }
  function back(){ if(idx>0) show(idx-1); }

  render();

  // ---- tap zones ----
  var hintL = document.getElementById('hintL');
  var hintR = document.getElementById('hintR');
  function pulseHint(el){ el.classList.add('show'); setTimeout(function(){ el.classList.remove('show'); }, 260); }

  document.getElementById('zBack').addEventListener('click', function(){ pulseHint(hintL); back(); });
  document.getElementById('zFwd').addEventListener('click', function(){ pulseHint(hintR); next(); });

  // mid zone (below media/title, outside opentarget) still advances — Kindle behaves this way for bottom mid
  document.getElementById('zMid').addEventListener('click', function(){ pulseHint(hintR); next(); });

  // ---- open (tap media / title) ----
  var opensheet = document.getElementById('opensheet');
  var oTag = document.getElementById('oTag');
  var oBody = document.getElementById('oBody');

  function openItem(){
    var it = items[idx];
    oTag.textContent = it.mtype;
    var title = it.title ? it.title : ('&ldquo;'+it.quote+'&rdquo;');
    oBody.innerHTML =
      '<h2>'+title.replace(/<\/?em>/g,'')+'</h2>'+
      '<div class="osrc">'+it.src+' &middot; '+it.dur+'</div>'+
      '<p>'+it.full+'</p>'+
      (it.type==='article'||it.type==='quote' ? '' :
        '<p style="font-family:var(--grot);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);">Playback would begin here.</p>');
    doFlash();
    setTimeout(function(){ opensheet.classList.add('up'); }, 90);
  }
  document.getElementById('zOpen').addEventListener('click', openItem);
  document.getElementById('dOpen').addEventListener('click', function(){ closeDock(); openItem(); });
  document.getElementById('oClose').addEventListener('click', function(){
    doFlash(); setTimeout(function(){ opensheet.classList.remove('up'); }, 60);
  });

  // ---- long-press handle -> reveal action dock ----
  var handle = document.getElementById('handle');
  var pressTimer=null, pressed=false;

  function startPress(e){
    e.preventDefault();
    handle.classList.add('press');
    pressTimer = setTimeout(function(){
      pressed=true;
      openDock();
    }, 500);
  }
  function endPress(){
    handle.classList.remove('press');
    if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; }
  }
  handle.addEventListener('pointerdown', startPress);
  handle.addEventListener('pointerup', endPress);
  handle.addEventListener('pointerleave', endPress);
  handle.addEventListener('pointercancel', endPress);
  // touch fallback
  handle.addEventListener('touchstart', startPress, {passive:false});
  handle.addEventListener('touchend', endPress);

  function openDock(){
    dock.classList.add('up'); scrim.classList.add('on');
  }
  function closeDock(){
    dock.classList.remove('up'); scrim.classList.remove('on'); pressed=false;
  }
  document.getElementById('dClose').addEventListener('click', closeDock);
  scrim.addEventListener('click', closeDock);

  // ---- like / skip from dock ----
  dLike.addEventListener('click', function(){
    liked[idx]=!liked[idx];
    dLike.classList.toggle('on', liked[idx]);
    var stamp = pageEls[idx].querySelector('[data-stamp]');
    if(stamp){
      stamp.classList.remove('on'); void stamp.offsetWidth;
      if(liked[idx]) stamp.classList.add('on'); else stamp.classList.remove('on');
    }
  });
  dSkip.addEventListener('click', function(){
    skipped[idx]=!skipped[idx];
    dSkip.classList.toggle('on', skipped[idx]);
    pageEls[idx].style.opacity = skipped[idx] ? '0.4' : '';
    if(skipped[idx]){
      closeDock();
      setTimeout(function(){ if(idx<N-1) next(); }, 200);
    }
  });

  // ---- keyboard (desktop preview convenience) ----
  window.addEventListener('keydown', function(e){
    if(e.key==='ArrowRight'){ pulseHint(hintR); next(); }
    else if(e.key==='ArrowLeft'){ pulseHint(hintL); back(); }
    else if(e.key==='Enter'){ openItem(); }
    else if(e.key==='l'){ dLike.click(); }
  });

  // brief edge-hint reveal on first load so the model is discoverable
  setTimeout(function(){ hintL.classList.add('show'); hintR.classList.add('show'); }, 400);
  setTimeout(function(){ hintL.classList.remove('show'); hintR.classList.remove('show'); }, 1600);

})();
</script>
</body>
</html>
