<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>otium — e-ink · refined session</title>
<style>
  :root{
    --paper:#f4f2ec;
    --paper-2:#efece3;
    --ink:#1a1815;
    --ink-soft:#4b4740;
    --ink-mute:#8b857a;
    --rule:#c9c3b5;
    --rule-hard:#1a1815;
    --hair:#d9d4c8;
    --serif:"Charter","Iowan Old Style","Georgia",serif;
    --grot:"Helvetica Neue","Arial",sans-serif;
    --mono:"SF Mono","Menlo",ui-monospace,monospace;
    --didot:"Didot","Hoefler Text","Baskerville",serif;
    --bar-h:60px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:#3b3a36;
    background-image:radial-gradient(circle at 30% 20%, #4a4844 0%, #2c2b28 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    padding:18px;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;
    width:390px;height:844px;max-height:calc(100vh - 24px);
    background:var(--paper);
    border-radius:44px;
    box-shadow:0 0 0 2px #111, 0 0 0 12px #16150f, 0 30px 70px rgba(0,0,0,.55);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  /* paper grain */
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:6;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    mix-blend-mode:multiply;opacity:.6;
  }

  /* status bar */
  .status{
    position:relative;z-index:4;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 6px;
    font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--ink);
    flex:0 0 auto;
  }
  .status .dots{display:flex;gap:3px;align-items:center;}
  .status .bar{width:2px;background:var(--ink);}
  .status .bar:nth-child(1){height:5px}
  .status .bar:nth-child(2){height:7px}
  .status .bar:nth-child(3){height:9px}
  .status .bar:nth-child(4){height:11px}

  /* ---------- app header + progress strip ---------- */
  header.app{
    position:relative;z-index:4;flex:0 0 auto;
    padding:6px 26px 10px;
    border-bottom:1.5px solid var(--rule-hard);
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .wordmark{
    font-family:var(--didot);
    font-size:30px;line-height:.9;letter-spacing:.01em;color:var(--ink);font-weight:400;
  }
  .prog{display:flex;flex-direction:column;align-items:flex-end;gap:6px;padding-bottom:3px;}
  .prog .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink-soft);}
  .prog .ticks{display:flex;gap:4px;align-items:center;}
  .prog .ticks i{
    width:12px;height:6px;border:1px solid var(--rule-hard);background:var(--paper);
    transition:background .3s steps(2,end);
  }
  .prog .ticks i.done{background:var(--ink);}
  .prog .ticks i.here{background:var(--ink);box-shadow:0 0 0 2px var(--paper),0 0 0 3px var(--rule-hard);}

  /* ---------- snap column stage ---------- */
  .stage{position:relative;flex:1 1 auto;overflow:hidden;z-index:3;min-height:0;}

  /* full-invert e-ink refresh */
  .flash{
    position:absolute;inset:0;z-index:20;pointer-events:none;background:var(--ink);opacity:0;
  }
  .flash.go{animation:refresh .28s steps(2,end) forwards;}
  @keyframes refresh{0%{opacity:0}40%{opacity:.94}41%{opacity:.05}72%{opacity:.5}100%{opacity:0}}
  /* subtle per-item snap-click invert */
  .snapflash{
    position:absolute;inset:0;z-index:19;pointer-events:none;background:var(--ink);opacity:0;
  }
  .snapflash.tick{animation:snaptick .18s steps(2,end) forwards;}
  @keyframes snaptick{0%{opacity:0}45%{opacity:.13}100%{opacity:0}}

  .column{
    position:absolute;inset:0;overflow-y:scroll;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    scrollbar-width:none;
  }
  .column::-webkit-scrollbar{width:0;height:0;}

  /* each item fills exactly one snap viewport - no bar overlap: bar is a sibling below */
  .item{
    scroll-snap-align:center;scroll-snap-stop:always;
    height:100%;width:100%;
    display:flex;flex-direction:column;
    padding:14px 24px 30px;
    position:relative;
    transition:opacity .4s steps(3,end),filter .4s steps(3,end);
  }
  .item.away{opacity:.3;filter:contrast(.7);}

  .reason{
    display:inline-flex;align-items:center;gap:7px;align-self:flex-start;
    font-family:var(--grot);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink);border:1px solid var(--rule-hard);
    padding:4px 9px;margin-bottom:12px;background:var(--paper-2);flex:0 0 auto;
  }
  .reason .glyph{width:9px;height:9px;}

  /* ---------- media block ---------- */
  .media{
    position:relative;
    border:1.5px solid var(--rule-hard);background:var(--paper-2);
    overflow:hidden;flex:0 0 auto;align-self:center;width:100%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:5px 5px 0 rgba(26,24,21,.12);
  }
  .media.ph169{aspect-ratio:16/9;}
  .media.ph916{width:184px;aspect-ratio:9/16;max-height:326px;}
  .media.phhero{aspect-ratio:16/7;}
  .media.phphoto{aspect-ratio:4/5;max-height:330px;width:auto;}
  .media.phaudio{height:132px;box-shadow:none;border:none;background:transparent;}
  .media.phquote{border:none;background:transparent;box-shadow:none;}
  .media svg.dith{position:absolute;inset:0;width:100%;height:100%;}
  .media .htone{position:absolute;inset:0;background-image:radial-gradient(var(--ink) .9px, transparent 1.1px);background-size:5px 5px;opacity:.2;pointer-events:none;}

  /* play control */
  .play{
    position:relative;z-index:3;width:60px;height:60px;border-radius:50%;
    background:var(--paper);border:2px solid var(--rule-hard);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 0 rgba(26,24,21,.28);cursor:pointer;
    transition:transform .05s linear;
  }
  .play:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(26,24,21,.28);}
  .play::after{
    content:"";width:0;height:0;margin-left:5px;
    border-left:17px solid var(--ink);
    border-top:11px solid transparent;border-bottom:11px solid transparent;
  }
  .play.playing::after{
    width:14px;height:16px;border:0;margin:0;
    border-left:5px solid var(--ink);border-right:5px solid var(--ink);
  }
  .play.small{width:52px;height:52px;}

  /* chips / badges */
  .dchip{
    position:absolute;right:8px;bottom:8px;z-index:4;
    font-family:var(--mono);font-size:11px;letter-spacing:.02em;
    color:var(--paper);background:var(--ink);padding:2px 7px;border:1px solid var(--ink);
  }
  .kind-badge{
    position:absolute;left:8px;top:8px;z-index:4;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink);background:var(--paper);padding:3px 7px;border:1px solid var(--rule-hard);
  }

  /* horizontal-video scrubber */
  .scrub{
    position:absolute;left:0;right:0;bottom:0;z-index:4;height:26px;
    background:var(--paper);border-top:1.5px solid var(--rule-hard);
    display:flex;align-items:center;gap:8px;padding:0 9px;cursor:pointer;
  }
  .scrub .tc{font-family:var(--mono);font-size:9.5px;color:var(--ink-soft);letter-spacing:.02em;white-space:nowrap;}
  .scrub .track{flex:1;height:4px;background:var(--hair);position:relative;}
  .scrub .track .fill{position:absolute;left:0;top:0;bottom:0;background:var(--ink);width:21%;}
  .scrub .track .head{
    position:absolute;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;
    background:var(--paper);border:1.5px solid var(--rule-hard);border-radius:50%;left:21%;
  }

  /* photo gallery dots */
  .gdots{
    position:absolute;left:50%;bottom:8px;transform:translateX(-50%);z-index:4;display:flex;gap:7px;
  }
  .gdots i{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--ink);background:var(--paper);}
  .gdots i.on{background:var(--ink);}

  /* podcast waveform + timeline */
  .pod{width:100%;}
  .pod .wave{
    width:100%;height:96px;display:block;
    border:1.5px solid var(--rule-hard);background:var(--paper-2);
    box-shadow:5px 5px 0 rgba(26,24,21,.12);
  }
  .pod-bar{display:flex;align-items:center;gap:13px;margin-top:14px;}
  .pod-play{flex:0 0 auto;}
  .pod-play .play{background:var(--ink);}
  .pod-play .play::after{border-left-color:var(--paper);}
  .pod-play .play.playing::after{border-left-color:var(--paper);border-right-color:var(--paper);}
  .pod-time{flex:1;min-width:0;}
  .pod-time .track{height:5px;background:var(--hair);border:1px solid var(--rule-hard);position:relative;overflow:hidden;}
  .pod-time .track .fill{position:absolute;inset:0;right:auto;background:var(--ink);width:12%;}
  .pod-time .tc{
    display:flex;justify-content:space-between;margin-top:6px;
    font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.02em;
  }

  /* pull-quote */
  .pullquote{
    flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;
    padding:8px 4px;text-align:left;position:relative;
  }
  .pullquote .qmark{
    font-family:var(--didot);font-size:88px;line-height:.5;color:var(--ink);display:block;height:44px;
  }
  .pullquote blockquote{
    margin:0;font-family:var(--didot);font-style:italic;font-weight:400;
    font-size:30px;line-height:1.26;letter-spacing:-.01em;color:var(--ink);
  }
  .pullquote .qrule{width:44px;height:2px;background:var(--ink);margin:22px 0 14px;}
  .pullquote .qsrc{
    font-family:var(--grot);font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft);
  }

  /* ---------- body text ---------- */
  .body{margin-top:14px;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}
  .item h2{
    font-family:var(--serif);font-weight:400;font-size:24px;line-height:1.16;
    letter-spacing:-.005em;color:var(--ink);margin:0 0 8px;
  }
  .item h2 em{font-style:italic;}
  .excerpt{
    font-family:var(--serif);font-size:15.5px;line-height:1.5;color:var(--ink);margin:6px 0 0;
  }
  .excerpt.drop::first-letter{
    float:left;font-family:var(--didot);font-size:58px;line-height:.72;
    padding:6px 10px 0 0;color:var(--ink);font-weight:400;
  }
  .meta{
    display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;color:var(--ink-soft);
    margin-top:12px;
  }
  .meta .src{font-family:var(--grot);font-size:12px;letter-spacing:.03em;color:var(--ink);}
  .meta .dot{width:3px;height:3px;background:var(--ink-mute);border-radius:50%;}
  .meta .mtype{display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.1em;font-size:10px;}

  /* down-cue affordance for the snap scroll */
  .downcue{
    position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--ink-mute);z-index:2;
  }
  .downcue svg{display:block;animation:nudge 2.6s steps(4,end) infinite;}
  @keyframes nudge{0%,72%{transform:translateY(0)}82%{transform:translateY(3px)}100%{transform:translateY(0)}}

  /* ---------- end panel ---------- */
  .end{
    scroll-snap-align:center;scroll-snap-stop:always;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 34px;
  }
  .end .mark{font-family:var(--didot);font-size:30px;color:var(--ink);}
  .end .line{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--ink);margin:12px 0 4px;}
  .end .count{font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.03em;margin-bottom:24px;}
  .end .fbtn{
    min-height:52px;width:100%;border:1.5px solid var(--rule-hard);background:var(--paper);color:var(--ink);
    font-family:var(--serif);font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;margin-top:11px;
  }
  .end .fbtn:active{transform:translateY(1px);}
  .end .fbtn.solid{background:var(--ink);color:var(--paper);}

  /* ---------- reader sheet (Open target) - covers the scroll stage, not the bar ---------- */
  .sheet{
    position:absolute;inset:0;z-index:16;background:var(--paper);
    transform:translateY(101%);transition:transform .34s steps(4,end);
    display:flex;flex-direction:column;padding:22px 24px;
  }
  .sheet.up{transform:translateY(0);}
  .sheet .shead{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1.5px solid var(--rule-hard);padding-bottom:12px;margin-bottom:16px;
  }
  .sheet .shead .k{font-family:var(--grot);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mute);}
  .sheet .xclose{
    width:34px;height:34px;border:1.5px solid var(--rule-hard);background:var(--paper);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:var(--grot);font-size:16px;color:var(--ink);
  }
  .sheet h3{font-family:var(--serif);font-weight:400;font-size:26px;line-height:1.15;color:var(--ink);margin:0 0 10px;}
  .sheet .sbody{font-family:var(--serif);font-size:16px;line-height:1.5;color:var(--ink-soft);}
  .sheet .sbody p{margin:0 0 14px;}
  .sheet .grain{
    margin-top:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-mute);letter-spacing:.03em;
    border-top:1px solid var(--hair);padding-top:12px;
  }

  /* ---------- compact bottom action bar (THE FIX: small, subtle, shared, acts on snapped item) ---------- */
  nav.actionbar{
    position:relative;z-index:8;flex:0 0 auto;height:var(--bar-h);
    background:var(--paper);border-top:1.5px solid var(--rule-hard);
    display:flex;
  }
  .abtn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ink-soft);cursor:pointer;position:relative;background:transparent;border:0;
    padding:0;overflow:hidden;
  }
  .abtn + .abtn{border-left:1px solid var(--hair);}
  .abtn:active{background:var(--paper-2);}
  .abtn .ic{width:19px;height:19px;display:block;}
  .abtn .ic *{stroke:var(--ink);fill:none;}
  /* toggled-on state: ink-filled glyph + darker label */
  .abtn.on{color:var(--ink);font-weight:700;}
  .abtn.on .ic *{fill:var(--ink);stroke:var(--ink);}
  /* e-ink stamp pulse on toggle */
  .abtn.pulse::before{
    content:"";position:absolute;inset:0;background:var(--ink);
    animation:stamp .26s steps(2,end) forwards;pointer-events:none;
  }
  @keyframes stamp{0%{opacity:0}45%{opacity:.9}46%{opacity:.06}100%{opacity:0}}
  .abtn.pulse .ic{animation:pop .26s steps(3,end);}
  @keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="status">
    <span>9:41</span>
    <span class="dots" aria-hidden="true">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
      &nbsp;<svg width="22" height="11" viewBox="0 0 22 11"><rect x="0.5" y="0.5" width="18" height="10" rx="2" fill="none" stroke="#1a1815"/><rect x="19" y="3.5" width="2" height="4" fill="#1a1815"/><rect x="2" y="2" width="13" height="7" fill="#1a1815"/></svg>
    </span>
  </div>

  <header class="app">
    <div class="wordmark">otium</div>
    <div class="prog">
      <span class="lbl" id="progLbl">1 / 6</span>
      <span class="ticks" id="ticks"></span>
    </div>
  </header>

  <div class="stage">
    <div class="flash" id="flash"></div>
    <div class="snapflash" id="snapflash"></div>

    <div class="column" id="column"><!-- items injected --></div>

    <!-- open reader sheet -->
    <div class="sheet" id="sheet">
      <div class="shead">
        <span class="k" id="sheetKind">Article</span>
        <button class="xclose" id="sheetClose" aria-label="Close reader">&times;</button>
      </div>
      <h3 id="sheetTitle"></h3>
      <div class="sbody" id="sheetBody"></div>
      <div class="grain">otium · handed off to source · no tracking, no tail</div>
    </div>
  </div>

  <!-- compact shared action bar: acts on the currently-snapped item -->
  <nav class="actionbar" id="actionbar">
    <button class="abtn" id="barOpen">
      <span class="ic"><svg width="19" height="19" viewBox="0 0 15 15"><path d="M4 2.5h8V10M12 2.5L5 9.5M2.5 5.5V12H9" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      Open
    </button>
    <button class="abtn" id="barLike">
      <span class="ic"><svg width="19" height="19" viewBox="0 0 15 15"><path d="M7.5 13S1.5 9.3 1.5 5.2C1.5 3.4 2.8 2 4.5 2 5.7 2 6.8 2.8 7.5 3.9 8.2 2.8 9.3 2 10.5 2 12.2 2 13.5 3.4 13.5 5.2 13.5 9.3 7.5 13 7.5 13z" stroke-width="1.3"/></svg></span>
      Like
    </button>
    <button class="abtn" id="barSave">
      <span class="ic"><svg width="19" height="19" viewBox="0 0 15 15"><path d="M3.5 2.2h8v10.6L7.5 9.6 3.5 12.8z" stroke-width="1.3" stroke-linejoin="round"/></svg></span>
      Save
    </button>
    <button class="abtn" id="barNext">
      <span class="ic"><svg width="19" height="19" viewBox="0 0 15 15"><path d="M7.5 2.5v9M3.6 7.6l3.9 4 3.9-4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      Next
    </button>
  </nav>
</div>

<script>
(function(){
  "use strict";

  /* ---------- dithered field generator (inline SVG, desaturated turbulence + halftone) ---------- */
  function dither(seed, freq){
    freq = freq || 0.75;
    return '<svg class="dith" preserveAspectRatio="none" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'+
      '<defs><filter id="d'+seed+'"><feTurbulence type="fractalNoise" baseFrequency="'+freq+'" numOctaves="2" seed="'+seed+'" stitchTiles="stitch"/>'+
      '<feColorMatrix type="saturate" values="0"/>'+
      '<feComponentTransfer><feFuncR type="discrete" tableValues="0 0.15 0.3 0.55 0.8 1"/><feFuncG type="discrete" tableValues="0 0.15 0.3 0.55 0.8 1"/><feFuncB type="discrete" tableValues="0 0.15 0.3 0.55 0.8 1"/></feComponentTransfer>'+
      '</filter></defs>'+
      '<rect width="100" height="100" fill="#efece3"/>'+
      '<rect width="100" height="100" filter="url(#d'+seed+')" opacity="0.5"/>'+
      '</svg><div class="htone"></div>';
  }

  /* podcast waveform: played (ink) vs unplayed (mute) bars + playhead line */
  function waveform(){
    var n=52, W=316, H=96, gap=W/n, bars='', playhead=W*0.12;
    for(var i=0;i<n;i++){
      var t=i/n;
      var amp=(Math.sin(t*22)*0.5+0.5)*(Math.sin(t*6.3)*0.35+0.65);
      amp=0.14+amp*0.78;
      var bh=amp*(H-20);
      var x=(i*gap)+gap*0.5;
      var played = (i/n) < 0.12;
      bars += '<rect x="'+(x-1.4).toFixed(1)+'" y="'+((H-bh)/2).toFixed(1)+'" width="2.8" height="'+bh.toFixed(1)+'" fill="'+(played?'#1a1815':'#8b857a')+'"/>';
    }
    return '<svg class="wave" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
      bars+'<rect x="'+(playhead-0.8).toFixed(1)+'" y="6" width="1.6" height="'+(H-12)+'" fill="#1a1815"/></svg>';
  }

  var glyph='<svg class="glyph" viewBox="0 0 9 9" width="9" height="9"><rect x="1.2" y="1.2" width="6.6" height="6.6" fill="#1a1815"/></svg>';

  var mediaIcons = {
    'vertical video':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><rect x="3.5" y="1.5" width="7" height="11" fill="none" stroke="#4b4740" stroke-width="1.1"/><path d="M6 5.4l2.6 1.6L6 8.6z" fill="#4b4740"/></svg>',
    'video':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><rect x="1" y="2.5" width="12" height="9" fill="none" stroke="#4b4740" stroke-width="1.1"/><path d="M6 5.2l3 1.8-3 1.8z" fill="#4b4740"/></svg>',
    'article':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><path d="M2 3h10M2 6h10M2 9h7" stroke="#4b4740" stroke-width="1.1" stroke-linecap="round"/></svg>',
    'photo':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><rect x="1.5" y="2.5" width="11" height="9" fill="none" stroke="#4b4740" stroke-width="1.1"/><circle cx="5" cy="6" r="1.2" fill="#4b4740"/><path d="M2 11l3.2-3 2.3 2 2.2-2.4L12 11z" fill="none" stroke="#4b4740" stroke-width="1.1" stroke-linejoin="round"/></svg>',
    'audio':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><path d="M1.5 7h1.5M4 4.5v5M6.5 2.5v9M9 5v4M11.5 3.5v7" stroke="#4b4740" stroke-width="1.2" stroke-linecap="round"/></svg>',
    'quote':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><path d="M3 8c0-3 2-4 3-4M3 8v3h3V8zM9 8c0-3 2-4 3-4M9 8v3h3V8z" fill="none" stroke="#4b4740" stroke-width="1.1" stroke-linejoin="round"/></svg>'
  };

  var downSvg='<svg width="16" height="9" viewBox="0 0 16 9"><path d="M2 2l6 5 6-5" fill="none" stroke="#8b857a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  /* ---------- content fixture (verbatim, in order) ---------- */
  var items=[
    {
      type:'vertical video', title:'Scumbag Dad &mdash; the school pickup bit',
      src:'Scumbag Dad', dur:'0:48', reason:'Rare &mdash; posts weekly', seed:11,
      read:'A short, shot vertical. The bit lands in the first ten seconds and never lets up: the pickup line as a competitive sport, narrated deadpan from the driver&rsquo;s seat.'
    },
    {
      type:'video', title:'I got hit in the teeth at England&rsquo;s oldest ritual',
      src:'Tom Scott', dur:'10:24', reason:'Favorite source', seed:23,
      read:'Tom travels to a village that has kept the same violent Shrovetide game going for centuries. He explains the rules, the history, and why nobody has managed to ban it. Then he gets in the scrum.'
    },
    {
      type:'article', title:'Apple&rsquo;s entry-level MacBook Pro could get a redesign',
      src:'The Verge', dur:'4 min read', reason:'Fresh &mdash; today', seed:31,
      excerpt:'A revamped entry model could arrive as soon as this year, per supply-chain reports.',
      read:'Supply-chain chatter points to a redesigned chassis for the cheapest MacBook Pro, potentially thinner and lighter than the current model. Nothing is confirmed, but the timing lines up with the next silicon refresh.'
    },
    {
      type:'photo', title:'Aurora over the Faroe Islands',
      src:'Astronomy Picture of the Day', dur:'', reason:'High-weight source', seed:42, gallery:3,
      read:'Green curtains of light draped over black basalt cliffs and a single lit farmhouse. A three-frame set, shot over forty minutes as the substorm peaked.'
    },
    {
      type:'audio', title:'The Real Book',
      src:'99% Invisible', dur:'32 min', reason:'Rare &mdash; posts seldom', seed:53,
      read:'For decades, the most important book in jazz was illegal. 99pi traces the bootleg fake-book that every working musician owned but no one would admit to printing.'
    },
    {
      type:'quote', title:'', quote:'The best way to predict the future is to invent it.',
      src:'Kottke', dur:'', reason:'Recent', seed:0,
      read:'Attributed to Alan Kay. Kottke pulls it back up as a counter to forecasting-as-passivity: the point isn&rsquo;t to guess right, it&rsquo;s to build the thing you want to be true.'
    }
  ];

  /* ---------- per-type media blocks (gallery treatments, sized for the column) ---------- */
  function mediaBlock(it){
    var t=it.type;
    if(t==='vertical video'){
      return '<div class="media ph916">'+dither(it.seed,0.9)+
        '<span class="kind-badge">Short</span>'+
        '<div class="play" data-play></div>'+
        '<span class="dchip">'+it.dur+'</span></div>';
    }
    if(t==='video'){
      return '<div class="media ph169">'+dither(it.seed,0.7)+
        '<div class="play" data-play></div>'+
        '<span class="dchip" style="bottom:34px;">'+it.dur+'</span>'+
        '<div class="scrub" data-scrub>'+
          '<span class="tc">2:07</span>'+
          '<div class="track"><div class="fill"></div><div class="head"></div></div>'+
          '<span class="tc">'+it.dur+'</span>'+
        '</div></div>';
    }
    if(t==='article'){
      return '<div class="media phhero">'+dither(it.seed,0.6)+
        '<span class="kind-badge">Hero</span></div>';
    }
    if(t==='photo'){
      return '<div class="media phphoto">'+dither(it.seed,0.5)+
        '<span class="kind-badge">1 / 3</span>'+
        '<div class="gdots"><i class="on"></i><i></i><i></i></div></div>';
    }
    if(t==='audio'){
      return '<div class="media phaudio"><div class="pod">'+
        waveform()+
        '<div class="pod-bar">'+
          '<div class="pod-play"><div class="play small" data-play></div></div>'+
          '<div class="pod-time">'+
            '<div class="track"><div class="fill"></div></div>'+
            '<div class="tc"><span>3:50</span><span>'+it.dur+'</span></div>'+
          '</div>'+
        '</div></div></div>';
    }
    if(t==='quote'){
      return '<div class="media phquote"><div class="pullquote">'+
        '<span class="qmark">&ldquo;</span>'+
        '<blockquote>'+it.quote+'</blockquote>'+
        '<div class="qrule"></div>'+
        '<div class="qsrc">'+it.src+'</div>'+
        '</div></div>';
    }
    return '';
  }

  var col=document.getElementById('column');
  var flash=document.getElementById('flash');
  var snapflash=document.getElementById('snapflash');

  items.forEach(function(it,idx){
    var el=document.createElement('div');
    el.className='item'+(idx>0?' away':'');
    el.dataset.idx=idx;

    var durMeta = it.dur ? '<span class="dot"></span><span>'+it.dur+'</span>' : '';
    var bodyInner;
    if(it.type==='quote'){
      // the pull-quote is the whole content; body just carries source meta
      bodyInner =
        '<div class="meta"><span class="src">'+it.src+'</span>'+
          '<span class="dot"></span><span class="mtype">'+mediaIcons[it.type]+it.type+'</span></div>';
    } else {
      var excerpt = it.excerpt ? '<p class="excerpt drop">'+it.excerpt+'</p>' : '';
      bodyInner =
        '<h2>'+it.title+'</h2>'+
        excerpt+
        '<div class="meta"><span class="src">'+it.src+'</span>'+durMeta+
          '<span class="dot"></span><span class="mtype">'+mediaIcons[it.type]+it.type+'</span></div>';
    }

    el.innerHTML=
      '<span class="reason">'+glyph+it.reason+'</span>'+
      mediaBlock(it)+
      '<div class="body">'+bodyInner+'</div>'+
      (idx<items.length-1?'<div class="downcue">'+downSvg+'next</div>':'<div class="downcue">'+downSvg+'wrap up</div>');
    col.appendChild(el);
  });

  // end panel
  var end=document.createElement('div');
  end.className='end';
  end.innerHTML=
    '<div class="mark">&#10086;</div>'+
    '<div class="line">That&rsquo;s your session.</div>'+
    '<div class="count">6 things &middot; nothing more queued</div>'+
    '<button class="fbtn" id="again">Compose another</button>'+
    '<button class="fbtn solid" id="restart">Back to the top</button>';
  col.appendChild(end);

  /* ---------- progress ticks ---------- */
  var ticksWrap=document.getElementById('ticks');
  var progLbl=document.getElementById('progLbl');
  for(var i=0;i<items.length;i++){ ticksWrap.appendChild(document.createElement('i')); }
  var tickEls=Array.prototype.slice.call(ticksWrap.children);

  function setProgress(idx){
    if(idx>=items.length){
      progLbl.textContent='done';
      tickEls.forEach(function(t){t.className='done';});
      return;
    }
    progLbl.textContent=(idx+1)+' / '+items.length;
    tickEls.forEach(function(t,j){
      t.className = j<idx ? 'done' : (j===idx ? 'here' : '');
    });
  }
  setProgress(0);

  /* ---------- per-item toggle state ---------- */
  var liked=items.map(function(){return false;});
  var saved=items.map(function(){return false;});
  var current=0;
  var sheetOpen=false;

  /* ---------- snap detection: dim non-centered, tick, sync action bar ---------- */
  var itemEls=Array.prototype.slice.call(col.querySelectorAll('.item'));

  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      var el=e.target;
      if(e.isIntersecting && e.intersectionRatio>0.6){
        el.classList.remove('away');
        var idx=el.classList.contains('end')?items.length:parseInt(el.dataset.idx,10);
        if(idx!==current){
          current=idx;
          setProgress(idx);
          syncBar();
          snapflash.classList.remove('tick'); void snapflash.offsetWidth; snapflash.classList.add('tick');
        }
      } else if(e.intersectionRatio<0.4){
        el.classList.add('away');
      }
    });
  },{root:col,threshold:[0,0.4,0.6,0.9]});

  itemEls.forEach(function(el){ io.observe(el); });
  io.observe(end);

  function scrollToIdx(idx){
    var target = idx>=items.length ? end : itemEls[idx];
    if(target) target.scrollIntoView({behavior:'smooth',block:'center'});
  }

  /* ---------- media play toggles (preview / scrubber state) ---------- */
  col.addEventListener('click', function(e){
    var playBtn=e.target.closest('[data-play]');
    if(playBtn){
      playBtn.classList.toggle('playing');
      var slide=playBtn.closest('.item');
      animateProgress(slide, playBtn.classList.contains('playing'));
      return;
    }
  });

  var progTimers={};
  function animateProgress(slide, on){
    var id=slide.dataset.idx;
    if(progTimers[id]){ clearInterval(progTimers[id]); progTimers[id]=null; }
    if(!on) return;
    var scrubFill=slide.querySelector('.scrub .fill');
    var scrubHead=slide.querySelector('.scrub .head');
    var podFill=slide.querySelector('.pod-time .fill');
    var p = scrubFill ? 21 : (podFill ? 12 : 0);
    progTimers[id]=setInterval(function(){
      p+=1.5; if(p>=100){ p=100; clearInterval(progTimers[id]); progTimers[id]=null; }
      if(scrubFill) scrubFill.style.width=p+'%';
      if(scrubHead) scrubHead.style.left=p+'%';
      if(podFill) podFill.style.width=p+'%';
    }, 380); // deliberately slow, e-ink cadence
  }

  /* ---------- compact action bar wiring ---------- */
  var barOpen=document.getElementById('barOpen');
  var barLike=document.getElementById('barLike');
  var barSave=document.getElementById('barSave');
  var barNext=document.getElementById('barNext');

  function syncBar(){
    var atEnd = current>=items.length;
    barLike.classList.toggle('on', !atEnd && liked[current]);
    barSave.classList.toggle('on', !atEnd && saved[current]);
    // Like/Save/Open are meaningless on the end panel
    [barLike,barSave,barOpen].forEach(function(b){ b.style.opacity = atEnd ? '.32' : '1'; b.style.pointerEvents = atEnd ? 'none' : 'auto'; });
  }

  function pulse(btn){ btn.classList.remove('pulse'); void btn.offsetWidth; btn.classList.add('pulse'); }

  barLike.addEventListener('click', function(){
    if(current>=items.length) return;
    liked[current]=!liked[current];
    barLike.classList.toggle('on', liked[current]);
    if(liked[current]) pulse(barLike);
  });
  barSave.addEventListener('click', function(){
    if(current>=items.length) return;
    saved[current]=!saved[current];
    barSave.classList.toggle('on', saved[current]);
    if(saved[current]) pulse(barSave);
  });
  barNext.addEventListener('click', function(){
    if(sheetOpen){ closeReader(); return; }
    scrollToIdx(Math.min(current+1, items.length));
  });
  barOpen.addEventListener('click', function(){
    if(current>=items.length) return;
    openReader(current);
  });

  /* ---------- reader sheet (Open hand-off) ---------- */
  var sheet=document.getElementById('sheet');
  var sheetTitle=document.getElementById('sheetTitle');
  var sheetBody=document.getElementById('sheetBody');
  var sheetKind=document.getElementById('sheetKind');

  function openReader(idx){
    var it=items[idx];
    sheetKind.textContent = it.type.toUpperCase();
    sheetTitle.innerHTML = it.type==='quote' ? '&ldquo;'+it.quote+'&rdquo;' : it.title;
    sheetBody.innerHTML =
      '<p>'+it.read+'</p>'+
      '<p style="font-family:var(--mono);font-size:11.5px;letter-spacing:.03em;color:var(--ink-mute)">'+
      it.src+(it.dur?' &middot; '+it.dur:'')+'</p>';
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go'); // invert hand-off
    setTimeout(function(){ sheet.classList.add('up'); sheetOpen=true; }, 120);
  }
  function closeReader(){
    sheet.classList.remove('up'); sheetOpen=false;
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
  }
  document.getElementById('sheetClose').addEventListener('click', closeReader);

  /* ---------- end-panel buttons ---------- */
  end.addEventListener('click', function(e){
    if(e.target.id==='again'||e.target.id==='restart'){
      flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
      setTimeout(function(){ scrollToIdx(0); }, 130);
    }
  });

  /* ---------- keyboard for desktop preview ---------- */
  window.addEventListener('keydown', function(e){
    if(e.key==='ArrowDown'||e.key===' '){ e.preventDefault(); scrollToIdx(Math.min(current+1,items.length)); }
    if(e.key==='ArrowUp'){ e.preventDefault(); scrollToIdx(Math.max(current-1,0)); }
    if(e.key==='Escape'){ if(sheetOpen) closeReader(); }
  });

  syncBar();
})();
</script>
</body>
</html>
