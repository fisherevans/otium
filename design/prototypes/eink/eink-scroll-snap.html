<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>otium — e-ink · scroll-snap column</title>
<style>
  :root{
    --paper:#f4f2ec;
    --paper-2:#efece3;
    --ink:#1a1815;
    --ink-soft:#4b4740;
    --ink-mute:#8b857a;
    --rule:#c9c3b5;
    --rule-hard:#1a1815;
    --hair:#d9d4c8;
    --serif:"Charter","Iowan Old Style","Georgia",serif;
    --grot:"Helvetica Neue","Arial",sans-serif;
    --mono:"SF Mono","Menlo",ui-monospace,monospace;
    --didot:"Didot","Hoefler Text","Baskerville",serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:#3b3a36;
    background-image:radial-gradient(circle at 30% 20%, #4a4844 0%, #2c2b28 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    padding:18px;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;
    width:390px;height:844px;max-height:calc(100vh - 24px);
    background:var(--paper);
    border-radius:44px;
    box-shadow:0 0 0 2px #111, 0 0 0 12px #16150f, 0 30px 70px rgba(0,0,0,.55);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  /* paper grain */
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:6;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    mix-blend-mode:multiply;opacity:.6;
  }

  /* status bar */
  .status{
    position:relative;z-index:4;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 6px;
    font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--ink);
    flex:0 0 auto;
  }
  .status .dots{display:flex;gap:3px;align-items:center;}
  .status .bar{width:2px;background:var(--ink);}
  .status .bar:nth-child(1){height:5px}
  .status .bar:nth-child(2){height:7px}
  .status .bar:nth-child(3){height:9px}
  .status .bar:nth-child(4){height:11px}

  /* ---------- app header + progress strip ---------- */
  header.app{
    position:relative;z-index:4;flex:0 0 auto;
    padding:6px 26px 10px;
    border-bottom:1.5px solid var(--rule-hard);
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .wordmark{
    font-family:var(--didot);
    font-size:30px;line-height:.9;letter-spacing:.01em;color:var(--ink);font-weight:400;
  }
  .prog{display:flex;flex-direction:column;align-items:flex-end;gap:6px;padding-bottom:3px;}
  .prog .lbl{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink-soft);
  }
  .prog .ticks{display:flex;gap:4px;align-items:center;}
  .prog .ticks i{
    width:12px;height:6px;border:1px solid var(--rule-hard);background:var(--paper);
    transition:background .3s steps(2,end);
  }
  .prog .ticks i.done{background:var(--ink);}
  .prog .ticks i.here{background:var(--ink);box-shadow:0 0 0 2px var(--paper),0 0 0 3px var(--rule-hard);}

  /* ---------- snap column ---------- */
  .stage{position:relative;flex:1 1 auto;overflow:hidden;z-index:3;}
  .flash{
    position:absolute;inset:0;z-index:20;pointer-events:none;background:var(--ink);opacity:0;
  }
  .flash.go{animation:refresh .26s steps(2,end) forwards;}
  @keyframes refresh{
    0%{opacity:0}40%{opacity:.92}41%{opacity:.04}70%{opacity:.5}100%{opacity:0}
  }
  /* subtle per-item snap click invert */
  .snapflash{
    position:absolute;inset:0;z-index:19;pointer-events:none;background:var(--ink);opacity:0;
  }
  .snapflash.tick{animation:snaptick .18s steps(2,end) forwards;}
  @keyframes snaptick{0%{opacity:0}45%{opacity:.14}100%{opacity:0}}

  .column{
    position:absolute;inset:0;overflow-y:scroll;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    scrollbar-width:none;
  }
  .column::-webkit-scrollbar{width:0;height:0;}

  /* each item fills one snap viewport */
  .item{
    scroll-snap-align:center;scroll-snap-stop:always;
    height:100%;width:100%;
    display:flex;flex-direction:column;
    padding:16px 24px 14px;
    position:relative;
    transition:opacity .4s steps(3,end),filter .4s steps(3,end);
  }
  /* items not centered dim slightly, reinforcing one-at-a-time */
  .item.away{opacity:.32;filter:contrast(.7);}
  .item.skipped .body{opacity:.28;}
  .item.skipped::after{
    content:"SKIPPED";position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%) rotate(-9deg);
    font-family:var(--grot);font-size:34px;letter-spacing:.24em;
    color:var(--ink);opacity:.16;border:3px solid var(--ink);padding:6px 18px;
    pointer-events:none;
  }

  .reason{
    display:inline-flex;align-items:center;gap:7px;align-self:flex-start;
    font-family:var(--grot);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink);border:1px solid var(--rule-hard);
    padding:4px 9px;margin-bottom:12px;background:var(--paper-2);
  }
  .reason .glyph{width:9px;height:9px;}

  /* media block */
  .media{
    position:relative;width:100%;
    border:1.5px solid var(--rule-hard);background:var(--paper-2);
    overflow:hidden;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
  }
  .media.ph169{aspect-ratio:16/9;}
  .media.ph916{width:186px;align-self:center;aspect-ratio:9/16;max-height:340px;}
  .media.phhero{aspect-ratio:16/9;max-height:150px;}
  .media.phaudio{aspect-ratio:auto;height:120px;}
  .media.phquote{border:none;background:transparent;}
  .media svg.dith{position:absolute;inset:0;width:100%;height:100%;}

  /* play control */
  .play{
    position:relative;z-index:2;width:56px;height:56px;border-radius:50%;
    background:var(--paper);border:2px solid var(--rule-hard);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 0 rgba(26,24,21,.28);cursor:pointer;
  }
  .play:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(26,24,21,.28);}
  .play::after{
    content:"";width:0;height:0;margin-left:4px;
    border-left:16px solid var(--ink);
    border-top:11px solid transparent;border-bottom:11px solid transparent;
  }
  .play.small{width:44px;height:44px;}
  .play.small::after{border-left-width:13px;border-top-width:9px;border-bottom-width:9px;margin-left:3px;}

  /* duration chip */
  .dchip{
    position:absolute;right:8px;bottom:8px;z-index:3;
    font-family:var(--mono);font-size:11px;letter-spacing:.02em;
    color:var(--paper);background:var(--ink);
    padding:2px 7px;border:1px solid var(--ink);
  }
  .kind-badge{
    position:absolute;left:8px;top:8px;z-index:3;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink);background:var(--paper);padding:3px 7px;border:1px solid var(--rule-hard);
  }
  .gdots{
    position:absolute;left:50%;bottom:8px;transform:translateX(-50%);z-index:3;
    display:flex;gap:6px;
  }
  .gdots i{width:6px;height:6px;border-radius:50%;border:1px solid var(--ink);background:var(--paper);}
  .gdots i.on{background:var(--ink);}

  /* audio waveform sits inline in media */
  .wave{position:relative;z-index:2;display:flex;align-items:center;gap:14px;width:100%;padding:0 16px;}
  .wave .bars{flex:1;height:56px;display:block;}
  .wave .adur{font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.02em;white-space:nowrap;}

  /* pull-quote treatment */
  .pullquote{
    flex:0 0 auto;padding:18px 4px 6px;position:relative;
    border-top:1.5px solid var(--rule-hard);border-bottom:1.5px solid var(--rule-hard);
  }
  .pullquote .qmark{
    font-family:var(--didot);font-size:72px;line-height:.5;color:var(--ink);
    display:block;height:34px;
  }
  .pullquote blockquote{
    margin:0;font-family:var(--serif);font-style:italic;font-weight:400;
    font-size:27px;line-height:1.28;letter-spacing:-.01em;color:var(--ink);
  }

  /* body text */
  .body{margin-top:14px;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}
  .item h2{
    font-family:var(--serif);font-weight:400;font-size:24px;line-height:1.16;
    letter-spacing:-.005em;color:var(--ink);margin:0 0 8px;
  }
  .excerpt{
    font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.45;
    color:var(--ink-soft);margin:0 0 12px;
  }
  .meta{
    display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;color:var(--ink-soft);
    margin-bottom:14px;
  }
  .meta .src{font-family:var(--grot);font-size:12px;letter-spacing:.03em;color:var(--ink);}
  .meta .dot{width:3px;height:3px;background:var(--ink-mute);border-radius:50%;}
  .meta .mtype{display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.1em;font-size:10px;}

  /* actions under each snapped item */
  .actions{display:flex;gap:9px;margin-top:auto;}
  .act{
    flex:1;min-height:46px;border:1.5px solid var(--rule-hard);background:var(--paper);
    font-family:var(--grot);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);display:flex;align-items:center;justify-content:center;gap:7px;
    cursor:pointer;transition:background .15s steps(2,end);position:relative;
  }
  .act:active{transform:translateY(1px);}
  .act.open{background:var(--ink);color:var(--paper);flex:1.4;}
  .act .ic{width:15px;height:15px;display:block;}
  .act.like.on{background:var(--ink);color:var(--paper);}
  .act.like.on .ic path{fill:var(--paper);}
  /* like ink-stamp */
  .stamp{
    position:absolute;top:-9px;right:-9px;width:26px;height:26px;border-radius:50%;
    background:var(--ink);color:var(--paper);display:none;align-items:center;justify-content:center;
    border:2px solid var(--paper);box-shadow:0 0 0 1.5px var(--ink);z-index:4;
  }
  .stamp svg{width:13px;height:13px;}
  .act.like.on .stamp{display:flex;animation:pop .22s steps(3,end);}
  @keyframes pop{0%{transform:scale(.2)}100%{transform:scale(1)}}

  /* down-cue between items */
  .downcue{
    position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    font-family:var(--grot);font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--ink-mute);z-index:3;
  }
  .downcue svg{display:block;animation:nudge 2.4s steps(4,end) infinite;}
  @keyframes nudge{0%,70%{transform:translateY(0)}80%{transform:translateY(3px)}100%{transform:translateY(0)}}

  /* end panel */
  .end{
    scroll-snap-align:center;scroll-snap-stop:always;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 34px;gap:2px;
  }
  .end .mark{font-family:var(--didot);font-size:30px;color:var(--ink);}
  .end .line{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--ink);margin:12px 0 4px;}
  .end .count{font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.03em;margin-bottom:24px;}
  .end .fbtn{
    min-height:52px;width:100%;border:1.5px solid var(--rule-hard);background:var(--paper);color:var(--ink);
    font-family:var(--serif);font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;margin-top:11px;
  }
  .end .fbtn:active{transform:translateY(1px);}
  .end .fbtn.solid{background:var(--ink);color:var(--paper);}

  /* open sheet overlay */
  .sheet{
    position:absolute;inset:0;z-index:14;background:var(--paper);
    transform:translateY(100%);transition:transform .34s steps(4,end);
    display:flex;flex-direction:column;padding:22px 24px;
  }
  .sheet.up{transform:translateY(0);}
  .sheet .shead{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1.5px solid var(--rule-hard);padding-bottom:12px;margin-bottom:16px;
  }
  .sheet .shead .k{font-family:var(--grot);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mute);}
  .sheet .xclose{
    width:34px;height:34px;border:1.5px solid var(--rule-hard);background:var(--paper);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:var(--grot);font-size:16px;color:var(--ink);
  }
  .sheet h3{font-family:var(--serif);font-weight:400;font-size:26px;line-height:1.15;color:var(--ink);margin:0 0 10px;}
  .sheet .sbody{font-family:var(--serif);font-size:16px;line-height:1.5;color:var(--ink-soft);}
  .sheet .sbody p{margin:0 0 14px;}
  .sheet .grain{
    margin-top:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-mute);letter-spacing:.03em;
    border-top:1px solid var(--hair);padding-top:12px;
  }
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="status">
    <span>9:41</span>
    <span class="dots" aria-hidden="true">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
      &nbsp;<svg width="22" height="11" viewBox="0 0 22 11"><rect x="0.5" y="0.5" width="18" height="10" rx="2" fill="none" stroke="#1a1815"/><rect x="19" y="3.5" width="2" height="4" fill="#1a1815"/><rect x="2" y="2" width="13" height="7" fill="#1a1815"/></svg>
    </span>
  </div>

  <header class="app">
    <div class="wordmark">otium</div>
    <div class="prog">
      <span class="lbl" id="progLbl">1 / 6</span>
      <span class="ticks" id="ticks"></span>
    </div>
  </header>

  <div class="stage">
    <div class="flash" id="flash"></div>
    <div class="snapflash" id="snapflash"></div>

    <div class="column" id="column"><!-- items injected --></div>

    <!-- open reader sheet -->
    <div class="sheet" id="sheet">
      <div class="shead">
        <span class="k" id="sheetKind">Article</span>
        <button class="xclose" id="sheetClose">&times;</button>
      </div>
      <h3 id="sheetTitle"></h3>
      <div class="sbody" id="sheetBody"></div>
      <div class="grain">otium · opened in reader · no tracking, no tail</div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------- dithered field generators (inline SVG, desaturated turbulence) ---------- */
  function dither(seed, freq){
    freq = freq || 0.75;
    return '<svg class="dith" preserveAspectRatio="none" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'+
      '<defs><filter id="d'+seed+'"><feTurbulence type="fractalNoise" baseFrequency="'+freq+'" numOctaves="2" seed="'+seed+'" stitchTiles="stitch"/>'+
      '<feColorMatrix type="saturate" values="0"/>'+
      '<feComponentTransfer><feFuncR type="discrete" tableValues="0 0.15 0.3 0.55 0.8 1"/><feFuncG type="discrete" tableValues="0 0.15 0.3 0.55 0.8 1"/><feFuncB type="discrete" tableValues="0 0.15 0.3 0.55 0.8 1"/></feComponentTransfer>'+
      '</filter>'+
      '<pattern id="h'+seed+'" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="#1a1815" stroke-width="0.7"/></pattern></defs>'+
      '<rect width="100" height="100" fill="#efece3"/>'+
      '<rect width="100" height="100" filter="url(#d'+seed+')" opacity="0.5"/>'+
      '<rect width="100" height="100" fill="url(#h'+seed+')" opacity="0.10"/>'+
      '</svg>';
  }

  /* audio waveform bars */
  function waveform(){
    var n=42, bars='', x=0;
    for(var i=0;i<n;i++){
      // deterministic pseudo-random heights, envelope-shaped
      var env = Math.sin((i/n)*Math.PI);
      var h = 6 + Math.abs(Math.sin(i*1.7)+Math.cos(i*0.9))*20*env + (i%3)*2;
      var y = (56-h)/2;
      bars += '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="2.4" height="'+h.toFixed(1)+'" fill="#1a1815"/>';
      x += 4.6;
    }
    return '<svg class="bars" viewBox="0 0 '+x+' 56" preserveAspectRatio="none">'+bars+'</svg>';
  }

  var glyph='<svg class="glyph" viewBox="0 0 9 9" width="9" height="9"><rect x="1.2" y="1.2" width="6.6" height="6.6" fill="#1a1815"/></svg>';

  var mediaIcons = {
    'vertical video':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><rect x="3.5" y="1.5" width="7" height="11" fill="none" stroke="#4b4740" stroke-width="1.1"/><path d="M6 5.4l2.6 1.6L6 8.6z" fill="#4b4740"/></svg>',
    'video':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><rect x="1" y="2.5" width="12" height="9" fill="none" stroke="#4b4740" stroke-width="1.1"/><path d="M6 5.2l3 1.8-3 1.8z" fill="#4b4740"/></svg>',
    'article':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><path d="M2 3h10M2 6h10M2 9h7" stroke="#4b4740" stroke-width="1.1" stroke-linecap="round"/></svg>',
    'photo':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><rect x="1.5" y="2.5" width="11" height="9" fill="none" stroke="#4b4740" stroke-width="1.1"/><circle cx="5" cy="6" r="1.2" fill="#4b4740"/><path d="M2 11l3.2-3 2.3 2 2.2-2.4L12 11z" fill="none" stroke="#4b4740" stroke-width="1.1" stroke-linejoin="round"/></svg>',
    'audio':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><path d="M1.5 7h1.5M4 4.5v5M6.5 2.5v9M9 5v4M11.5 3.5v7" stroke="#4b4740" stroke-width="1.2" stroke-linecap="round"/></svg>',
    'quote':'<svg class="ic" width="13" height="13" viewBox="0 0 14 14"><path d="M3 8c0-3 2-4 3-4M3 8v3h3V8zM9 8c0-3 2-4 3-4M9 8v3h3V8z" fill="none" stroke="#4b4740" stroke-width="1.1" stroke-linejoin="round"/></svg>'
  };

  var heartSvg='<svg class="ic" width="15" height="15" viewBox="0 0 14 14"><path d="M7 12S1.5 8.6 1.5 4.9C1.5 3.3 2.7 2 4.3 2 5.4 2 6.4 2.7 7 3.7 7.6 2.7 8.6 2 9.7 2 11.3 2 12.5 3.3 12.5 4.9 12.5 8.6 7 12 7 12z" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>';
  var heartFill='<svg viewBox="0 0 14 14"><path d="M7 12S1.5 8.6 1.5 4.9C1.5 3.3 2.7 2 4.3 2 5.4 2 6.4 2.7 7 3.7 7.6 2.7 8.6 2 9.7 2 11.3 2 12.5 3.3 12.5 4.9 12.5 8.6 7 12 7 12z" fill="#f4f2ec"/></svg>';
  var openSvg='<svg class="ic" width="15" height="15" viewBox="0 0 14 14"><path d="M4 2.5h7.5V10M11.5 2.5L4.5 9.5M2.5 5v6.5H9" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var skipSvg='<svg class="ic" width="15" height="15" viewBox="0 0 14 14"><path d="M2.5 3l5 4-5 4zM9.5 3v8" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var downSvg='<svg width="16" height="9" viewBox="0 0 16 9"><path d="M2 2l6 5 6-5" fill="none" stroke="#8b857a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  /* ---------- fixture ---------- */
  var items=[
    {
      type:'vertical video', title:'Scumbag Dad &mdash; the school pickup bit',
      src:'Scumbag Dad', dur:'0:48', reason:'Rare &mdash; posts weekly', seed:11,
      read:'A short, shot vertical. The bit lands in the first ten seconds and never lets up: the pickup line as a competitive sport, narrated deadpan from the driver&rsquo;s seat.'
    },
    {
      type:'video', title:'I got hit in the teeth at England&rsquo;s oldest ritual',
      src:'Tom Scott', dur:'10:24', reason:'Favorite source', seed:23,
      read:'Tom travels to a village that has kept the same violent Shrovetide game going for centuries. He explains the rules, the history, and why nobody has managed to ban it. Then he gets in the scrum.'
    },
    {
      type:'article', title:'Apple&rsquo;s entry-level MacBook Pro could get a redesign',
      src:'The Verge', dur:'4 min read', reason:'Fresh &mdash; today', seed:31,
      excerpt:'A revamped entry model could arrive as soon as this year, per supply-chain reports.',
      read:'Supply-chain chatter points to a redesigned chassis for the cheapest MacBook Pro, potentially thinner and lighter than the current model. Nothing is confirmed, but the timing lines up with the next silicon refresh.'
    },
    {
      type:'photo', title:'Aurora over the Faroe Islands',
      src:'Astronomy Picture of the Day', dur:'', reason:'High-weight source', seed:42, gallery:3,
      read:'Green curtains of light draped over black basalt cliffs and a single lit farmhouse. A three-frame set, shot over forty minutes as the substorm peaked.'
    },
    {
      type:'audio', title:'The Real Book',
      src:'99% Invisible', dur:'32 min', reason:'Rare &mdash; posts seldom', seed:53,
      read:'For decades, the most important book in jazz was illegal. 99pi traces the bootleg fake-book that every working musician owned but no one would admit to printing.'
    },
    {
      type:'quote', title:'', quote:'The best way to predict the future is to invent it.',
      src:'Kottke', dur:'', reason:'Recent', seed:0,
      read:'Attributed to Alan Kay. Kottke pulls it back up as a counter to forecasting-as-passivity: the point isn&rsquo;t to guess right, it&rsquo;s to build the thing you want to be true.'
    }
  ];

  /* ---------- build media block per type ---------- */
  function mediaBlock(it){
    var t=it.type;
    if(t==='vertical video'){
      return '<div class="media ph916">'+dither(it.seed,0.9)+
        '<span class="kind-badge">Short</span>'+
        '<div class="play"></div>'+
        '<span class="dchip">'+it.dur+'</span></div>';
    }
    if(t==='video'){
      return '<div class="media ph169">'+dither(it.seed,0.7)+
        '<div class="play"></div>'+
        '<span class="dchip">'+it.dur+'</span></div>';
    }
    if(t==='article'){
      return '<div class="media phhero">'+dither(it.seed,0.65)+
        '<span class="kind-badge">Hero</span></div>';
    }
    if(t==='photo'){
      return '<div class="media ph169">'+dither(it.seed,0.55)+
        '<span class="kind-badge">1 / 3</span>'+
        '<div class="gdots"><i class="on"></i><i></i><i></i></div></div>';
    }
    if(t==='audio'){
      return '<div class="media phaudio"><div class="wave">'+
        '<div class="play small"></div>'+waveform()+
        '<span class="adur">'+it.dur+'</span></div></div>';
    }
    if(t==='quote'){
      return '<div class="media phquote"><div class="pullquote">'+
        '<span class="qmark">&ldquo;</span>'+
        '<blockquote>'+it.quote+'</blockquote></div></div>';
    }
    return '';
  }

  var col=document.getElementById('column');
  var flash=document.getElementById('flash');
  var snapflash=document.getElementById('snapflash');

  items.forEach(function(it,idx){
    var el=document.createElement('div');
    el.className='item'+(idx>0?' away':'');
    el.dataset.idx=idx;

    var durMeta = it.dur ? '<span class="dot"></span><span>'+it.dur+'</span>' : '';
    var titleBlock = it.type==='quote'
      ? '' // quote has no h2; the pull-quote is the content
      : '<h2>'+it.title+'</h2>';
    var excerpt = it.excerpt ? '<p class="excerpt">'+it.excerpt+'</p>' : '';

    el.innerHTML=
      '<span class="reason">'+glyph+it.reason+'</span>'+
      mediaBlock(it)+
      '<div class="body">'+
        titleBlock+
        excerpt+
        '<div class="meta"><span class="src">'+it.src+'</span>'+durMeta+
          '<span class="dot"></span><span class="mtype">'+mediaIcons[it.type]+it.type+'</span></div>'+
        '<div class="actions">'+
          '<button class="act open">'+openSvg+'Open</button>'+
          '<button class="act like">'+heartSvg+'<span class="stamp">'+heartFill+'</span>Like</button>'+
          '<button class="act skip">'+skipSvg+'Skip</button>'+
        '</div>'+
      '</div>'+
      (idx<items.length-1?'<div class="downcue">'+downSvg+'next</div>':'');
    col.appendChild(el);
  });

  // end panel
  var end=document.createElement('div');
  end.className='end';
  end.innerHTML=
    '<div class="mark">&#10086;</div>'+
    '<div class="line">That&rsquo;s your session.</div>'+
    '<div class="count">6 things &middot; nothing more queued</div>'+
    '<button class="fbtn" id="again">Compose another</button>'+
    '<button class="fbtn solid" id="restart">Back to the top</button>';
  col.appendChild(end);

  /* ---------- progress ticks ---------- */
  var ticksWrap=document.getElementById('ticks');
  var progLbl=document.getElementById('progLbl');
  for(var i=0;i<items.length;i++){
    var ti=document.createElement('i');
    ticksWrap.appendChild(ti);
  }
  var tickEls=Array.prototype.slice.call(ticksWrap.children);

  function setProgress(idx){
    if(idx>=items.length){ // end panel
      progLbl.textContent='done';
      tickEls.forEach(function(t){t.className='done';});
      return;
    }
    progLbl.textContent=(idx+1)+' / '+items.length;
    tickEls.forEach(function(t,j){
      t.className = j<idx ? 'done' : (j===idx ? 'here' : '');
    });
  }
  setProgress(0);

  /* ---------- snap detection: dim non-centered, tick on change ---------- */
  var itemEls=Array.prototype.slice.call(col.querySelectorAll('.item'));
  var current=0;

  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      var el=e.target;
      if(e.isIntersecting && e.intersectionRatio>0.6){
        el.classList.remove('away');
        var idx=el.classList.contains('end')?items.length:parseInt(el.dataset.idx,10);
        if(idx!==current){
          current=idx;
          setProgress(idx);
          // subtle e-ink snap-click invert
          snapflash.classList.remove('tick'); void snapflash.offsetWidth; snapflash.classList.add('tick');
        }
      } else if(e.intersectionRatio<0.4){
        el.classList.add('away');
      }
    });
  },{root:col,threshold:[0,0.4,0.6,0.9]});

  itemEls.forEach(function(el){ io.observe(el); });
  io.observe(end);

  function scrollToIdx(idx){
    var target = idx>=items.length ? end : itemEls[idx];
    if(target) target.scrollIntoView({behavior:'smooth',block:'center'});
  }

  /* ---------- actions (event-delegated) ---------- */
  col.addEventListener('click', function(e){
    var likeBtn=e.target.closest('.act.like');
    if(likeBtn){
      likeBtn.classList.toggle('on');
      var it=likeBtn.closest('.item');
      // liking nudges you onward - the calm reward
      if(likeBtn.classList.contains('on')){
        var idx=parseInt(it.dataset.idx,10);
        setTimeout(function(){ scrollToIdx(idx+1); }, 340);
      }
      return;
    }
    var skipBtn=e.target.closest('.act.skip');
    if(skipBtn){
      var it2=skipBtn.closest('.item');
      it2.classList.add('skipped');
      var idx2=parseInt(it2.dataset.idx,10);
      setTimeout(function(){ scrollToIdx(idx2+1); }, 260);
      return;
    }
    var openBtn=e.target.closest('.act.open');
    if(openBtn){
      openReader(parseInt(openBtn.closest('.item').dataset.idx,10));
      return;
    }
    // tapping a media play toggles a played state (visual only)
    var playBtn=e.target.closest('.play');
    if(playBtn){
      playBtn.style.transition='opacity .2s steps(2,end)';
      playBtn.animate([{opacity:1},{opacity:.35},{opacity:1}],{duration:300,easing:'steps(3,end)'});
      openReader(parseInt(playBtn.closest('.item').dataset.idx,10));
      return;
    }
  });

  /* ---------- open reader sheet ---------- */
  var sheet=document.getElementById('sheet');
  var sheetTitle=document.getElementById('sheetTitle');
  var sheetBody=document.getElementById('sheetBody');
  var sheetKind=document.getElementById('sheetKind');

  function openReader(idx){
    var it=items[idx];
    sheetKind.textContent = it.type.toUpperCase();
    sheetTitle.innerHTML = it.type==='quote' ? '&ldquo;'+it.quote+'&rdquo;' : it.title;
    sheetBody.innerHTML =
      '<p>'+it.read+'</p>'+
      '<p style="font-family:var(--mono);font-size:11.5px;letter-spacing:.03em;color:var(--ink-mute)">'+
      it.src+(it.dur?' &middot; '+it.dur:'')+'</p>';
    // e-ink refresh flash on open
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
    setTimeout(function(){ sheet.classList.add('up'); }, 120);
  }
  document.getElementById('sheetClose').addEventListener('click', function(){
    sheet.classList.remove('up');
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
  });

  /* ---------- end-panel buttons ---------- */
  end.addEventListener('click', function(e){
    if(e.target.id==='again'||e.target.id==='restart'){
      flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
      setTimeout(function(){ scrollToIdx(0); }, 130);
    }
  });

  /* ---------- keyboard for desktop preview ---------- */
  window.addEventListener('keydown', function(e){
    if(e.key==='ArrowDown'||e.key===' '){ e.preventDefault(); scrollToIdx(Math.min(current+1,items.length)); }
    if(e.key==='ArrowUp'){ e.preventDefault(); scrollToIdx(Math.max(current-1,0)); }
    if(e.key==='Escape'){ sheet.classList.remove('up'); }
  });

})();
</script>
</body>
</html>
