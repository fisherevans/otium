name: build image

# Builds and publishes otium's two container images to GHCR, per the
# nottingham-cloud app contract (agent/app-contract.md). otium follows bloom's
# two-image shape: a Go API (otium-server) and an nginx-served React build
# (otium-web), built via a matrix.
#   push to main  -> :main, :sha-<short>, :latest
#   tag vX.Y.Z    -> :vX.Y.Z, :sha-<short>
# Deploys pin an explicit vX.Y.Z tag; cut a release by pushing a git tag.
# Image-build only - the cluster deploy lives in nottingham-cloud
# (k3s/projects/otium/), applied with `make deploy-project PROJECT=otium`.
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: otium-server
            context: .
            dockerfile: Dockerfile.server
          - image: otium-web
            context: web
            dockerfile: web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
