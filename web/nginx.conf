server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API + health go to the Go server.
    location /api/ {
        proxy_pass http://otium-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /healthz {
        proxy_pass http://otium-server:8080;
    }

    # OIDC flow is served by the Go server, not the SPA.
    location /auth/ {
        proxy_pass http://otium-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # PWA service worker: must revalidate on every load so updates ship promptly
    # (the browser byte-compares sw.js), and must be served with a JS type.
    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    # PWA manifest needs the right MIME or browsers reject it.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA icons are stable; let them cache.
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
